<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Neon Horizon — a synthwave match-3</title>
<style>
  :root{
    --stage-sky-top:#170a2e;
    --stage-sky-mid:#3a1250;
    --stage-sky-horizon:#ff2d95;
    --stage-grid:#00e5ff;
    --stage-sun-a:#ffd23f;
    --stage-sun-b:#ff2d95;
    --stage-skyline:#2a1140;
    --accent:#00e5ff;
    --accent-2:#ff2d95;
    color-scheme: dark;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    font-family: 'Segoe UI', 'Trebuchet MS', ui-sans-serif, system-ui, sans-serif;
    overflow:hidden;
    background:#0a0414;
  }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; position:relative;
  }

  /* ---------------- Backdrop: synthwave retro sunset ---------------- */
  #backdrop{
    position:fixed; inset:0; z-index:0; overflow:hidden;
    transition: background 1.1s ease;
  }
  #sky{
    position:absolute; inset:0;
    background:
      radial-gradient(120% 60% at 50% 78%, var(--stage-horizon-glow, rgba(255,45,149,.55)) 0%, transparent 62%),
      linear-gradient(to bottom, var(--stage-sky-top) 0%, var(--stage-sky-mid) 55%, var(--stage-sky-horizon) 100%);
    transition: background 1.1s ease;
  }
  .stars{ position:absolute; inset:0 0 42% 0; }
  .star{
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:#fff; opacity:.75;
    animation: twinkle 3.6s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:.25;} 50%{opacity:.9;} }

  #sun{
    position:absolute; left:50%; top:19%; width:min(34vw,260px); height:min(34vw,260px);
    transform:translate(-50%,-50%);
    border-radius:50%;
    background: linear-gradient(180deg, var(--stage-sun-a) 0%, var(--stage-sun-b) 100%);
    box-shadow: 0 0 70px 10px var(--stage-sun-b), 0 0 140px 40px var(--stage-sun-b);
    overflow:hidden;
    transition: background 1.1s ease, box-shadow 1.1s ease;
  }
  #sun::before{
    content:""; position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 10px,
      rgba(10,4,20,.85) 10px, rgba(10,4,20,.85) 16px
    );
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, transparent 46%, black 46%);
            mask-image: linear-gradient(to bottom, transparent 0%, transparent 46%, black 46%);
  }

  #skyline{
    position:absolute; left:0; right:0; bottom:38%; height:16vh;
    background: var(--stage-skyline);
    clip-path: polygon(
      0% 100%, 0% 55%, 4% 55%, 4% 30%, 8% 30%, 8% 60%, 13% 60%, 13% 15%, 17% 15%,
      17% 48%, 22% 48%, 22% 70%, 27% 70%, 27% 25%, 32% 25%, 32% 58%, 37% 58%,
      37% 10%, 42% 10%, 42% 50%, 47% 50%, 47% 68%, 53% 68%, 53% 20%, 58% 20%,
      58% 55%, 63% 55%, 63% 35%, 68% 35%, 68% 62%, 73% 62%, 73% 12%, 78% 12%,
      78% 50%, 83% 50%, 83% 70%, 88% 70%, 88% 28%, 92% 28%, 92% 58%, 96% 58%,
      96% 40%, 100% 40%, 100% 100%
    );
    opacity:.9; transition: background 1.1s ease;
  }
  .win{ position:absolute; width:2px; height:3px; background:var(--accent-2); opacity:.85; box-shadow:0 0 4px 1px var(--accent-2); animation: flicker 2.4s steps(2) infinite; }
  @keyframes flicker{ 0%,60%{opacity:.85;} 62%,64%{opacity:.15;} 100%{opacity:.85;} }

  #grid-horizon{
    position:absolute; left:0; right:0; bottom:0; height:38%;
    background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.15) 100%);
    perspective: 260px; perspective-origin: 50% 0%;
    overflow:hidden;
  }
  #grid-horizon::before{
    content:""; position:absolute; left:-50%; right:-50%; top:0; bottom:-60%;
    background-image:
      repeating-linear-gradient(90deg, var(--stage-grid) 0 2px, transparent 2px 60px),
      repeating-linear-gradient(0deg, var(--stage-grid) 0 2px, transparent 2px 46px);
    background-size: 60px 100%, 100% 46px;
    opacity:.55;
    transform: rotateX(72deg) translateZ(0);
    transform-origin: 50% 0%;
    animation: drive 2.4s linear infinite;
    filter: drop-shadow(0 0 6px var(--stage-grid));
  }
  @keyframes drive{ from{ background-position: 0 0, 0 0; } to{ background-position: 0 0, 0 46px; } }

  .scanlines{
    position:absolute; inset:0; pointer-events:none; opacity:.10; z-index:2;
    background: repeating-linear-gradient(to bottom, #fff 0px, #fff 1px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay;
  }
  .vignette{ position:absolute; inset:0; pointer-events:none; z-index:2;
    background: radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(3,1,8,.65) 100%);
  }

  /* ---------------- Foreground UI ---------------- */
  #app{ position:relative; z-index:3; display:flex; flex-direction:column; align-items:center; gap:.55rem; width:100%; padding: 1.1rem 1rem; }

  h1{
    margin:0; font-size:clamp(1.4rem,4vw,2.1rem); letter-spacing:.14em; font-weight:800;
    color:#fff; text-transform:uppercase;
    text-shadow: 0 0 10px var(--accent-2), 0 0 26px var(--accent-2), 0 0 3px #fff;
  }
  h1 span{ color:var(--accent); text-shadow: 0 0 10px var(--accent), 0 0 26px var(--accent), 0 0 3px #fff; }

  #hud{
    display:flex; flex-wrap:wrap; gap:.5rem .7rem; align-items:center; justify-content:center;
    font-size:.82rem; color:#e9e2ff;
  }
  .chip{
    display:flex; align-items:center; gap:.4rem;
    background: rgba(20,10,35,.55);
    border:1px solid rgba(255,255,255,.14);
    padding:.32rem .7rem; border-radius:999px;
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 10px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .chip b{ color:#fff; font-variant-numeric:tabular-nums; }
  .chip.mult b{ color: var(--accent-2); text-shadow:0 0 8px var(--accent-2); }
  .chip.stage{ border-color: rgba(0,229,255,.4); }
  .chip.feature{ border-color: var(--feat-glow, var(--accent)); box-shadow: 0 0 14px var(--feat-glow, var(--accent)), inset 0 1px 0 rgba(255,255,255,.08); }
  .chip.feature .feat-icon{ width:1.1em; height:1.1em; filter: drop-shadow(0 0 4px var(--feat-glow, var(--accent))); }

  #newGameBtn{
    font: inherit; font-weight:700; letter-spacing:.05em; text-transform:uppercase; font-size:.78rem;
    color:#08040f; background: linear-gradient(180deg,#fff,#bfe9ff);
    border:none; border-radius:999px; padding:.5rem 1.05rem; cursor:pointer;
    box-shadow: 0 0 0 1px rgba(255,255,255,.5) inset, 0 4px 14px rgba(0,229,255,.45);
    transition: transform .15s ease, box-shadow .3s ease;
  }
  #newGameBtn:hover{ transform: translateY(-1px) scale(1.03); }
  #newGameBtn:active{ transform: translateY(0) scale(.97); }
  body.game-over #newGameBtn{
    position:fixed; top:50%; left:50%; transform:translate(-50%, 3.4rem);
    z-index:200; font-size:1.05rem; padding:.85rem 2rem;
    box-shadow: 0 0 0 1px #fff inset, 0 0 30px 6px var(--accent), 0 0 60px 10px var(--accent-2);
    animation: pop-in .4s ease;
  }
  @keyframes pop-in{ from{ transform:translate(-50%,3.4rem) scale(.7); opacity:0;} to{ transform:translate(-50%,3.4rem) scale(1); opacity:1;} }

  #board-wrap{
    position:relative;
    padding: 14px;
    border-radius: 22px;
    background: linear-gradient(160deg, rgba(30,12,50,.72), rgba(10,5,22,.78));
    box-shadow:
      0 22px 50px rgba(0,0,0,.55),
      0 0 0 1px rgba(255,255,255,.06) inset,
      0 0 40px rgba(255,45,149,.18),
      0 0 70px rgba(0,229,255,.12);
    backdrop-filter: blur(10px);
  }
  #board-wrap::before{
    content:""; position:absolute; inset:-2px; z-index:-1; border-radius:24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent));
    opacity:.55; filter: blur(2px);
  }
  #board{
    position:relative;
    display:grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width:min(84vw, 78vh, 560px);
    aspect-ratio: 1 / 1;
    gap: 6px;
    touch-action:none;
  }
  .cell{
    position:relative;
    border-radius: 10px;
    background: linear-gradient(160deg, rgba(255,255,255,.03), rgba(0,0,0,.35));
    box-shadow: inset 0 2px 5px rgba(0,0,0,.55), inset 0 -1px 2px rgba(255,255,255,.05);
    cursor:grab;
    overflow:visible;
  }
  .cell.hint-active{ animation: hint-pulse 1.1s ease-in-out infinite; }
  @keyframes hint-pulse{
    0%,100%{ box-shadow: inset 0 2px 5px rgba(0,0,0,.55), 0 0 0 rgba(255,255,255,0); }
    50%{ box-shadow: inset 0 2px 5px rgba(0,0,0,.55), 0 0 16px 3px rgba(255,255,255,.55); }
  }
  .gem{
    position:absolute; inset:5%;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
    will-change:transform;
    animation: idle-float 3.4s ease-in-out infinite;
  }
  .gem.dragging{ z-index:20; animation:none; }
  .gem.matched{ animation: gem-clear .38s ease forwards; z-index:15; }
  .gem.hidden-gem{ visibility:hidden; }
  .gem svg{ width:100%; height:100%; filter: drop-shadow(2px 4px 3px rgba(0,0,0,.55)); overflow:visible; }
  .gem.featured svg{ filter: drop-shadow(2px 4px 3px rgba(0,0,0,.55)) drop-shadow(0 0 9px var(--feat-glow)); }
  .gem.featured::after{
    content:""; position:absolute; inset:-22%; border-radius:50%;
    background: conic-gradient(from 0deg, var(--feat-glow), transparent 30%, var(--feat-glow) 60%, transparent 90%, var(--feat-glow));
    opacity:.55; z-index:-1; filter: blur(2px);
    animation: spin-halo 2.6s linear infinite;
  }
  @keyframes spin-halo{ to{ transform: rotate(360deg); } }
  @keyframes idle-float{
    0%,100%{ transform: translateY(0) rotate(0deg) scale(1); }
    50%{ transform: translateY(-4%) rotate(2.5deg) scale(1.03); }
  }
  @keyframes gem-clear{
    0%{ transform:scale(1); opacity:1; filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
    40%{ transform:scale(1.35); opacity:1; }
    100%{ transform:scale(0.15); opacity:0; }
  }

  #fx-layer{ position:absolute; inset:0; pointer-events:none; z-index:8; }
  .ghost{ position:absolute; pointer-events:none; will-change:transform; }
  .ghost svg{ width:100%; height:100%; filter: drop-shadow(2px 4px 3px rgba(0,0,0,.55)); }

  /* ---------------- Score feedback ---------------- */
  #gain-layer{ position:absolute; inset:0; pointer-events:none; z-index:30; display:flex; align-items:flex-start; justify-content:center; overflow:visible; }
  .gain-pop{
    position:absolute; top:38%; left:50%;
    font-size:clamp(1.8rem,6vw,3rem); font-weight:900; color:#fff;
    text-shadow: 0 0 10px var(--accent-2), 0 0 24px var(--accent-2), 0 2px 2px rgba(0,0,0,.6);
    animation: gain-float 1.5s ease-out forwards;
    white-space:nowrap;
  }
  .gain-mult{ font-size:.5em; vertical-align:top; color: var(--accent); text-shadow:0 0 8px var(--accent); margin-left:.15em; }
  @keyframes gain-float{
    0%{ transform: translate(-50%,10px) scale(.6); opacity:0; }
    18%{ transform: translate(-50%,-8px) scale(1.12); opacity:1; }
    75%{ transform: translate(-50%,-46px) scale(1); opacity:1; }
    100%{ transform: translate(-50%,-70px) scale(.94); opacity:0; }
  }
  .bonus-tag{
    position:absolute; top:56%; left:50%;
    font-size:clamp(.85rem,2.4vw,1.1rem); font-weight:800; letter-spacing:.03em;
    color:#0a0414; background: linear-gradient(180deg,#baffe0,#3dffb0);
    padding:.2rem .65rem; border-radius:999px;
    box-shadow: 0 0 16px rgba(61,255,176,.85);
    animation: bonus-float 1.6s ease-out forwards;
    white-space:nowrap;
  }
  @keyframes bonus-float{
    0%{ transform: translate(-50%,16px) scale(.7); opacity:0; }
    22%{ transform: translate(-50%,0px) scale(1.08); opacity:1; }
    78%{ transform: translate(-50%,-30px) scale(1); opacity:1; }
    100%{ transform: translate(-50%,-46px) scale(.94); opacity:0; }
  }

  /* ---------------- Stage transition banner ---------------- */
  #stage-flash{ position:fixed; inset:0; z-index:150; pointer-events:none; opacity:0; background:#fff; }
  #stage-flash.flash{ animation: flash-screen .55s ease; }
  @keyframes flash-screen{ 0%{opacity:0;} 12%{opacity:.65;} 100%{opacity:0;} }

  #stage-banner{
    position:fixed; left:50%; top:32%; transform:translate(-50%,-50%) scale(.8);
    z-index:151; text-align:center; opacity:0; pointer-events:none;
  }
  #stage-banner.show{ animation: banner-in 2.4s ease forwards; }
  #stage-banner .tag{
    display:block; font-size:.85rem; letter-spacing:.5em; color: var(--accent);
    text-shadow:0 0 10px var(--accent); margin-bottom:.3rem;
  }
  #stage-banner .name{
    display:block; font-size:clamp(1.6rem,6vw,3.2rem); font-weight:900; letter-spacing:.06em;
    color:#fff; text-transform:uppercase;
    text-shadow: 0 0 12px var(--accent-2), 0 0 34px var(--accent-2), 0 0 70px var(--accent-2);
  }
  @keyframes banner-in{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.7); }
    12%{ opacity:1; transform:translate(-50%,-50%) scale(1.04); }
    20%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    82%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-58%) scale(1); }
  }

  /* ---------------- Game over overlay ---------------- */
  #overlay{
    position:fixed; inset:0; z-index:100; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background: radial-gradient(120% 90% at 50% 40%, rgba(30,8,40,.55), rgba(3,1,8,.86));
    backdrop-filter: blur(3px);
  }
  body.game-over #overlay{ display:flex; }
  #overlay h2{
    margin:0; font-size:clamp(2rem,7vw,3.4rem); color:#fff; letter-spacing:.1em;
    text-shadow: 0 0 14px var(--accent-2), 0 0 40px var(--accent-2);
  }
  #overlay p{ margin:.6rem 0 0; color:#d8cdf0; font-size:1rem; }
  #overlay p b{ color:#fff; }

  footer{ position:relative; z-index:3; color:rgba(233,226,255,.45); font-size:.68rem; margin-top:.2rem; letter-spacing:.03em; }

  @media (max-width:480px){
    #hud{ font-size:.72rem; }
  }
</style>
</head>
<body>

<div id="backdrop">
  <div id="sky"></div>
  <div class="stars" id="stars"></div>
  <div id="sun"></div>
  <div id="skyline"></div>
  <div id="grid-horizon"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>
</div>

<div id="stage-flash"></div>
<div id="stage-banner"><span class="tag">STAGE</span><span class="name" id="stageBannerName"></span></div>

<!-- shared gem gradient/clip defs, referenced by every gem svg -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs id="gem-defs"></defs>
</svg>

<div id="app">
  <h1>Neon <span>Horizon</span></h1>
  <div id="hud">
    <div class="chip">Score <b id="scoreVal">0</b></div>
    <div class="chip">Best <b id="bestVal">0</b></div>
    <div class="chip mult">Streak <b id="multVal">×1</b></div>
    <div class="chip stage">Stage <b id="stageVal">0 — Neon Dusk</b></div>
    <div class="chip feature" id="featureChip">
      <svg class="feat-icon" viewBox="0 0 100 100" id="featureIcon"></svg>
      Pays extra: <b id="featureName">—</b>
    </div>
    <button id="newGameBtn" data-testid="new-game" type="button">New Game</button>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
    <div id="gain-layer"></div>
  </div>

  <footer>drag a gem into a neighbour to swap · colour-blind safe by shape</footer>
</div>

<div id="overlay">
  <h2>Game Over</h2>
  <p>No moves left · final score <b id="finalScore">0</b></p>
</div>

<script type="module" src="./render.js"></script>
</body>
</html>
