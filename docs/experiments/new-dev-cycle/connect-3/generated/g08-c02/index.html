<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Astral Facets — a 3D match-3</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #05060f;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: #e8ecff;
    user-select: none; -webkit-user-select: none;
  }
  #app { position: fixed; inset: 0; }
  #scene { position: absolute; inset: 0; }
  canvas { display: block; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 16px 20px; pointer-events: none; z-index: 5;
    text-shadow: 0 2px 10px rgba(0,0,0,.7);
  }
  .panel {
    background: rgba(14,18,42,.55);
    border: 1px solid rgba(140,160,255,.18);
    border-radius: 14px; padding: 10px 16px;
    backdrop-filter: blur(6px);
  }
  #title { font-weight: 700; letter-spacing: .06em; font-size: 15px; color: #cdd6ff; }
  #stageName { font-size: 12px; color: #8fa0e8; margin-top: 2px; letter-spacing:.12em; text-transform: uppercase; }
  .score-num { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
  .lbl { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #7f8ac2; }
  #right { text-align: right; }
  #multi { color: #ffd27a; font-weight: 700; font-size: 14px; margin-top: 4px; }
  #best { color: #9fe6c4; font-size: 12px; margin-top: 2px; }
  #feature { font-size: 11px; color: #ffb3e6; margin-top: 4px; min-height: 14px; }

  #newgame {
    pointer-events: auto; cursor: pointer;
    margin-top: 8px;
    background: linear-gradient(135deg, #5a6bff, #9a5cff);
    color: white; border: none; border-radius: 10px;
    padding: 8px 14px; font-size: 12px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    box-shadow: 0 6px 20px rgba(90,107,255,.4);
  }
  #newgame:hover { filter: brightness(1.12); }

  /* hit-cell overlay grid */
  #hitgrid { position: absolute; inset: 0; z-index: 4; }
  .hit {
    position: absolute; margin: 0; padding: 0;
    background: transparent; border: none;
    cursor: grab; touch-action: none;
  }
  .hit:active { cursor: grabbing; }

  /* floating score pop */
  #pops { position: absolute; inset: 0; z-index: 6; pointer-events: none; }
  .pop {
    position: absolute; transform: translate(-50%, -50%);
    font-weight: 800; font-size: 40px;
    color: #fff; text-shadow: 0 0 18px rgba(150,180,255,.9), 0 3px 8px rgba(0,0,0,.8);
    animation: popup 1.4s cubic-bezier(.2,.7,.3,1) forwards;
  }
  .pop .bonus {
    display: block; font-size: 20px; color: #ffdf6e;
    text-shadow: 0 0 14px rgba(255,200,80,.9);
  }
  @keyframes popup {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(.5); }
    18% { opacity: 1; transform: translate(-50%, -60%) scale(1.15); }
    40% { transform: translate(-50%, -80%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -160%) scale(.95); }
  }

  /* stage banner */
  #banner {
    position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%) scale(.8);
    z-index: 7; pointer-events: none; text-align: center; opacity: 0;
  }
  #banner.show { animation: banner 2.6s ease forwards; }
  #banner .b-sub { font-size: 14px; letter-spacing: .3em; color: #9fb0ff; text-transform: uppercase; }
  #banner .b-name { font-size: 48px; font-weight: 800; letter-spacing: .04em;
    background: linear-gradient(90deg,#8fd7ff,#c79bff,#ffb3e6);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 40px rgba(160,140,255,.4); }
  @keyframes banner {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(.8); }
    15% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    80% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-58%) scale(1.03); }
  }

  /* game over */
  #over {
    position: absolute; inset: 0; z-index: 8; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: rgba(5,6,15,.72); backdrop-filter: blur(4px);
  }
  #over.show { display: flex; }
  #over h2 { font-size: 42px; margin: 0 0 6px; color: #ff9db0; letter-spacing:.04em; }
  #over p { color: #b9c2ee; margin: 0 0 18px; }
  #over-new {
    pointer-events: auto; cursor: pointer;
    background: linear-gradient(135deg, #5a6bff, #9a5cff);
    color: #fff; border: none; border-radius: 12px;
    padding: 12px 24px; font-size: 15px; font-weight: 700; letter-spacing:.06em;
    box-shadow: 0 8px 24px rgba(90,107,255,.5);
  }
</style>

<div id="app">
  <div id="scene"></div>
  <div id="hitgrid"></div>
  <div id="pops"></div>

  <div id="hud">
    <div class="panel">
      <div id="title">✦ ASTRAL FACETS</div>
      <div id="stageName">The Veil Nebula</div>
      <div style="margin-top:8px">
        <div class="lbl">Score</div>
        <div class="score-num" id="score">0</div>
      </div>
      <button id="newgame" data-testid="new-game">New Game</button>
    </div>
    <div class="panel" id="right">
      <div class="lbl">Best</div>
      <div id="best">0</div>
      <div id="multi">×1</div>
      <div id="feature"></div>
    </div>
  </div>

  <div id="banner"><div class="b-sub">Stage</div><div class="b-name">The Veil Nebula</div></div>

  <div id="over">
    <h2>Out of Moves</h2>
    <p>The constellations have stilled.</p>
    <button id="over-new">New Game</button>
  </div>
</div>

<script type="module" src="./render.js"></script>
