<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Match-3</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1e1e28;
    color: #f0f0f0;
    font-family: system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    text-align: center;
  }
  .hud {
    margin-bottom: 12px;
    font-size: 1.25rem;
  }
  #board {
    display: grid;
    gap: 4px;
    width: min(90vw, 480px);
    height: min(90vw, 480px);
    background: #111118;
    padding: 6px;
    border-radius: 8px;
    box-sizing: border-box;
  }
  .cell {
    border-radius: 6px;
    cursor: pointer;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    transition: transform 0.08s ease;
  }
  .cell:hover {
    transform: scale(0.95);
  }
  .cell.selected {
    box-shadow: inset 0 0 0 3px #fff, 0 0 8px 2px #fff;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hud">Score: <span id="score">0</span></div>
    <div id="board"></div>
  </div>
  <script type="module" src="./render.js"></script>
</body>
</html>
