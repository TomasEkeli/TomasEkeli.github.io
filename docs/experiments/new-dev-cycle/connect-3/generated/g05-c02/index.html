<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Ember Match</title>
    <style>
      :root {
        /* Molten-amber gem palette (distinguished by SHAPE, colour secondary). */
        --t0-base: #ffb02e; --t0-lo: #b56400; --t0-hi: #ffe9ad; /* gold  hexagon */
        --t1-base: #ef3d3d; --t1-lo: #8f0f1c; --t1-hi: #ffb3ac; /* ruby  diamond */
        --t2-base: #ff7a18; --t2-lo: #a83900; --t2-hi: #ffcfa0; /* ember square  */
        --t3-base: #ff4d8d; --t3-lo: #a3125a; --t3-hi: #ffc2da; /* rose  triangle*/
        --t4-base: #17c3b2; --t4-lo: #076b62; --t4-hi: #aef4ec; /* teal  pentagon*/
        --t5-base: #3a86ff; --t5-lo: #123f96; --t5-hi: #bcd6ff; /* sapph octagon */

        --gold: #ffc879;
        --ink: #2a0d08;
        --panel: rgba(38, 14, 8, 0.62);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        color: #ffe9d2;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        /* Sunset sky: deep dusk maroon high up, molten amber at the horizon. */
        background:
          radial-gradient(120% 90% at 50% 118%, #ffd27a 0%, #ff8a2b 14%, #d64b12 30%, transparent 62%),
          linear-gradient(180deg, #24060f 0%, #451021 34%, #8a2a15 68%, #c85018 100%);
      }

      /* --- distant dune silhouettes + sun glow ------------------------------ */
      body::before {
        content: "";
        position: fixed; left: 0; right: 0; bottom: 0; height: 34vh;
        background:
          radial-gradient(60% 120% at 30% 100%, #3d0f12 0%, transparent 70%),
          radial-gradient(70% 130% at 78% 100%, #4a1410 0%, transparent 72%);
        clip-path: polygon(0 62%, 12% 48%, 26% 58%, 40% 40%, 55% 56%, 70% 42%, 84% 55%, 100% 46%, 100% 100%, 0 100%);
        opacity: 0.85;
        pointer-events: none;
      }

      .embers { position: fixed; inset: 0; overflow: hidden; pointer-events: none; }
      .ember {
        position: absolute; bottom: -20px;
        width: 6px; height: 6px; border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, #fff2c4, #ff8a1e 55%, transparent 72%);
        filter: blur(0.4px);
        animation: rise linear infinite;
      }
      @keyframes rise {
        0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
        12%  { opacity: 0.9; }
        88%  { opacity: 0.8; }
        100% { transform: translateY(-102vh) translateX(28px) scale(0.5); opacity: 0; }
      }

      /* --- layout ----------------------------------------------------------- */
      .stage { position: relative; width: min(94vw, 34rem); z-index: 1; }

      header {
        display: flex; align-items: flex-end; justify-content: space-between;
        gap: 0.6rem; margin-bottom: 0.7rem;
      }
      .brand { line-height: 1; }
      .brand h1 {
        margin: 0; font-size: clamp(1.6rem, 6vw, 2.5rem); letter-spacing: 0.5px;
        background: linear-gradient(180deg, #fff1c9, #ffab3b 55%, #ff5e2e);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        text-shadow: 0 2px 10px rgba(255, 120, 30, 0.35);
        font-weight: 800;
      }
      .brand p { margin: 2px 0 0; font-size: 0.72rem; letter-spacing: 3px; text-transform: uppercase; color: #ffb877; opacity: 0.8; }

      .hud { display: flex; align-items: center; gap: 0.7rem; }
      .score-box {
        text-align: right; padding: 0.35rem 0.8rem; border-radius: 0.7rem;
        background: rgba(20, 6, 4, 0.5);
        border: 1px solid rgba(255, 170, 90, 0.3);
        box-shadow: inset 0 1px 0 rgba(255, 200, 130, 0.2);
      }
      .score-box .label { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: #ffb877; }
      .score-box .val { font-size: clamp(1.1rem, 4vw, 1.6rem); font-weight: 800; color: #ffe9c7; font-variant-numeric: tabular-nums; }

      .btn {
        font: inherit; font-weight: 700; letter-spacing: 0.4px; cursor: pointer;
        color: #3a1200; padding: 0.55rem 0.9rem; border-radius: 0.7rem; border: none;
        background: linear-gradient(180deg, #ffd580, #ff9d2e 60%, #f4741a);
        box-shadow: 0 4px 12px rgba(255, 120, 20, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.5);
        transition: transform 0.1s ease, filter 0.15s ease;
      }
      .btn:hover { filter: brightness(1.08); }
      .btn:active { transform: translateY(1px) scale(0.98); }

      /* --- board panel: lifted off the backdrop ---------------------------- */
      .panel {
        position: relative; padding: clamp(0.5rem, 2.2vw, 0.9rem);
        border-radius: 1.2rem;
        background:
          linear-gradient(180deg, rgba(70, 26, 14, 0.7), rgba(28, 9, 6, 0.82));
        border: 1px solid rgba(255, 176, 96, 0.35);
        box-shadow:
          0 26px 60px rgba(0, 0, 0, 0.55),
          0 6px 18px rgba(120, 30, 0, 0.5),
          inset 0 1px 0 rgba(255, 210, 150, 0.35),
          inset 0 0 60px rgba(255, 120, 30, 0.08);
      }

      #board {
        position: relative;
        width: 100%; aspect-ratio: 1 / 1;
        border-radius: 0.8rem;
        background:
          repeating-linear-gradient(90deg, rgba(255,180,110,0.05) 0 calc(100%/8), rgba(0,0,0,0.10) calc(100%/8) calc(100%/8 + 1px)),
          repeating-linear-gradient(0deg, rgba(255,180,110,0.05) 0 calc(100%/8), rgba(0,0,0,0.10) calc(100%/8) calc(100%/8 + 1px)),
          radial-gradient(120% 120% at 50% 20%, #3a130b, #190704 78%);
        box-shadow: inset 0 0 30px rgba(0,0,0,0.6), inset 0 2px 6px rgba(0,0,0,0.5);
        overflow: hidden;
        touch-action: none;
        --cell: 0px;
      }

      /* --- gems ------------------------------------------------------------- */
      .gem {
        position: absolute; top: 0; left: 0;
        width: var(--cell); height: var(--cell);
        will-change: transform;
        cursor: grab;
      }
      .gem:active { cursor: grabbing; }

      .jewel {
        position: absolute; inset: 9%;
        filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.55));
        animation: twinkle 5s ease-in-out infinite;
        transition: transform 0.12s ease;
      }
      /* Faceted jewel body: glossy radial light + conic crown facets, all
         clipped to the per-type silhouette (clip-path clips the whole subtree). */
      .jewel::after {
        content: "";
        position: absolute; inset: 0;
        background:
          radial-gradient(circle at 32% 26%, var(--hi) 0%, var(--base) 42%, var(--lo) 100%),
          conic-gradient(from 210deg,
            rgba(255,255,255,0.28), rgba(0,0,0,0.22) 60deg,
            rgba(255,255,255,0.18) 130deg, rgba(0,0,0,0.28) 200deg,
            rgba(255,255,255,0.22) 270deg, rgba(0,0,0,0.2) 330deg,
            rgba(255,255,255,0.28) 360deg);
        background-blend-mode: normal, overlay;
        box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.18), inset 0 2px 3px rgba(255, 255, 255, 0.35);
        clip-path: var(--shape);
      }
      /* specular glint */
      .jewel::before {
        content: "";
        position: absolute; inset: 0; z-index: 1;
        background: radial-gradient(ellipse 34% 24% at 30% 22%, rgba(255,255,255,0.95), rgba(255,255,255,0) 60%);
        clip-path: var(--shape);
      }

      .jewel[data-type="0"] { --base: var(--t0-base); --lo: var(--t0-lo); --hi: var(--t0-hi);
        --shape: polygon(50% 2%, 93% 25%, 93% 75%, 50% 98%, 7% 75%, 7% 25%); }        /* hexagon */
      .jewel[data-type="1"] { --base: var(--t1-base); --lo: var(--t1-lo); --hi: var(--t1-hi);
        --shape: polygon(50% 3%, 97% 50%, 50% 97%, 3% 50%); }                          /* diamond */
      .jewel[data-type="2"] { --base: var(--t2-base); --lo: var(--t2-lo); --hi: var(--t2-hi);
        --shape: polygon(15% 8%, 85% 8%, 92% 15%, 92% 85%, 85% 92%, 15% 92%, 8% 85%, 8% 15%); } /* cushion square */
      .jewel[data-type="3"] { --base: var(--t3-base); --lo: var(--t3-lo); --hi: var(--t3-hi);
        --shape: polygon(50% 5%, 95% 90%, 5% 90%); }                                   /* triangle */
      .jewel[data-type="4"] { --base: var(--t4-base); --lo: var(--t4-lo); --hi: var(--t4-hi);
        --shape: polygon(50% 3%, 96% 40%, 78% 97%, 22% 97%, 4% 40%); }                 /* pentagon */
      .jewel[data-type="5"] { --base: var(--t5-base); --lo: var(--t5-lo); --hi: var(--t5-hi);
        --shape: polygon(30% 5%, 70% 5%, 95% 30%, 95% 70%, 70% 95%, 30% 95%, 5% 70%, 5% 30%); } /* octagon */

      @keyframes twinkle {
        0%, 100% { filter: drop-shadow(0 3px 3px rgba(0,0,0,0.55)) brightness(1); }
        50%      { filter: drop-shadow(0 3px 5px rgba(0,0,0,0.55)) brightness(1.12); }
      }

      .jewel.grabbed { transform: scale(1.12); z-index: 5; }
      .gem:has(.grabbed) { z-index: 5; }

      /* clear burst */
      .jewel.clearing { animation: burst var(--clear, 260ms) ease-out forwards; z-index: 6; }
      @keyframes burst {
        0%   { transform: scale(1) rotate(0); filter: brightness(1.4) drop-shadow(0 0 6px rgba(255,210,120,0.9)); }
        45%  { transform: scale(1.45) rotate(28deg); filter: brightness(2) drop-shadow(0 0 16px rgba(255,220,140,1)); opacity: 1; }
        100% { transform: scale(0.1) rotate(80deg); opacity: 0; filter: brightness(2.4); }
      }

      /* idle hint: subtle wiggle + pulse on the gem to move */
      .jewel.hinting { animation: twinkle 5s ease-in-out infinite, hintpulse 1.1s ease-in-out infinite; z-index: 4; }
      @keyframes hintpulse {
        0%, 100% { transform: scale(1) rotate(0); }
        25%      { transform: scale(1.1) rotate(-5deg); }
        75%      { transform: scale(1.1) rotate(5deg); }
      }

      /* --- floating +N ------------------------------------------------------ */
      #float-layer { position: absolute; inset: 0; pointer-events: none; z-index: 20; display: grid; place-items: center; }
      .float-gain {
        font-size: clamp(2.6rem, 12vw, 5rem); font-weight: 900; font-style: italic;
        background: linear-gradient(180deg, #fff4cf, #ffc24a 45%, #ff6a1f);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        text-shadow: 0 4px 22px rgba(255, 130, 30, 0.7);
        filter: drop-shadow(0 2px 0 rgba(120, 40, 0, 0.4));
        animation: floatpop 1.5s cubic-bezier(.2,.7,.2,1) forwards;
      }
      @keyframes floatpop {
        0%   { transform: translateY(24px) scale(0.4); opacity: 0; }
        18%  { transform: translateY(0) scale(1.15); opacity: 1; }
        34%  { transform: translateY(-6px) scale(1); }
        72%  { opacity: 1; }
        100% { transform: translateY(-90px) scale(1.05); opacity: 0; }
      }

      /* --- game over -------------------------------------------------------- */
      #gameover {
        position: absolute; inset: 0; z-index: 30;
        display: none; flex-direction: column; align-items: center; justify-content: center;
        gap: 1rem; border-radius: 0.8rem;
        background: radial-gradient(circle at 50% 40%, rgba(60,15,10,0.86), rgba(10,3,2,0.95));
        backdrop-filter: blur(3px);
      }
      #gameover.show { display: flex; }
      #gameover h2 {
        margin: 0; font-size: clamp(2rem, 9vw, 3.2rem); font-weight: 900;
        background: linear-gradient(180deg, #fff0c6, #ff8a3a);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      #gameover p { margin: 0; color: #ffcf9c; }
    </style>
  </head>
  <body>
    <div class="embers" id="embers"></div>

    <div class="stage">
      <header>
        <div class="brand">
          <h1>Ember Match</h1>
          <p>Molten Jewels</p>
        </div>
        <div class="hud">
          <div class="score-box">
            <div class="label">Score</div>
            <div class="val" id="score">0</div>
          </div>
          <button class="btn" data-testid="new-game">New Game</button>
        </div>
      </header>

      <div class="panel">
        <div id="board"></div>
        <div id="float-layer"></div>
        <div id="gameover">
          <h2>Out of Moves</h2>
          <p>No swaps left on the board.</p>
          <button class="btn over-restart">Play Again</button>
        </div>
      </div>
    </div>

    <script>
      // scatter drifting embers (pazzazz) — cheap, purely decorative.
      (function () {
        const wrap = document.getElementById('embers');
        for (let i = 0; i < 16; i++) {
          const e = document.createElement('div');
          e.className = 'ember';
          e.style.left = Math.random() * 100 + 'vw';
          const dur = 7 + Math.random() * 9;
          e.style.animationDuration = dur + 's';
          e.style.animationDelay = -Math.random() * dur + 's';
          const s = 3 + Math.random() * 5;
          e.style.width = s + 'px';
          e.style.height = s + 'px';
          e.style.opacity = String(0.5 + Math.random() * 0.5);
          wrap.appendChild(e);
        }
      })();
    </script>
    <script type="module" src="./render.js"></script>
  </body>
</html>
