<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Forgefall — a molten match-3</title>
<style>
  :root {
    --cell: 62px;
    --gap: 6px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    color: #ffe9d2;
    overflow-x: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 115%, rgba(255, 150, 40, 0.55), rgba(255, 90, 20, 0.18) 35%, transparent 60%),
      radial-gradient(ellipse at 15% -10%, rgba(120, 20, 10, 0.5), transparent 55%),
      radial-gradient(ellipse at 85% 0%, rgba(80, 10, 30, 0.45), transparent 55%),
      linear-gradient(180deg, #0c0607 0%, #1a0906 35%, #2a0d08 62%, #170604 100%);
    background-color: #120705;
    transition: background 900ms ease, filter 900ms ease;
  }

  /* ---- Stage backdrops ---- */
  body.stage-0 {
    background:
      radial-gradient(ellipse at 50% 120%, rgba(255, 140, 60, 0.35), transparent 55%),
      radial-gradient(ellipse at 20% 0%, rgba(90, 90, 100, 0.35), transparent 55%),
      linear-gradient(180deg, #0a0a0c 0%, #1c1a1c 40%, #2c1712 75%, #150a08 100%);
  }
  body.stage-1 {
    background:
      radial-gradient(ellipse at 50% 118%, rgba(255, 150, 30, 0.6), transparent 55%),
      radial-gradient(ellipse at 80% -5%, rgba(255, 90, 10, 0.35), transparent 55%),
      linear-gradient(180deg, #170905 0%, #2c1006 35%, #481505 65%, #200a03 100%);
  }
  body.stage-2 {
    background:
      radial-gradient(ellipse at 50% 120%, rgba(255, 60, 30, 0.65), transparent 55%),
      radial-gradient(ellipse at 15% 0%, rgba(160, 10, 20, 0.4), transparent 55%),
      linear-gradient(180deg, #1a0304 0%, #3a0505 40%, #5c0a08 70%, #200202 100%);
  }
  body.stage-3 {
    background:
      radial-gradient(ellipse at 50% 118%, rgba(255, 110, 30, 0.4), transparent 55%),
      radial-gradient(ellipse at 85% 0%, rgba(90, 30, 120, 0.35), transparent 55%),
      linear-gradient(180deg, #050206 0%, #100810 35%, #1c0d10 65%, #08040a 100%);
  }
  body.stage-4 {
    background:
      radial-gradient(ellipse at 50% 120%, rgba(190, 220, 40, 0.35), transparent 55%),
      radial-gradient(ellipse at 20% -5%, rgba(140, 180, 20, 0.3), transparent 55%),
      linear-gradient(180deg, #0c0f04 0%, #1b2006 38%, #2c3308 68%, #10130a 100%);
  }
  body.stage-5 {
    background:
      radial-gradient(ellipse at 50% 118%, rgba(255, 245, 210, 0.65), transparent 55%),
      radial-gradient(ellipse at 50% -10%, rgba(255, 220, 150, 0.35), transparent 55%),
      linear-gradient(180deg, #1a1004 0%, #2e1a06 35%, #4a2606 65%, #1a0f04 100%);
  }

  .embers {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .ember {
    position: absolute;
    bottom: -5%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff2c8 0%, #ffb347 40%, #ff5a1f 75%, transparent 100%);
    box-shadow: 0 0 8px 2px rgba(255, 140, 40, 0.8);
    animation: rise linear infinite;
    opacity: 0.85;
  }
  @keyframes rise {
    0%   { transform: translate(0, 0) scale(1); opacity: 0; }
    10%  { opacity: 0.9; }
    100% { transform: translate(var(--drift, 20px), -115vh) scale(0.4); opacity: 0; }
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 18px 20px 28px;
  }

  .hud {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    background: linear-gradient(180deg, rgba(40, 16, 10, 0.75), rgba(20, 6, 4, 0.75));
    border: 1px solid rgba(255, 150, 60, 0.25);
    border-radius: 16px;
    padding: 10px 20px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 200, 120, 0.08);
  }

  .hud h1 {
    margin: 0;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    background: linear-gradient(180deg, #ffe3ab, #ff8a3d 60%, #ff4d1f);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 18px rgba(255, 120, 40, 0.35);
    text-transform: uppercase;
  }

  .stage-name {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ffb066;
    opacity: 0.9;
    min-width: 9em;
    text-align: center;
  }

  .scores {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .score-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 4.6em;
  }
  .score-box .label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #d99a6c;
    opacity: 0.8;
  }
  .score-box span[id] {
    font-size: 1.15rem;
    font-weight: 700;
    color: #ffe6c6;
    text-shadow: 0 0 8px rgba(255, 160, 60, 0.4);
  }

  .mult-badge {
    font-weight: 800;
    font-size: 1rem;
    padding: 4px 10px;
    border-radius: 999px;
    background: linear-gradient(180deg, #ffcf7d, #ff8a24);
    color: #3a1400;
    box-shadow: 0 0 10px rgba(255, 150, 40, 0.6), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: transform 160ms ease;
  }
  .mult-badge.pulse { animation: multPulse 420ms ease; }
  @keyframes multPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }

  #newGameBtn {
    font: inherit;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255, 190, 120, 0.5);
    background: linear-gradient(180deg, #4a1c0c, #260c05);
    color: #ffd9ab;
    cursor: pointer;
    box-shadow: 0 3px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,180,110,0.15);
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }
  #newGameBtn:hover {
    background: linear-gradient(180deg, #632710, #3a1206);
  }
  #newGameBtn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }

  .board-wrap {
    position: relative;
    padding: 16px;
    border-radius: 22px;
    background:
      linear-gradient(155deg, #2b1712 0%, #1a0c09 45%, #100604 100%);
    box-shadow:
      0 22px 45px rgba(0, 0, 0, 0.65),
      0 4px 0 rgba(0,0,0,0.4),
      inset 0 2px 0 rgba(255, 170, 100, 0.12),
      inset 0 0 40px rgba(0, 0, 0, 0.55);
    border: 2px solid rgba(255, 140, 60, 0.22);
  }

  .board {
    position: relative;
    display: grid;
    grid-template-columns: repeat(8, var(--cell));
    grid-template-rows: repeat(8, var(--cell));
    gap: var(--gap);
    padding: 10px;
    border-radius: 14px;
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.25) 0 2px, transparent 2px 6px),
      radial-gradient(ellipse at 50% 0%, rgba(255, 110, 40, 0.12), transparent 60%),
      linear-gradient(180deg, #0c0605, #050302);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255, 100, 30, 0.08);
  }

  .cell {
    position: relative;
    width: var(--cell);
    height: var(--cell);
    border-radius: 10px;
    background: linear-gradient(160deg, rgba(255,255,255,0.03), rgba(0,0,0,0.35));
    box-shadow: inset 0 0 0 1px rgba(255, 150, 70, 0.08), inset 0 2px 6px rgba(0,0,0,0.6);
    touch-action: none;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .cell:active { cursor: grabbing; }

  .gem {
    position: absolute;
    inset: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
    transition: transform 140ms cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }

  .gem-shape {
    position: relative;
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55));
    animation: idleLife 3.6s ease-in-out infinite;
    animation-delay: var(--idle-delay, 0s);
  }
  @keyframes idleLife {
    0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55)) brightness(1); }
    50% { transform: scale(1.045) rotate(1.5deg); filter: drop-shadow(0 3px 6px rgba(0,0,0,0.55)) brightness(1.12); }
  }

  .gem-shape::before {
    /* highlight */
    content: '';
    position: absolute;
    top: 12%;
    left: 16%;
    width: 38%;
    height: 30%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.85), rgba(255,255,255,0) 70%);
    border-radius: 50%;
    z-index: 3;
    mix-blend-mode: screen;
  }
  .gem-shape::after {
    /* shadow */
    content: '';
    position: absolute;
    bottom: 8%;
    right: 10%;
    width: 55%;
    height: 40%;
    background: radial-gradient(ellipse, rgba(0,0,0,0.55), rgba(0,0,0,0) 70%);
    border-radius: 50%;
    z-index: 2;
  }

  .facet {
    position: absolute;
    inset: 0;
    background: inherit;
  }

  /* ---- six gem silhouettes ---- */
  .t0 .facet { clip-path: circle(46% at 50% 50%); background: radial-gradient(circle at 35% 30%, #ffe9a8, #ffb23d 45%, #ff6a00 82%, #b93a00); }
  .t1 .facet { clip-path: polygon(50% 2%, 93% 25%, 93% 75%, 50% 98%, 7% 75%, 7% 25%); background: linear-gradient(160deg, #6a4a7a 0%, #2c1730 35%, #150910 70%, #0a0508 100%); }
  .t2 .facet { clip-path: polygon(50% 0%, 74% 30%, 62% 30%, 88% 62%, 58% 62%, 70% 100%, 30% 78%, 46% 78%, 12% 46%, 40% 46%, 24% 12%); background: radial-gradient(circle at 40% 25%, #ffd27a, #ff6a1f 40%, #d81f0f 75%, #7a0d05); }
  .t3 .facet { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); background: linear-gradient(160deg, #f2ffb0, #c7e639 40%, #8fae12 75%, #52660a); }
  .t4 .facet { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); background: linear-gradient(150deg, #b7b0ac 0%, #756c68 40%, #47403d 75%, #241f1d); }
  .t5 .facet { clip-path: polygon(50% 0%, 63% 38%, 100% 50%, 63% 62%, 50% 100%, 37% 62%, 0% 50%, 37% 38%); background: radial-gradient(circle at 40% 30%, #f2ffff, #a6f3ff 40%, #35c2e8 75%, #0d6e94); }

  .gem.dragging { transition: none; z-index: 20; }
  .gem.hinting .gem-shape { animation: hintPulse 1.1s ease-in-out infinite; }
  @keyframes hintPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 3px rgba(255,255,255,0.15)); }
    50% { transform: scale(1.14); filter: drop-shadow(0 0 10px rgba(255,240,200,0.85)); }
  }

  .gem.clearing .gem-shape { animation: clearPop 260ms ease forwards; }
  @keyframes clearPop {
    0% { transform: scale(1); opacity: 1; filter: brightness(1) drop-shadow(0 0 0 rgba(255,200,80,0)); }
    55% { transform: scale(1.35); opacity: 1; filter: brightness(2.4) drop-shadow(0 0 14px rgba(255,200,80,0.9)); }
    100% { transform: scale(0.2); opacity: 0; }
  }

  .gem.featured .gem-shape { box-shadow: none; }
  .gem.featured::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(255, 235, 160, 0.85);
    box-shadow: 0 0 10px rgba(255, 220, 130, 0.8);
    animation: ringSpin 2.4s linear infinite;
  }
  @keyframes ringSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .float-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 30;
    overflow: visible;
  }

  .float-gain {
    position: absolute;
    left: 50%;
    top: 42%;
    transform: translate(-50%, 0);
    font-weight: 800;
    font-size: 2.1rem;
    color: #ffdf9e;
    text-shadow: 0 0 10px rgba(255, 150, 40, 0.9), 0 2px 3px rgba(0,0,0,0.7);
    animation: floatUp 1.5s ease forwards;
    white-space: nowrap;
    text-align: center;
  }
  .float-gain .tag {
    display: block;
    font-size: 0.95rem;
    font-weight: 700;
    margin-top: 2px;
    color: #ffb347;
  }
  .float-gain .bonus-tag {
    display: block;
    font-size: 1rem;
    font-weight: 800;
    margin-top: 2px;
    color: #7ef2ff;
    text-shadow: 0 0 8px rgba(120, 230, 255, 0.9);
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, 10px) scale(0.8); }
    15% { opacity: 1; transform: translate(-50%, -6px) scale(1.08); }
    30% { transform: translate(-50%, -10px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -70px) scale(1); }
  }

  .game-over-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(6, 2, 2, 0.72);
    border-radius: 14px;
    z-index: 40;
    backdrop-filter: blur(2px);
    transition: opacity 200ms ease;
  }
  .game-over-overlay.hidden { display: none; }
  .go-panel {
    text-align: center;
    padding: 26px 34px;
    border-radius: 16px;
    background: linear-gradient(180deg, #34140a, #150705);
    border: 1px solid rgba(255, 150, 70, 0.4);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .go-title {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #ff9e52;
    margin-bottom: 6px;
    text-shadow: 0 0 12px rgba(255, 100, 30, 0.6);
  }
  .go-sub { color: #e9c19a; margin-bottom: 10px; font-size: 0.85rem; }
  .go-score { font-size: 1.1rem; font-weight: 700; color: #ffe6c6; }

  @media (max-width: 560px) {
    :root { --cell: 38px; --gap: 4px; }
    .hud { gap: 10px; padding: 8px 12px; }
    .hud h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body class="stage-0">
  <div class="embers" id="embers"></div>
  <div id="app">
    <div class="hud">
      <h1>Forgefall</h1>
      <div class="stage-name" id="stageName">Ashfall Vents</div>
      <div class="scores">
        <div class="score-box">
          <span class="label">Score</span>
          <span id="score">0</span>
        </div>
        <div class="score-box">
          <span class="label">Best</span>
          <span id="best">0</span>
        </div>
        <div class="mult-badge" id="multBadge">×1</div>
      </div>
      <button id="newGameBtn" data-testid="new-game" type="button">New Game</button>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="float-layer" id="floatLayer"></div>
      <div class="game-over-overlay hidden" id="gameOverOverlay">
        <div class="go-panel">
          <div class="go-title">The Forge Goes Cold</div>
          <div class="go-sub">No moves remain in the embers.</div>
          <div class="go-score">Score: <span id="goScore">0</span></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="render.js"></script>
</body>
</html>
