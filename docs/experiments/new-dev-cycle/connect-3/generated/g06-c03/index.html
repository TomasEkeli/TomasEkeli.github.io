<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Bazaar of Jewels</title>
<style>
  :root {
    --cell: 62px;
    --gap: 6px;
    --board-pad: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI', 'Trebuchet MS', system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 12px;
    color: #ffe9c7;
    background: #1a0f1f;
    position: relative;
  }

  /* ---------- backdrop: dusk-desert sky with parallax layers ---------- */
  #sky {
    position: fixed;
    inset: 0;
    z-index: -3;
    overflow: hidden;
    background: #1a0f1f;
  }
  .sky-bg {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 2.4s ease;
  }
  .sky-bg.on { opacity: 1; }
  #stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 15%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 25% 8%, #fff, transparent),
      radial-gradient(1px 1px at 40% 22%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 60% 5%, #fff, transparent),
      radial-gradient(1px 1px at 75% 18%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 85% 10%, #fff, transparent),
      radial-gradient(1px 1px at 92% 25%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 15% 30%, #fff, transparent),
      radial-gradient(1px 1px at 50% 12%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 30% 28%, #fff, transparent);
    opacity: var(--star-opacity, 0.55);
    transition: opacity 2.2s ease;
    animation: twinkle 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: calc(var(--star-opacity, 0.55) * 0.5); } to { opacity: var(--star-opacity, 0.55); } }

  #sun {
    position: absolute;
    left: 50%; top: 30%;
    width: 220px; height: 220px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 50% 50%, #ffe9a8 0%, #ffbf5e 35%, rgba(255,140,60,0.35) 60%, transparent 72%);
    filter: blur(1px);
    transition: top 2.2s ease, opacity 2.2s ease, left 2.2s ease;
    opacity: var(--sun-opacity, 1);
  }

  #dunes {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 46%;
    background:
      linear-gradient(180deg, transparent 0%, rgba(20,8,24,0.0) 10%, var(--dune-color, #3a1930) 45%),
      radial-gradient(120% 60% at 20% 100%, var(--dune-color2, #23102a) 0%, transparent 60%),
      radial-gradient(120% 70% at 80% 100%, var(--dune-color2, #23102a) 0%, transparent 65%);
    clip-path: polygon(0% 60%, 8% 52%, 20% 58%, 32% 45%, 46% 55%, 58% 42%, 72% 52%, 86% 40%, 100% 50%, 100% 100%, 0% 100%);
    transition: background 2.2s ease;
  }
  #dunes2 {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 30%;
    background: var(--dune-color3, #150a1c);
    clip-path: polygon(0% 70%, 10% 62%, 24% 70%, 38% 55%, 52% 66%, 66% 50%, 80% 62%, 92% 48%, 100% 58%, 100% 100%, 0% 100%);
    opacity: 0.9;
    transition: background 2.2s ease;
  }
  .silhouette {
    position: absolute;
    bottom: 6%;
    width: 70px; height: 90px;
    opacity: 0.75;
    background: var(--dune-color3, #150a1c);
    clip-path: polygon(48% 0%, 52% 0%, 55% 18%, 60% 20%, 62% 34%, 58% 36%, 58% 100%, 42% 100%, 42% 36%, 38% 34%, 40% 20%, 45% 18%);
  }
  .silhouette.s1 { left: 8%; transform: scale(0.8); }
  .silhouette.s2 { left: 20%; transform: scale(1.15); }
  .silhouette.s3 { right: 12%; transform: scale(0.95); }
  .dome {
    position: absolute; bottom: 5%;
    width: 46px; height: 46px;
    border-radius: 50% 50% 0 0;
    background: var(--dune-color3, #150a1c);
    opacity: 0.7;
  }
  .dome::after {
    content: ""; position: absolute; left: 50%; top: -14px; width: 4px; height: 16px;
    background: var(--dune-color3, #150a1c); transform: translateX(-50%);
  }
  .dome.d1 { left: 35%; }
  .dome.d2 { right: 30%; width: 34px; height: 34px; }

  /* ---------- layout ---------- */
  #app {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 640px;
  }

  header {
    text-align: center;
    padding: 8px 22px 10px;
    border-radius: 16px;
    background: radial-gradient(120% 160% at 50% 30%, rgba(20,10,20,0.55), rgba(20,10,20,0.28) 65%, transparent 100%);
  }
  h1 {
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(26px, 5vw, 38px);
    letter-spacing: 2px;
    background: linear-gradient(180deg, #ffe9b0, #f0a83a 60%, #d9722f);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-stroke: 0.6px rgba(40, 16, 8, 0.55);
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.55)) drop-shadow(0 0 14px rgba(0,0,0,0.4));
  }
  #stageName {
    margin-top: 2px;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ffe6b8;
    text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6);
  }

  #hud {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    background: linear-gradient(180deg, rgba(60,30,20,0.55), rgba(30,12,20,0.55));
    border: 1px solid rgba(255,200,120,0.25);
    border-radius: 14px;
    padding: 8px 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    backdrop-filter: blur(3px);
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 66px;
    padding: 2px 8px;
  }
  .stat .label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #d9a468;
    opacity: 0.85;
  }
  .stat .value {
    font-size: 19px;
    font-weight: 700;
    color: #fff2d9;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    font-variant-numeric: tabular-nums;
  }
  #multVal.hot { color: #ff9a4d; text-shadow: 0 0 8px rgba(255,140,50,0.8); }

  #newGameBtn {
    appearance: none;
    border: 1px solid rgba(255,210,140,0.55);
    background: linear-gradient(180deg, #e8a13a, #b5601f);
    color: #2a1206;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 9px 16px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 3px 0 #7c3f11, 0 6px 10px rgba(0,0,0,0.35);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  #newGameBtn:active { transform: translateY(2px); box-shadow: 0 1px 0 #7c3f11, 0 3px 6px rgba(0,0,0,0.3); }
  #newGameBtn:hover { filter: brightness(1.08); }

  /* ---------- board frame: lifted, carved-stone look ---------- */
  #boardFrame {
    position: relative;
    padding: 16px;
    border-radius: 22px;
    background:
      radial-gradient(120% 140% at 30% 0%, rgba(255,220,160,0.10), transparent 55%),
      linear-gradient(160deg, #7a5230 0%, #4c3018 45%, #33200f 100%);
    box-shadow:
      0 22px 45px rgba(0,0,0,0.55),
      0 4px 0 rgba(255,255,255,0.06) inset,
      0 -6px 18px rgba(0,0,0,0.5) inset;
    border: 1px solid rgba(255,205,140,0.28);
  }
  #boardFrame::before {
    content: "";
    position: absolute; inset: 6px;
    border-radius: 16px;
    border: 1px solid rgba(255,225,180,0.18);
    pointer-events: none;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 10px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 10px);
  }

  #board {
    position: relative;
    width: calc(var(--cols) * var(--cell) + (var(--cols) - 1) * var(--gap));
    height: calc(var(--rows) * var(--cell) + (var(--rows) - 1) * var(--gap));
    border-radius: 12px;
    overflow: visible;
    background: linear-gradient(160deg, #d8b47a, #a97f43 55%, #8a6633);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.45), inset 0 -2px 6px rgba(255,235,190,0.15);
    touch-action: none;
    user-select: none;
  }

  #cellLayer {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(var(--cols), var(--cell));
    grid-template-rows: repeat(var(--rows), var(--cell));
    gap: var(--gap);
    padding: 0;
  }

  .cell {
    position: relative;
    border-radius: 9px;
    background: linear-gradient(155deg, rgba(255,240,210,0.16), rgba(60,35,15,0.28));
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.18), inset 0 -2px 4px rgba(0,0,0,0.28);
    cursor: grab;
  }
  .cell:nth-child(odd) { background: linear-gradient(155deg, rgba(255,240,210,0.10), rgba(60,35,15,0.30)); }
  .cell.hinted::after {
    content: "";
    position: absolute; inset: -3px;
    border-radius: 12px;
    box-shadow: 0 0 0 2px rgba(255, 235, 150, 0.0);
    animation: hintpulse 1.1s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintpulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 235, 150, 0.0); }
    50% { box-shadow: 0 0 0 3px rgba(255, 235, 150, 0.55); }
  }

  #gemLayer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .gem {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    top: 0; left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
  }

  .gem-shape {
    position: relative;
    width: 82%;
    height: 82%;
    animation: bob 3.4s ease-in-out infinite;
    animation-delay: var(--bob-delay, 0s);
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
    50% { transform: translateY(-3%) rotate(calc(var(--rot, 0deg) + 2deg)); }
  }

  .gem-face {
    position: absolute; inset: 0;
    background: var(--fill);
    box-shadow:
      inset -4px -6px 8px rgba(0,0,0,0.45),
      inset 4px 5px 7px rgba(255,255,255,0.55),
      0 3px 6px rgba(0,0,0,0.45);
  }
  .gem-shine {
    position: absolute;
    left: 14%; top: 10%;
    width: 46%; height: 30%;
    background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0));
    border-radius: 50%;
    filter: blur(0.4px);
    mix-blend-mode: screen;
  }
  .gem-glint {
    position: absolute; inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.75) 46%, transparent 60%);
    background-size: 220% 220%;
    background-position: 130% 0%;
    opacity: 0;
    animation: glintsweep 4.2s ease-in-out infinite;
    animation-delay: var(--glint-delay, 0s);
  }
  @keyframes glintsweep {
    0%, 60%, 100% { opacity: 0; background-position: 130% 0%; }
    68% { opacity: 0.9; }
    80% { opacity: 0; background-position: -30% 0%; }
  }

  /* shapes via clip-path — distinct silhouette per colour (colour-blind safe) */
  .shape-diamond .gem-face,
  .shape-diamond .gem-shine,
  .shape-diamond .gem-glint { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

  .shape-hex .gem-face,
  .shape-hex .gem-shine,
  .shape-hex .gem-glint { clip-path: polygon(25% 4%, 75% 4%, 100% 50%, 75% 96%, 25% 96%, 0% 50%); }

  .shape-shield .gem-face,
  .shape-shield .gem-shine,
  .shape-shield .gem-glint { clip-path: polygon(50% 2%, 95% 32%, 82% 96%, 18% 96%, 5% 32%); }

  .shape-circle .gem-face,
  .shape-circle .gem-shine,
  .shape-circle .gem-glint { clip-path: circle(48% at 50% 50%); border-radius: 50%; }
  .shape-circle .gem-face::before {
    content: "";
    position: absolute; inset: 0;
    background:
      conic-gradient(from 0deg, rgba(255,255,255,0.18) 0 8%, transparent 8% 25%,
      rgba(255,255,255,0.14) 25% 33%, transparent 33% 50%,
      rgba(255,255,255,0.18) 50% 58%, transparent 58% 75%,
      rgba(255,255,255,0.14) 75% 83%, transparent 83% 100%);
    border-radius: 50%;
  }

  .shape-octagon .gem-face,
  .shape-octagon .gem-shine,
  .shape-octagon .gem-glint { clip-path: polygon(30% 4%, 70% 4%, 96% 30%, 96% 70%, 70% 96%, 30% 96%, 4% 70%, 4% 30%); }

  .shape-drop .gem-face,
  .shape-drop .gem-shine,
  .shape-drop .gem-glint {
    clip-path: none;
    border-radius: 50% 50% 50% 6%;
    transform: rotate(-45deg);
  }
  .shape-drop .gem-shine { left: 20%; top: 16%; width: 40%; height: 26%; }

  .gem.featured .gem-shape::before {
    content: "";
    position: absolute; inset: -22%;
    border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(255,244,190,0.0);
    animation: featurering 1.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes featurering {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,244,190,0.0); }
    50% { box-shadow: 0 0 0 3px rgba(255,244,190,0.65); }
  }

  .gem.matched .gem-shape { animation: matchpulse 0.2s ease-out forwards; }
  @keyframes matchpulse {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.35); filter: brightness(1.9) saturate(1.3); }
    100% { transform: scale(0.2); filter: brightness(2.4); opacity: 0; }
  }

  .gem.dragging { z-index: 30; }
  .gem.dragging .gem-shape { animation: none; transform: scale(1.08); }

  /* ---------- floating score feedback ---------- */
  #floatLayer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 40;
    overflow: visible;
  }
  .pop {
    position: absolute;
    transform: translate(-50%, -50%);
    text-align: center;
    font-family: Georgia, serif;
    white-space: nowrap;
    animation: popfloat 1.5s cubic-bezier(0.15, 0.6, 0.3, 1) forwards;
  }
  .pop .gain {
    font-size: 30px;
    font-weight: 800;
    color: #ffe9a8;
    text-shadow: 0 0 10px rgba(255,170,60,0.9), 0 2px 4px rgba(0,0,0,0.6);
  }
  .pop .mult {
    display: block;
    font-size: 15px;
    color: #ffb15c;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .pop .bonus {
    display: inline-block;
    margin-top: 2px;
    font-size: 14px;
    font-weight: 700;
    color: #8fe3c0;
    background: rgba(15,45,35,0.55);
    border: 1px solid rgba(150,255,210,0.5);
    border-radius: 8px;
    padding: 1px 7px;
    text-shadow: none;
  }
  @keyframes popfloat {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(0.6); }
    15% { opacity: 1; transform: translate(-50%, -70%) scale(1.08); }
    30% { transform: translate(-50%, -80%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -160%) scale(1); }
  }

  /* ---------- game over overlay ---------- */
  #gameOverOverlay {
    position: absolute; inset: 16px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 8, 14, 0.72);
    backdrop-filter: blur(2px);
    z-index: 50;
    animation: fadein 0.4s ease;
  }
  #gameOverOverlay[hidden] { display: none; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  #gameOverOverlay .panel {
    text-align: center;
    padding: 22px 30px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(90,45,25,0.85), rgba(40,18,20,0.9));
    border: 1px solid rgba(255,205,140,0.35);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  #gameOverOverlay h2 {
    margin: 0 0 6px;
    font-family: Georgia, serif;
    color: #ffdca0;
    letter-spacing: 1px;
  }
  #gameOverOverlay p { margin: 0 0 4px; color: #f0d6b8; font-size: 14px; }
  #gameOverOverlay .hint-txt { font-size: 12px; color: #d9a468; opacity: 0.9; }

  /* ---------- legend ---------- */
  #legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 11px;
    color: #e6c690;
    opacity: 0.85;
    max-width: 560px;
  }
  #legend .item { display: flex; align-items: center; gap: 5px; }
  #legend .swatch { width: 14px; height: 14px; border-radius: 3px; flex: none; box-shadow: inset 0 0 2px rgba(0,0,0,0.5); }

  @media (max-width: 520px) {
    :root { --cell: 38px; --gap: 4px; }
    #legend { font-size: 9px; }
  }
</style>
</head>
<body>
  <div id="sky">
    <div class="sky-bg" id="skyA"></div>
    <div class="sky-bg" id="skyB"></div>
    <div id="stars"></div>
    <div id="sun"></div>
    <div class="dome d1"></div>
    <div class="dome d2"></div>
    <div class="silhouette s1"></div>
    <div class="silhouette s2"></div>
    <div class="silhouette s3"></div>
    <div id="dunes2"></div>
    <div id="dunes"></div>
  </div>

  <div id="app">
    <header>
      <h1>Bazaar of Jewels</h1>
      <div id="stageName">High Noon Bazaar</div>
    </header>

    <div id="hud">
      <div class="stat"><span class="label">Score</span><span class="value" id="scoreVal">0</span></div>
      <div class="stat"><span class="label">Best</span><span class="value" id="bestVal">0</span></div>
      <div class="stat"><span class="label">×Combo</span><span class="value" id="multVal">×1</span></div>
      <button id="newGameBtn" data-testid="new-game" type="button">New Game</button>
    </div>

    <div id="boardFrame">
      <div id="board">
        <div id="cellLayer"></div>
        <div id="gemLayer"></div>
        <div id="floatLayer"></div>
      </div>
      <div id="gameOverOverlay" hidden>
        <div class="panel">
          <h2>The Bazaar Closes</h2>
          <p>No trades remain on the board.</p>
          <p class="hint-txt">Press New Game to reopen the stalls.</p>
        </div>
      </div>
    </div>

    <div id="legend"></div>
  </div>

  <script type="module" src="./render.js"></script>
</body>
</html>
