<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wildflower Match - A Match-3 Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Arial', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
      overflow: hidden;
    }

    body {
      position: relative;
      color: #333;
    }

    /* Ambient background elements */
    #background-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .butterfly {
      position: absolute;
      font-size: 24px;
      animation: flutter 4s ease-in-out infinite;
      opacity: 0.7;
    }

    .pollen {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 215, 0, 0.6);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    @keyframes flutter {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-20px) translateX(10px); }
      50% { transform: translateY(-40px) translateX(0); }
      75% { transform: translateY(-20px) translateX(-10px); }
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(200px) translateX(30px); opacity: 0; }
    }

    #container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 30px;
      color: white;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 0, 0, 0.2);
      letter-spacing: 2px;
    }

    #board {
      position: relative;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    /* Responsive sizing */
    @media (min-width: 600px) {
      #container {
        min-width: 550px;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
        margin-bottom: 20px;
      }

      #container {
        width: 100%;
        padding: 10px;
      }
    }

    /* Flower decorations */
    .flower {
      position: absolute;
      font-size: 30px;
      opacity: 0.6;
      animation: sway 4s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(2deg); }
    }
  </style>
</head>
<body>
  <div id="background-effects"></div>
  <div id="container"></div>

  <script type="module">
    import { initGame } from './render.js';

    // Add ambient background elements
    const bgEffects = document.getElementById('background-effects');

    // Add butterflies
    const butterflies = ['🦋', '🦋', '🦋'];
    butterflies.forEach((emoji, i) => {
      const butterfly = document.createElement('div');
      butterfly.className = 'butterfly';
      butterfly.textContent = emoji;
      butterfly.style.left = Math.random() * 100 + '%';
      butterfly.style.top = Math.random() * 50 + '%';
      butterfly.style.animationDelay = i * 2 + 's';
      butterfly.style.animationDuration = (3 + Math.random() * 2) + 's';
      bgEffects.appendChild(butterfly);
    });

    // Add pollen sparkles
    for (let i = 0; i < 20; i++) {
      const pollen = document.createElement('div');
      pollen.className = 'pollen';
      pollen.style.left = Math.random() * 100 + '%';
      pollen.style.top = Math.random() * 100 + '%';
      pollen.style.animationDelay = Math.random() * 8 + 's';
      pollen.style.animationDuration = (8 + Math.random() * 4) + 's';
      bgEffects.appendChild(pollen);
    }

    // Add flowers
    const flowers = ['🌼', '🌸', '🌻', '🌷'];
    for (let i = 0; i < 4; i++) {
      const flower = document.createElement('div');
      flower.className = 'flower';
      flower.textContent = flowers[i % flowers.length];
      flower.style.left = (15 + i * 20) + '%';
      flower.style.bottom = (5 + Math.random() * 15) + '%';
      flower.style.animationDelay = i * 0.5 + 's';
      bgEffects.appendChild(flower);
    }

    // Initialize game
    const container = document.getElementById('container');

    const title = document.createElement('h1');
    title.textContent = '🌸 Wildflower Match 🌸';
    container.appendChild(title);

    initGame(container);
  </script>
</body>
</html>
