<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match-3 Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0f2e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #FFB700, #FF006E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(255, 183, 0, 0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hud {
      display: flex;
      gap: 2rem;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .score-label {
      color: #FFB700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #score {
      font-size: 1.8rem;
      color: #00F5FF;
      text-shadow: 0 0 15px #00F5FF;
      min-width: 80px;
      text-align: right;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 4px;
      width: min(90vw, 480px);
      height: min(90vw, 480px);
      background: rgba(10, 14, 39, 0.8);
      padding: 12px;
      border-radius: 12px;
      border: 2px solid rgba(255, 183, 0, 0.4);
      box-shadow: 0 0 30px rgba(255, 183, 0, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(30, 30, 60, 0.6);
      border-radius: 8px;
      cursor: grab;
      user-select: none;
      transition: background-color 0.1s;
      border: 1px solid rgba(255, 183, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .cell:active {
      cursor: grabbing;
    }

    .cell:hover {
      background: rgba(40, 40, 80, 0.8);
      border-color: rgba(255, 183, 0, 0.4);
    }

    .gem {
      width: 85%;
      height: 85%;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor, inset 0 -2px 5px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s, opacity 0.2s;
    }

    .gem:hover {
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .hud {
        flex-direction: column;
        gap: 1rem;
      }

      .container {
        gap: 1.5rem;
        padding: 1rem;
      }
    }

    @media (prefers-color-scheme: light) {
      html, body {
        background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 50%, #f0f0f0 100%);
      }

      #board {
        background: rgba(240, 240, 240, 0.9);
        border: 2px solid rgba(255, 183, 0, 0.6);
        box-shadow: 0 0 30px rgba(255, 183, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
      }

      .cell {
        background: rgba(220, 220, 240, 0.8);
        border: 1px solid rgba(255, 183, 0, 0.3);
      }

      .cell:hover {
        background: rgba(200, 200, 230, 0.9);
        border-color: rgba(255, 183, 0, 0.6);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Match-3</h1>
    <div class="hud">
      <span class="score-label">Score:</span>
      <div id="score">0</div>
    </div>
    <div id="board"></div>
  </div>

  <script type="module">
    import { initializeGame, getTestInterface } from './render.js';

    // Initialize game
    initializeGame();

    // Expose test interface
    window.__test = getTestInterface();
  </script>
</body>
</html>
