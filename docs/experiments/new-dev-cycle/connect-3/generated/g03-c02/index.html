<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Match Three</title>
  <style>
    :root {
      --accent: #ef9d5c;         /* one warm accent, used sparingly */
      --bg: #f4f5f7;
      --bg-a: #fdf3ec;
      --bg-b: #eef2fb;
      --surface: #ffffff;
      --ink: #2b2f36;
      --muted: #8b9099;
      --board-bg: #eef0f6;
      --gap: 10px;
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: linear-gradient(160deg, var(--bg-a), var(--bg-b));
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 4vh, 40px);
      padding: 24px;
      -webkit-user-select: none;
      user-select: none;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 650;
      letter-spacing: -0.01em;
    }

    header h1 .dot { color: var(--accent); }

    .hud {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-variant-numeric: tabular-nums;
    }

    .hud .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .hud .value {
      font-size: 1.5rem;
      font-weight: 650;
    }

    .stage {
      position: relative;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(var(--cols), 1fr);
      grid-template-rows: repeat(var(--rows), 1fr);
      gap: var(--gap);
      width: min(88vw, 78vh, 540px);
      height: min(88vw, 78vh, 540px);
      padding: var(--gap);
      background: var(--board-bg);
      border-radius: var(--radius);
      touch-action: none;
    }

    .gem {
      border-radius: 12px;
      transition: transform 140ms cubic-bezier(.4, 0, .2, 1);
      box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 0.18);
      cursor: grab;
    }
    .gem:active { cursor: grabbing; }

    .gem.clearing {
      animation: pop var(--clear, 200ms) ease forwards;
    }

    .gem.dropping {
      animation: dropin var(--drop, 220ms) cubic-bezier(.3, .7, .3, 1) both;
    }

    @keyframes pop {
      40%  { transform: scale(1.12); }
      100% { transform: scale(0); opacity: 0; }
    }

    @keyframes dropin {
      0%   { transform: translateY(-38%); opacity: 0; }
      60%  { opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }

    #float-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .float-gain {
      position: absolute;
      font-size: 2.4rem;
      font-weight: 750;
      color: var(--accent);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
      animation: floatup 1.4s ease-out forwards;
    }

    @keyframes floatup {
      0%   { transform: translateY(10px) scale(0.8); opacity: 0; }
      15%  { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-70px) scale(1); opacity: 0; }
    }

    footer {
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16181d;
        --bg-a: #1b1d22;
        --bg-b: #14161c;
        --surface: #20242b;
        --ink: #e8eaee;
        --muted: #868c96;
        --board-bg: #23272f;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Match<span class="dot">.</span>Three</h1>
    <div class="hud">
      <span class="label">Score</span>
      <span class="value" id="total">0</span>
    </div>
  </header>

  <div class="stage">
    <div id="board"></div>
    <div id="float-layer"></div>
  </div>

  <footer>Slide a gem toward a neighbour to swap.</footer>

  <script type="module" src="./render.js"></script>
</body>
</html>
