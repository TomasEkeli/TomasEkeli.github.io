<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Amber Hollow — a match-3</title>
<style>
  :root {
    --accent: #f2a33d;
    --accent-2: #ffcf7a;
    --ink: #2c1608;
    --paper: #fff4e0;
    --panel-bg: linear-gradient(160deg, rgba(58,32,16,.86), rgba(30,15,6,.92));
    --board-top: #5a3c22;
    --board-bottom: #2a1608;
    --sky-top: #ffe3a0;
    --sky-mid: #f7ad55;
    --sky-bottom: #a95a26;
    --sun: #fff3c2;
    --tree: #3a1f10;
    --leaf-a: #d2691e;
    --leaf-b: #c23b2b;
    --leaf-c: #e0a83a;
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, 'Times New Roman', serif;
    color: var(--paper);
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #150a05;
    position: relative;
  }

  /* ---------- backdrop scene ---------- */
  #scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 42%, var(--sky-bottom) 78%, #180d06 100%);
    transition: background 1.4s ease;
    overflow: hidden;
  }
  #sun {
    position: absolute;
    left: 50%;
    top: 18%;
    width: 34vmax;
    height: 34vmax;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, var(--sun) 0%, rgba(255,220,140,.55) 35%, rgba(255,220,140,0) 70%);
    filter: blur(2px);
    transition: background 1.4s ease, opacity 1.4s ease;
    opacity: .95;
  }
  #treeline {
    position: absolute;
    left: -5%; right: -5%; bottom: -2%;
    height: 42%;
    background:
      radial-gradient(120px 220px at 8% 100%, var(--tree) 60%, transparent 62%),
      radial-gradient(160px 260px at 22% 100%, var(--tree) 60%, transparent 62%),
      radial-gradient(140px 240px at 40% 100%, var(--tree) 60%, transparent 62%),
      radial-gradient(180px 280px at 58% 100%, var(--tree) 60%, transparent 62%),
      radial-gradient(140px 230px at 74% 100%, var(--tree) 60%, transparent 62%),
      radial-gradient(170px 260px at 90% 100%, var(--tree) 60%, transparent 62%),
      linear-gradient(0deg, var(--tree) 0%, transparent 55%);
    opacity: .85;
    transition: opacity 1.4s ease;
  }
  #moon {
    position: absolute;
    left: 76%;
    top: 12%;
    width: 9vmax;
    height: 9vmax;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #fffdf3 0%, #f4ecc9 45%, #d9cf9e 70%, transparent 72%);
    box-shadow: 0 0 6vmax 1vmax rgba(255, 250, 220, .35);
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  body[data-stage-theme="3"] #moon { opacity: 1; }
  body[data-stage-theme="3"] #sun { opacity: 0; }

  .leaf {
    position: absolute;
    top: -8%;
    width: 18px;
    height: 18px;
    background: linear-gradient(135deg, var(--leaf-a), var(--leaf-b));
    clip-path: polygon(50% 0%, 80% 20%, 100% 55%, 60% 100%, 50% 85%, 40% 100%, 0% 55%, 20% 20%);
    opacity: .8;
    animation: leaf-fall linear infinite;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,.25));
  }
  @keyframes leaf-fall {
    0%   { transform: translate(0, -10vh) rotate(0deg); }
    25%  { transform: translate(3vw, 25vh) rotate(90deg); }
    50%  { transform: translate(-2vw, 55vh) rotate(180deg); }
    75%  { transform: translate(4vw, 85vh) rotate(270deg); }
    100% { transform: translate(0, 112vh) rotate(360deg); }
  }

  /* ---------- app shell ---------- */
  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .6rem;
    padding: 1rem 1.2rem 1.4rem;
    max-height: 100vh;
  }

  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .5rem;
  }

  h1 {
    margin: 0;
    font-size: clamp(1.4rem, 4vw, 2.1rem);
    letter-spacing: .06em;
    color: var(--accent-2);
    text-shadow: 0 2px 10px rgba(0,0,0,.55), 0 0 24px rgba(242,163,61,.35);
  }
  h1 .sub {
    display: block;
    font-size: .5em;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: rgba(255,244,224,.7);
    margin-top: .15em;
  }

  #hud {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
  }
  .stat {
    background: var(--panel-bg);
    border: 1px solid rgba(255,205,120,.25);
    border-radius: .6rem;
    padding: .35rem .7rem;
    min-width: 4.6rem;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .stat .label {
    display: block;
    font-size: .58rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,244,224,.6);
  }
  .stat .value {
    display: block;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent-2);
  }
  #mult-stat.hot .value { color: #ff9d4d; text-shadow: 0 0 10px rgba(255,140,50,.8); }

  #featured-chip {
    display: none;
    align-items: center;
    gap: .5rem;
    background: linear-gradient(135deg, rgba(255,207,122,.22), rgba(255,207,122,.06));
    border: 1px solid rgba(255,207,122,.55);
    border-radius: .8rem;
    padding: .35rem .8rem;
    box-shadow: 0 0 18px rgba(255,180,80,.35), inset 0 1px 0 rgba(255,255,255,.12);
    animation: feature-chip-pulse 2.4s ease-in-out infinite;
  }
  #featured-chip.show { display: flex; }
  #featured-chip .fc-icon {
    width: 1.6rem;
    height: 1.6rem;
    flex: none;
  }
  #featured-chip .fc-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    text-align: left;
  }
  #featured-chip .fc-label {
    font-size: .55rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #ffd58a;
  }
  #featured-chip .fc-name {
    font-weight: 700;
    font-size: .85rem;
    color: #fff2d6;
  }
  @keyframes feature-chip-pulse {
    0%, 100% { box-shadow: 0 0 14px rgba(255,180,80,.28), inset 0 1px 0 rgba(255,255,255,.12); }
    50% { box-shadow: 0 0 26px rgba(255,190,90,.6), inset 0 1px 0 rgba(255,255,255,.2); }
  }

  /* ---------- stage banner ---------- */
  #stage-banner {
    position: fixed;
    left: 0; right: 0;
    top: 14%;
    z-index: 50;
    display: flex;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-16px) scale(.96);
    transition: opacity .5s ease, transform .5s ease;
  }
  #stage-banner.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  #stage-banner .card {
    background: linear-gradient(160deg, rgba(50,26,12,.94), rgba(20,10,4,.96));
    border: 1px solid rgba(255,205,120,.55);
    box-shadow: 0 0 60px rgba(255,170,70,.45), 0 12px 40px rgba(0,0,0,.6);
    border-radius: 1rem;
    padding: 1rem 2.2rem;
    text-align: center;
  }
  #stage-banner .eyebrow {
    font-size: .65rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: #ffcf7a;
  }
  #stage-banner .title {
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    color: #fff3d8;
    text-shadow: 0 0 24px rgba(255,180,80,.7);
  }
  #flash {
    position: fixed;
    inset: 0;
    z-index: 40;
    background: radial-gradient(circle at 50% 40%, rgba(255,220,150,.85), rgba(255,220,150,0) 60%);
    opacity: 0;
    pointer-events: none;
  }
  #flash.burst { animation: flash-burst 900ms ease-out; }
  @keyframes flash-burst {
    0% { opacity: 0; }
    12% { opacity: .9; }
    100% { opacity: 0; }
  }

  /* ---------- board ---------- */
  #board-wrap {
    position: relative;
    padding: .7rem;
    border-radius: 1.1rem;
    background: linear-gradient(160deg, rgba(255,224,170,.14), rgba(0,0,0,.35));
    box-shadow: 0 20px 50px rgba(0,0,0,.55), 0 4px 0 rgba(255,255,255,.05) inset;
    backdrop-filter: blur(2px);
  }
  #board {
    position: relative;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 5px;
    width: min(88vw, 92vh, 560px);
    height: min(88vw, 92vh, 560px);
    padding: 10px;
    border-radius: .8rem;
    background: linear-gradient(160deg, var(--board-top), var(--board-bottom));
    box-shadow: inset 0 3px 14px rgba(0,0,0,.6), inset 0 -3px 10px rgba(255,200,120,.08),
                0 10px 26px rgba(0,0,0,.5);
  }

  .cell {
    position: relative;
    border-radius: .4rem;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.06), rgba(0,0,0,.28) 75%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    touch-action: none;
    cursor: grab;
    overflow: visible;
  }
  .cell.game-over-locked { cursor: default; }

  .gem-slot {
    position: absolute;
    inset: 6%;
    will-change: transform;
  }
  .gem-slot.dragging { cursor: grabbing; z-index: 5; }

  .gem-face {
    position: relative;
    width: 100%;
    height: 100%;
    display: block;
    background: linear-gradient(155deg, var(--c1), var(--c2));
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.5));
    animation: gem-idle 4.2s ease-in-out infinite;
    animation-delay: var(--idle-delay, 0s);
  }
  @keyframes gem-idle {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.045) rotate(2deg); }
  }

  .shape-circle { border-radius: 50%; }
  .shape-diamond { clip-path: polygon(50% 2%, 96% 50%, 50% 98%, 4% 50%); }
  .shape-star { clip-path: polygon(50% 0%, 63% 33%, 100% 36%, 72% 58%, 82% 95%, 50% 74%, 18% 95%, 28% 58%, 0% 36%, 37% 33%); }
  .shape-hex { clip-path: polygon(25% 4%, 75% 4%, 98% 50%, 75% 96%, 25% 96%, 2% 50%); }
  .shape-pentagon { clip-path: polygon(50% 2%, 98% 39%, 80% 97%, 20% 97%, 2% 39%); }
  .shape-octagon { clip-path: polygon(30% 2%, 70% 2%, 98% 30%, 98% 70%, 70% 98%, 30% 98%, 2% 70%, 2% 30%); }

  .gem-mask {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .gem-highlight {
    background: radial-gradient(circle at 32% 24%, rgba(255,255,255,.95), rgba(255,255,255,.25) 34%, rgba(255,255,255,0) 60%);
    mix-blend-mode: screen;
    opacity: .85;
  }
  .gem-shadow {
    background: radial-gradient(circle at 72% 82%, rgba(0,0,0,.55), rgba(0,0,0,0) 55%);
    mix-blend-mode: multiply;
    opacity: .8;
  }
  .gem-rim {
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.18), inset 0 0 8px rgba(0,0,0,.35);
  }

  .gem-slot { z-index: 0; }
  .gem-slot.featured::before {
    content: '';
    position: absolute;
    inset: -30%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,196,90,.75), rgba(255,196,90,0) 68%);
    animation: feature-aura 1.7s ease-in-out infinite;
  }
  @keyframes feature-aura {
    0%, 100% { opacity: .55; transform: scale(.94); }
    50% { opacity: 1; transform: scale(1.12); }
  }

  .gem-slot.hint .gem-face {
    animation: hint-pulse 1.1s ease-in-out infinite;
  }
  @keyframes hint-pulse {
    0%, 100% { filter: drop-shadow(0 3px 4px rgba(0,0,0,.5)) brightness(1); transform: scale(1); }
    50% { filter: drop-shadow(0 3px 10px rgba(255,220,150,.65)) brightness(1.18); transform: scale(1.07); }
  }

  .gem-slot.clearing .gem-face {
    animation: gem-clear 260ms ease-in forwards;
  }
  @keyframes gem-clear {
    0% { transform: scale(1); filter: drop-shadow(0 3px 4px rgba(0,0,0,.5)) brightness(1); opacity: 1; }
    45% { transform: scale(1.35); filter: drop-shadow(0 0 14px rgba(255,235,180,1)) brightness(1.9); opacity: 1; }
    100% { transform: scale(.2); filter: brightness(2.4); opacity: 0; }
  }

  /* ---------- floating gain ---------- */
  #floaters {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 20;
    overflow: visible;
  }
  .gain-pop {
    position: absolute;
    left: 50%;
    top: 42%;
    transform: translate(-50%, -50%);
    text-align: center;
    animation: gain-pop 1.6s ease-out forwards;
  }
  .gain-pop .gain-num {
    font-size: 2.6rem;
    font-weight: 800;
    color: #ffe9b0;
    text-shadow: 0 0 18px rgba(255,180,70,.9), 0 3px 4px rgba(0,0,0,.6);
  }
  .gain-pop .gain-mult {
    display: block;
    font-size: 1.05rem;
    color: #ffcf7a;
    text-shadow: 0 2px 4px rgba(0,0,0,.6);
  }
  .gain-pop .gain-bonus {
    display: inline-block;
    margin-top: .2rem;
    padding: .1rem .5rem;
    border-radius: 1rem;
    font-size: .85rem;
    font-weight: 700;
    color: #163a2c;
    background: linear-gradient(135deg, #8ff0c0, #35c98d);
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  @keyframes gain-pop {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(.6); }
    18% { opacity: 1; transform: translate(-50%, -55%) scale(1.08); }
    30% { transform: translate(-50%, -55%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -95%) scale(1); }
  }

  /* ---------- game over ---------- */
  #game-over {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: none;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 40%, rgba(20,10,5,.7), rgba(10,5,2,.92));
    border-radius: .8rem;
  }
  #game-over.show { display: flex; }
  #game-over .panel {
    text-align: center;
    padding: 1.4rem 1.8rem;
    border-radius: .9rem;
    background: linear-gradient(160deg, rgba(60,32,16,.92), rgba(20,10,4,.95));
    border: 1px solid rgba(255,205,120,.4);
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    max-width: 90%;
  }
  #game-over h2 {
    margin: 0 0 .3rem;
    color: #ffcf7a;
    font-size: 1.5rem;
  }
  #game-over p {
    margin: 0 0 .8rem;
    color: rgba(255,244,224,.85);
    font-size: .9rem;
  }
  #game-over .arrow {
    font-size: 1.4rem;
    animation: bob 1.2s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(6px); } }

  /* ---------- new game button ---------- */
  #new-game-btn {
    appearance: none;
    border: 1px solid rgba(255,205,120,.6);
    background: linear-gradient(160deg, var(--accent-2), var(--accent));
    color: #2a1608;
    font-weight: 800;
    letter-spacing: .04em;
    font-size: .85rem;
    padding: .5rem 1.1rem;
    border-radius: .6rem;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.5);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  #new-game-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.6); }
  #new-game-btn:active { transform: translateY(0); }
  #new-game-btn.urge {
    animation: urge-pulse 1s ease-in-out infinite;
  }
  @keyframes urge-pulse {
    0%, 100% { box-shadow: 0 6px 16px rgba(0,0,0,.4), 0 0 0 0 rgba(255,180,70,.6); }
    50% { box-shadow: 0 6px 16px rgba(0,0,0,.4), 0 0 0 10px rgba(255,180,70,0); }
  }

  footer {
    font-size: .68rem;
    color: rgba(255,244,224,.45);
    letter-spacing: .05em;
  }

  @media (max-width: 480px) {
    .stat { min-width: 3.8rem; padding: .3rem .5rem; }
    .stat .value { font-size: 1rem; }
  }
</style>
</head>
<body>
  <div id="scene">
    <div id="sun"></div>
    <div id="moon"></div>
    <div id="treeline"></div>
    <div id="leaves"></div>
  </div>
  <div id="flash"></div>
  <div id="stage-banner"><div class="card"><div class="eyebrow">Stage <span id="banner-index">1</span></div><div class="title" id="banner-title">Early Gold</div></div></div>

  <div id="app">
    <header>
      <h1>Amber Hollow<span class="sub">a golden autumn match-3</span></h1>
      <div id="hud">
        <div class="stat"><span class="label">Score</span><span class="value" id="hud-score">0</span></div>
        <div class="stat"><span class="label">Best</span><span class="value" id="hud-best">0</span></div>
        <div class="stat" id="mult-stat"><span class="label">Streak</span><span class="value" id="hud-mult">×1</span></div>
        <div class="stat"><span class="label">Stage</span><span class="value" id="hud-stage">1 · Early Gold</span></div>
        <div id="featured-chip">
          <svg class="fc-icon" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="#f2a33d"/></svg>
          <span class="fc-text"><span class="fc-label">Now paying extra</span><span class="fc-name" id="featured-name">—</span></span>
        </div>
        <button id="new-game-btn" data-testid="new-game" type="button">New Game</button>
      </div>
    </header>

    <div id="board-wrap">
      <div id="board" role="grid" aria-label="Gem board"></div>
      <div id="floaters"></div>
      <div id="game-over">
        <div class="panel">
          <h2>The Hollow Has Stilled</h2>
          <p>No more moves remain among the leaves.</p>
          <div class="arrow">↑ use New Game above ↑</div>
        </div>
      </div>
    </div>

    <footer>Slide a gem into a neighbour to match three or more.</footer>
  </div>

  <script type="module" src="./render.js"></script>
</body>
</html>
