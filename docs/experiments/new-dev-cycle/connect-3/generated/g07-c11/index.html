<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Jade Temple — a match-3 expedition</title>
<style>
  /* ============================================================
     THE JADE TEMPLE — lush jungle temple ruin match-3
     ============================================================ */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: #eef7ea;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    background: #0b1f13;
  }

  /* ---------- stage palettes (custom properties per theme) ---------- */
  body[data-theme="0"] { /* The Canopy — dappled morning light */
    --sky-top:#b9dd85; --sky-mid:#4f8f4b; --sky-bot:#122c18;
    --shaft:rgba(255,246,190,.16); --accent:#ffd257;
    --ruin:#10241668; --leaf:#0e2a16; --mist:rgba(200,235,190,.16);
    --frame1:#3c5a41; --frame2:#22382a;
  }
  body[data-theme="1"] { /* Temple Steps — golden hour on old stone */
    --sky-top:#ffd98a; --sky-mid:#b3814e; --sky-bot:#2e1d0e;
    --shaft:rgba(255,216,140,.20); --accent:#ffb63d;
    --ruin:#2b190a75; --leaf:#27200c; --mist:rgba(255,220,160,.14);
    --frame1:#5c4a32; --frame2:#37291a;
  }
  body[data-theme="2"] { /* Vine Hall — deep green shade */
    --sky-top:#57a97e; --sky-mid:#1e5c45; --sky-bot:#062a1c;
    --shaft:rgba(170,255,210,.13); --accent:#4dffa0;
    --ruin:#07231770; --leaf:#062416; --mist:rgba(140,230,190,.15);
    --frame1:#2c5744; --frame2:#183527;
  }
  body[data-theme="3"] { /* Inner Sanctum — violet torchlight */
    --sky-top:#75529b; --sky-mid:#3b2460; --sky-bot:#120a24;
    --shaft:rgba(215,170,255,.15); --accent:#cd7bff;
    --ruin:#180b2e78; --leaf:#1a0f2e; --mist:rgba(190,150,240,.14);
    --frame1:#4b3a63; --frame2:#2c2140;
  }
  body[data-theme="4"] { /* Sunken Vault — flooded blue chamber */
    --sky-top:#5a94c4; --sky-mid:#1e4b72; --sky-bot:#06192e;
    --shaft:rgba(160,215,255,.17); --accent:#57b6ff;
    --ruin:#0a1e3376; --leaf:#0b2233; --mist:rgba(150,205,250,.15);
    --frame1:#33506b; --frame2:#1d3247;
  }
  body[data-theme="5"] { /* The Moonwell — pale silver night */
    --sky-top:#aec6dd; --sky-mid:#48627f; --sky-bot:#0c1420;
    --shaft:rgba(235,246,255,.15); --accent:#e8f4ff;
    --ruin:#101c2b7d; --leaf:#12202f; --mist:rgba(220,235,250,.14);
    --frame1:#465b73; --frame2:#28394c;
  }
  body[data-theme="6"] { /* Heart of the Idol — ember red depths */
    --sky-top:#e0824c; --sky-mid:#7d2f26; --sky-bot:#210607;
    --shaft:rgba(255,170,120,.16); --accent:#ff6b5e;
    --ruin:#2a0b0b7a; --leaf:#2b120c; --mist:rgba(250,160,120,.13);
    --frame1:#5f3730; --frame2:#3a201c;
  }

  /* ============================ SCENE ============================ */
  #scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 55% at 50% -6%, rgba(255,255,235,.28), transparent 60%),
      linear-gradient(180deg, var(--sky-top), var(--sky-mid) 46%, var(--sky-bot));
  }
  .sky::after { /* vignette */
    content:""; position:absolute; inset:0;
    background: radial-gradient(120% 95% at 50% 45%, transparent 55%, rgba(0,0,0,.5));
  }
  svg.ruins {
    position:absolute; left:0; right:0; bottom:0; width:100%; height:78%;
  }
  .shaft {
    position:absolute; top:-12%; height:130%; width:15vw; min-width:110px;
    background: linear-gradient(180deg, var(--shaft), transparent 82%);
    transform: rotate(13deg); transform-origin: top center;
    mix-blend-mode: screen;
    animation: shaftSway 12s ease-in-out infinite alternate;
  }
  .shaft.s1 { left:16%; }
  .shaft.s2 { left:44%; width:9vw; animation-delay:-4s; animation-duration:15s; }
  .shaft.s3 { left:68%; animation-delay:-8s; }
  @keyframes shaftSway {
    from { transform: rotate(11.5deg); opacity:.75; }
    to   { transform: rotate(14.5deg); opacity:1; }
  }
  .waterfall {
    position:absolute; left:7.5%; top:16%; height:66%; width:56px;
    opacity:.5; filter: blur(1px); border-radius: 10px; overflow: hidden;
  }
  .waterfall .flow {
    position:absolute; inset:0;
    background: repeating-linear-gradient(180deg,
      rgba(255,255,255,.28) 0 14px, rgba(255,255,255,.06) 14px 30px,
      rgba(255,255,255,.20) 30px 44px, rgba(255,255,255,.04) 44px 62px);
    animation: fallFlow 1.5s linear infinite;
    mask-image: linear-gradient(180deg, transparent, #000 12%, #000 88%, transparent);
    -webkit-mask-image: linear-gradient(180deg, transparent, #000 12%, #000 88%, transparent);
  }
  @keyframes fallFlow { from { background-position-y: 0; } to { background-position-y: 62px; } }
  .waterfall .plume {
    position:absolute; bottom:-14px; left:-30px; right:-30px; height:52px;
    background: radial-gradient(closest-side, rgba(255,255,255,.5), transparent);
    filter: blur(8px); animation: plumePulse 3.2s ease-in-out infinite;
  }
  @keyframes plumePulse { 0%,100%{opacity:.5;} 50%{opacity:.9;} }

  svg.foliage { position:absolute; width:min(34vw, 430px); height:auto; opacity:.96; }
  .f-tl { top:-8px; left:-10px; }
  .f-tr { top:-8px; right:-10px; transform: scaleX(-1); }
  .f-bl { bottom:-10px; left:-12px; transform: scaleY(-1); opacity:.9; }
  .f-br { bottom:-10px; right:-12px; transform: scale(-1,-1); opacity:.9; }

  svg.vine {
    position:absolute; top:0; width:56px; height:min(34vh, 300px);
    transform-origin: top center;
    animation: vineSway 8s ease-in-out infinite alternate;
  }
  .vine.v1 { left:24%; }
  .vine.v2 { left:57%; height:min(26vh,230px); animation-delay:-3s; animation-duration:10s; }
  .vine.v3 { right:19%; animation-delay:-6s; }
  @keyframes vineSway { from{transform:rotate(-2.4deg);} to{transform:rotate(2.4deg);} }

  .mist {
    position:absolute; width:72vw; height:26vh; border-radius:50%;
    background: radial-gradient(closest-side, var(--mist), transparent 72%);
    filter: blur(26px);
  }
  .mist.m1 { bottom:2%; left:-18vw; animation: driftR 46s linear infinite; }
  .mist.m2 { bottom:22%; right:-24vw; animation: driftL 58s linear infinite; }
  @keyframes driftR { from{transform:translateX(0);} 50%{transform:translateX(46vw);} to{transform:translateX(0);} }
  @keyframes driftL { from{transform:translateX(0);} 50%{transform:translateX(-46vw);} to{transform:translateX(0);} }

  #fireflies { position:absolute; inset:0; }
  .fly {
    position:absolute; width:5px; height:5px; border-radius:50%;
    background:#ffedaa; box-shadow:0 0 9px 3px rgba(255,235,160,.75);
    animation: flyMove var(--dur) ease-in-out infinite alternate,
               flyTwinkle 2.4s ease-in-out var(--tk) infinite;
  }
  @keyframes flyMove { from{transform:translate(0,0);} to{transform:translate(var(--dx), var(--dy));} }
  @keyframes flyTwinkle { 0%,100%{opacity:.15;} 50%{opacity:1;} }

  /* ============================ LAYOUT ============================ */
  #game {
    position: relative; z-index: 2;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; padding: 10px;
  }
  header { text-align: center; }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(24px, 4.6vmin, 40px);
    letter-spacing: .34em; text-indent:.34em; font-weight: 600;
    color: #f3ffe9;
    text-shadow: 0 2px 0 rgba(0,0,0,.45), 0 0 26px rgba(255,220,120,.35);
  }
  h1 .leafmark { color: var(--accent); text-shadow: 0 0 16px var(--accent); }
  .tagline {
    font-size: clamp(10px, 1.7vmin, 13px); letter-spacing:.42em; text-indent:.42em;
    text-transform: uppercase; color: rgba(238,247,234,.62); margin-top: 3px;
  }

  /* ---------- HUD ---------- */
  #hud {
    display:flex; flex-wrap:wrap; justify-content:center; align-items:stretch;
    gap:8px; max-width: 720px;
  }
  .panel {
    background: rgba(7,20,12,.62);
    border: 1px solid rgba(255,255,255,.14);
    border-top-color: rgba(255,255,255,.26);
    border-radius: 10px;
    padding: 6px 14px;
    min-width: 86px;
    text-align:center;
    box-shadow: 0 6px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
    backdrop-filter: blur(4px);
    display:flex; flex-direction:column; justify-content:center; gap:1px;
  }
  .panel .label {
    font-size:9.5px; letter-spacing:.24em; text-transform:uppercase;
    color: color-mix(in srgb, var(--accent) 80%, white); opacity:.95;
  }
  .panel .value {
    font-family: Georgia, serif; font-size: 19px; font-weight:700; color:#fdfff5;
    text-shadow: 0 1px 2px rgba(0,0,0,.6);
  }
  .panel.mult .value { transition: color .3s; }
  .panel.mult.hot .value { color:#ffd257; text-shadow:0 0 12px rgba(255,210,90,.8); }
  .panel.mult.hot { border-color: rgba(255,210,90,.55); animation: multGlow 1.6s ease-in-out infinite; }
  @keyframes multGlow {
    0%,100% { box-shadow: 0 6px 16px rgba(0,0,0,.35), 0 0 10px rgba(255,210,90,.25); }
    50%     { box-shadow: 0 6px 16px rgba(0,0,0,.35), 0 0 22px rgba(255,210,90,.55); }
  }
  .panel.featured { flex-direction:row; align-items:center; gap:8px; padding:6px 12px; }
  .panel.featured .fgem { width:30px; height:30px; flex:none; animation: featBob 1.8s ease-in-out infinite; }
  .panel.featured .fgem svg { width:100%; height:100%; filter: drop-shadow(0 0 6px var(--accent)); }
  @keyframes featBob { 0%,100%{transform:translateY(0) rotate(-4deg);} 50%{transform:translateY(-3px) rotate(4deg);} }
  .panel.featured .ftxt { display:flex; flex-direction:column; text-align:left; }
  .panel.featured .ftxt .value { font-size:13px; }
  #new-game {
    font: 700 12.5px/1 "Segoe UI", system-ui, sans-serif;
    letter-spacing:.14em; text-transform:uppercase;
    color:#231a06; cursor:pointer;
    padding: 0 18px; border-radius:10px;
    border:1px solid #8a6a1f; border-bottom-width:3px;
    background: linear-gradient(180deg, #ffe08a, #f0b93c 55%, #cf9426);
    box-shadow: 0 6px 16px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.65);
    transition: transform .12s, filter .12s;
  }
  #new-game:hover { filter: brightness(1.08); transform: translateY(-1px); }
  #new-game:active { transform: translateY(1px); }

  /* ---------- board ---------- */
  #board-frame {
    position: relative;
    padding: clamp(10px, 1.6vmin, 16px);
    border-radius: 20px;
    background:
      radial-gradient(140px 90px at 4% 2%, rgba(90,160,90,.5), transparent 70%),
      radial-gradient(120px 80px at 98% 100%, rgba(80,150,85,.42), transparent 70%),
      radial-gradient(90px 60px at 96% 4%, rgba(90,160,90,.3), transparent 70%),
      repeating-linear-gradient(98deg, rgba(255,255,255,.045) 0 3px, transparent 3px 14px),
      repeating-linear-gradient(8deg, rgba(0,0,0,.09) 0 2px, transparent 2px 17px),
      linear-gradient(160deg, var(--frame1), var(--frame2));
    border: 1px solid rgba(255,244,200,.28);
    box-shadow:
      0 30px 70px rgba(0,0,0,.62),
      0 8px 24px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.22),
      inset 0 -3px 8px rgba(0,0,0,.4);
  }
  #board-frame::before { /* carved gold trim */
    content:""; position:absolute; inset:5px; border-radius:15px;
    border:1.5px solid color-mix(in srgb, var(--accent) 55%, transparent);
    opacity:.55; pointer-events:none;
  }
  #board {
    position: relative;
    display: grid;
    grid-template: repeat(8, 1fr) / repeat(8, 1fr);
    gap: clamp(3px, .7vmin, 6px);
    width: min(92vw, 60vh, 536px);
    aspect-ratio: 1;
    touch-action: none;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(4,12,7,.35);
    box-shadow: inset 0 2px 10px rgba(0,0,0,.55);
    padding: clamp(3px, .7vmin, 6px);
  }
  .cell {
    position: relative;
    border-radius: 17%;
    background: linear-gradient(180deg, rgba(0,0,0,.34), rgba(0,0,0,.18));
    box-shadow: inset 0 2px 5px rgba(0,0,0,.5), inset 0 -1px 0 rgba(255,255,255,.06);
    touch-action: none;
    cursor: grab;
  }
  .cell.grabbed { cursor: grabbing; }
  .gem {
    position:absolute; inset:2%;
    will-change: transform;
    z-index: 1;
  }
  .gem svg {
    width:100%; height:100%; display:block;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.5)) drop-shadow(0 0 5px var(--glow));
    animation: idleFloat 4.6s ease-in-out infinite;
    animation-delay: calc(var(--tw, 0) * -4.6s);
  }
  @keyframes idleFloat {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%     { transform: translateY(-2.5%) rotate(1.6deg); }
  }
  .gem.t0 { --glow:#4dffa066; } .gem.t1 { --glow:#ffd25766; }
  .gem.t2 { --glow:#57b6ff66; } .gem.t3 { --glow:#cd7bff66; }
  .gem.t4 { --glow:#ff6b5e66; } .gem.t5 { --glow:#e8f4ff77; }
  .glintbar { animation: glintSweep 7s linear infinite; animation-delay: calc(var(--tw, 0) * -7s); }
  @keyframes glintSweep {
    0%, 74% { transform: translateX(0) skewX(-18deg); }
    88%     { transform: translateX(190px) skewX(-18deg); }
    100%    { transform: translateX(190px) skewX(-18deg); }
  }

  /* clearing gems */
  .gem.clearing { z-index: 3; }
  .gem.clearing svg { animation: clearPop .3s ease-out forwards; }
  @keyframes clearPop {
    0%   { transform: scale(1); filter: brightness(1.2) drop-shadow(0 0 4px var(--glow)); opacity:1; }
    45%  { transform: scale(1.32) rotate(6deg); filter: brightness(2.4) drop-shadow(0 0 18px var(--glow)); opacity:1; }
    100% { transform: scale(.25) rotate(14deg); filter: brightness(3) drop-shadow(0 0 24px var(--glow)); opacity:0; }
  }

  /* idle hint — subtle wiggle on the gem to move, faint pulse on target */
  .cell.hint-a .gem { animation: hintWiggle 1.1s ease-in-out infinite; }
  @keyframes hintWiggle {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-4%) rotate(-3deg); }
    75% { transform: translateX(4%)  rotate(3deg); }
  }
  .cell.hint-b { box-shadow: inset 0 2px 5px rgba(0,0,0,.5), inset 0 0 0 1.5px rgba(255,255,255,.22); }

  /* featured gems — golden idol aura, orbiting sparkle, breathing glow */
  .cell.feat::before {
    content:""; position:absolute; inset:-6%; border-radius:24%;
    background: radial-gradient(closest-side, color-mix(in srgb, var(--accent) 45%, transparent), transparent 74%);
    animation: featPulse 1.7s ease-in-out infinite;
    pointer-events:none; z-index:0;
  }
  @keyframes featPulse { 0%,100%{opacity:.5; transform:scale(.94);} 50%{opacity:1; transform:scale(1.06);} }
  .cell.feat::after {
    content:"✦"; position:absolute; top:-4%; right:2%;
    font-size: clamp(10px, 2vmin, 15px); color: var(--accent);
    text-shadow: 0 0 8px var(--accent), 0 0 3px #fff;
    animation: featSpark 1.7s ease-in-out infinite;
    pointer-events:none; z-index:4;
  }
  @keyframes featSpark {
    0%,100% { transform: rotate(0) scale(.8); opacity:.7; }
    50%     { transform: rotate(180deg) scale(1.25); opacity:1; }
  }
  .cell.feat .gem { filter: drop-shadow(0 0 7px color-mix(in srgb, var(--accent) 80%, transparent)); }

  /* ---------- popups / sparks ---------- */
  #popups { position:absolute; inset:0; pointer-events:none; z-index: 30; overflow:visible; }
  .popup {
    position:absolute; transform: translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:4px;
    animation: popFloat 1.9s cubic-bezier(.2,.7,.3,1) forwards;
    text-align:center; white-space:nowrap;
  }
  .popup .gain {
    font-family: Georgia, serif; font-weight:800;
    font-size: clamp(30px, 6.2vmin, 48px);
    color:#ffe9a0;
    -webkit-text-stroke: 1.5px rgba(70,40,0,.85);
    text-shadow: 0 3px 0 rgba(60,30,0,.55), 0 0 26px rgba(255,214,110,.9);
  }
  .popup .chips { display:flex; gap:5px; }
  .popup .chip {
    font-size: clamp(11px, 2vmin, 14px); font-weight:700; letter-spacing:.05em;
    padding: 3px 9px; border-radius: 999px;
    box-shadow: 0 3px 8px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .popup .mchip { background:#ffd257; color:#3c2800; border:1px solid #a87c14; }
  .popup .ichip { background:#8a5cff; color:#fff; border:1px solid #4d2bb0; }
  .popup .dchip {
    background:#31e0c0; color:#003b30; border:1px solid #0c8a72;
    animation: devPing .5s ease-out 2;
  }
  @keyframes devPing { 0%{transform:scale(1);} 40%{transform:scale(1.22);} 100%{transform:scale(1);} }
  @keyframes popFloat {
    0%   { opacity:0; transform: translate(-50%,-30%) scale(.55); }
    12%  { opacity:1; transform: translate(-50%,-52%) scale(1.12); }
    22%  { transform: translate(-50%,-50%) scale(1); }
    78%  { opacity:1; }
    100% { opacity:0; transform: translate(-50%,-150%) scale(.92); }
  }
  .spark {
    position:absolute; width:7px; height:7px; border-radius:50%;
    background:#fff; box-shadow: 0 0 8px 2px var(--sc);
    animation: sparkFly .68s ease-out forwards;
    transform: translate(-50%,-50%);
  }
  @keyframes sparkFly {
    from { opacity:1; transform: translate(-50%,-50%) scale(1); }
    to   { opacity:0; transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(.2); }
  }

  /* ---------- game over ---------- */
  #gameover {
    position:absolute; inset:0; z-index:40;
    display:flex; align-items:center; justify-content:center;
    background: rgba(4,14,8,.72); backdrop-filter: blur(4px);
    border-radius: 20px;
    animation: goFade .5s ease-out;
  }
  #gameover[hidden] { display:none; }
  @keyframes goFade { from{opacity:0;} to{opacity:1;} }
  .go-panel {
    text-align:center; padding: 26px 38px; border-radius:16px;
    background: linear-gradient(165deg, rgba(30,52,34,.95), rgba(14,28,18,.95));
    border:1px solid rgba(255,214,110,.4);
    box-shadow: 0 20px 50px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .go-panel h2 {
    font-family: Georgia, serif; letter-spacing:.2em; text-indent:.2em;
    font-size: clamp(20px, 3.6vmin, 30px); color:#ffe9a0; margin-bottom:6px;
    text-shadow: 0 0 20px rgba(255,214,110,.5);
  }
  .go-panel p { color:rgba(238,247,234,.8); font-size:14px; margin-bottom:4px; }
  .go-panel .go-score { font-family: Georgia, serif; font-size:20px; color:#fff; margin-bottom:14px; }
  .big-btn {
    font: 700 15px/1 "Segoe UI", system-ui, sans-serif;
    letter-spacing:.12em; text-transform:uppercase; cursor:pointer;
    color:#231a06; padding: 13px 26px; border-radius:12px;
    border:1px solid #8a6a1f; border-bottom-width:4px;
    background: linear-gradient(180deg, #ffe08a, #f0b93c 55%, #cf9426);
    box-shadow: 0 8px 20px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.65);
    transition: transform .12s, filter .12s;
  }
  .big-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .big-btn:active { transform: translateY(1px); }

  /* ---------- stage banner & flash ---------- */
  #flash {
    position:fixed; inset:0; z-index:90; pointer-events:none;
    background:#fff8e0; opacity:0;
  }
  #flash.go { animation: flashFade 1s ease-out forwards; }
  @keyframes flashFade { 0%{opacity:0;} 14%{opacity:.85;} 100%{opacity:0;} }
  #stage-banner {
    position:fixed; left:50%; top:38%; z-index:95; pointer-events:none;
    transform: translate(-50%,-50%);
    text-align:center; opacity:0;
  }
  #stage-banner.show { animation: bannerPlay 3s cubic-bezier(.2,.8,.3,1) forwards; }
  @keyframes bannerPlay {
    0%   { opacity:0; transform: translate(-50%,-50%) scale(.5); }
    10%  { opacity:1; transform: translate(-50%,-50%) scale(1.08); }
    16%  { transform: translate(-50%,-50%) scale(1); }
    82%  { opacity:1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity:0; transform: translate(-50%,-58%) scale(1.05); }
  }
  #stage-banner .s-rule {
    width: 200px; height:2px; margin: 8px auto;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 12px var(--accent);
  }
  #stage-banner .s-num {
    font: 800 15px/1 "Segoe UI", system-ui, sans-serif;
    letter-spacing:.6em; text-indent:.6em; text-transform:uppercase;
    color: var(--accent); text-shadow: 0 0 16px var(--accent);
  }
  #stage-banner .s-name {
    font-family: Georgia, serif; font-weight:700;
    font-size: clamp(34px, 8vmin, 66px);
    color:#fffbe8;
    text-shadow: 0 4px 0 rgba(0,0,0,.5), 0 0 40px var(--accent);
    letter-spacing:.08em;
  }
  #stage-banner .s-feat {
