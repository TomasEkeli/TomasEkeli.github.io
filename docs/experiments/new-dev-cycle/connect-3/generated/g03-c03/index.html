<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Gem Jubilee!</title>
  <style>
    :root {
      --accent: #ff8a1e;
      --accent-2: #ffd23f;
      --bg-1: #2a1a4a;
      --bg-2: #4b2673;
      --cell-gap: 6px;
      --board-size: min(92vw, 92vh, 560px);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "Baloo 2", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: #fff;
      background: radial-gradient(circle at 30% 10%, var(--bg-2), var(--bg-1) 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    header {
      text-align: center;
      margin-bottom: 0.6rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.25));
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 0.3rem;
      font-size: clamp(1rem, 3vw, 1.3rem);
    }

    .hud .label { opacity: 0.75; font-weight: 600; }
    .hud .value {
      font-weight: 800;
      color: var(--accent-2);
      font-variant-numeric: tabular-nums;
      min-width: 2ch;
      display: inline-block;
    }

    .badge {
      display: inline-block;
      padding: 0.1rem 0.6rem;
      border-radius: 999px;
      background: var(--accent);
      color: #4b1d00;
      font-weight: 800;
      transform: scale(0.6);
      opacity: 0;
      transition: transform 0.25s cubic-bezier(0.2, 1.6, 0.4, 1), opacity 0.25s;
    }
    .badge.show { transform: scale(1); opacity: 1; }

    #stage {
      position: relative;
    }

    #board {
      position: relative;
      width: var(--board-size);
      height: var(--board-size);
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: var(--cell-gap);
      padding: var(--cell-gap);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.28);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), inset 0 0 0 2px rgba(255, 255, 255, 0.06);
    }

    .cell {
      position: relative;
      border-radius: 14px;
      cursor: grab;
      background: var(--gem, #888);
      box-shadow: inset 0 3px 6px rgba(255, 255, 255, 0.45),
                  inset 0 -4px 8px rgba(0, 0, 0, 0.35),
                  0 2px 4px rgba(0, 0, 0, 0.3);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: transform;
    }
    .cell::after {
      content: "";
      position: absolute;
      top: 14%;
      left: 18%;
      width: 26%;
      height: 20%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      filter: blur(1px);
    }
    .cell:active { cursor: grabbing; }

    /* Clear animation: throb + pop, then vanish. */
    .cell.clearing {
      animation: pop 0.2s ease-in forwards;
      z-index: 3;
    }
    @keyframes pop {
      0%   { transform: scale(1); filter: brightness(1); }
      45%  { transform: scale(1.28); filter: brightness(1.9); }
      100% { transform: scale(0); filter: brightness(2.4); opacity: 0; }
    }

    /* Springy overshoot drop for gems falling into place. */
    .cell.dropping {
      animation: drop-in 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes drop-in {
      0%   { transform: translateY(var(--fall, -120%)); }
      70%  { transform: translateY(6%); }
      100% { transform: translateY(0); }
    }

    /* Floating "+N" over the board. */
    .float {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      font-size: clamp(2rem, 9vw, 4rem);
      font-weight: 900;
      color: var(--accent-2);
      text-shadow: 0 3px 0 var(--accent), 0 6px 18px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      opacity: 0;
      z-index: 10;
    }
    .float.go {
      animation: floatup 1.4s ease-out forwards;
    }
    @keyframes floatup {
      0%   { opacity: 0; transform: translate(-50%, 10%) scale(0.5); }
      20%  { opacity: 1; transform: translate(-50%, -20%) scale(1.15); }
      70%  { opacity: 1; transform: translate(-50%, -70%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -120%) scale(0.9); }
    }

    footer {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      opacity: 0.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Gem Jubilee!</h1>
    <div class="hud">
      <span><span class="label">Score</span> <span class="value" id="score">0</span></span>
      <span class="badge" id="badge">+0</span>
    </div>
  </header>

  <div id="stage">
    <div id="board" aria-label="game board"></div>
  </div>

  <footer>Slide a gem into a neighbour to match three or more.</footer>

  <script type="module" src="./render.js"></script>
</body>
</html>
