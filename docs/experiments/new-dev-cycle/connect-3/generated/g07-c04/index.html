<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Sakura Cascade</title>
<style>
:root {
  color-scheme: light;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: "Hiragino Sans", "Yu Gothic", "Segoe UI", system-ui, -apple-system, sans-serif;
}
body {
  overflow-x: hidden;
}

.scene {
  --sky-a: #ffe8ef;
  --sky-b: #ffd0dd;
  --accent: #d6538f;
  --glow: #ffb7d1;
  --mist-o: 0.55;
  --water-a: #cfe7e6;
  --water-b: #9fd0cf;
  position: relative;
  min-height: 100vh;
  width: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.6rem 1rem 2.4rem;
  background: linear-gradient(180deg, var(--sky-a) 0%, var(--sky-b) 55%, var(--water-b) 100%);
  transition: background 0.6s ease;
}

/* ---------- decorative background layers ---------- */
.sky-glow {
  position: absolute;
  inset: -10% -10% auto -10%;
  height: 60%;
  background: radial-gradient(circle at 50% 0%, var(--glow) 0%, transparent 65%);
  opacity: 0.65;
  pointer-events: none;
  transition: background 0.6s ease;
}
.mist {
  position: absolute;
  left: 0; right: 0; top: 18%;
  height: 26%;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,var(--mist-o)), transparent);
  filter: blur(6px);
  pointer-events: none;
  animation: mistDrift 22s ease-in-out infinite alternate;
}
@keyframes mistDrift {
  from { transform: translateX(-4%); }
  to { transform: translateX(4%); }
}
.mountains {
  position: absolute;
  left: -5%; right: -5%; bottom: 22%;
  height: 22%;
  background:
    linear-gradient(transparent, transparent) ,
    conic-gradient(from 200deg at 15% 100%, transparent 60%, rgba(0,0,0,0.05) 61%);
  clip-path: polygon(0% 100%, 0% 55%, 10% 70%, 22% 40%, 34% 68%, 48% 30%, 60% 66%, 74% 42%, 88% 72%, 100% 50%, 100% 100%);
  background-color: rgba(90, 70, 90, 0.18);
  pointer-events: none;
  opacity: 0.7;
}
.pond {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 22%;
  pointer-events: none;
  overflow: hidden;
}
.pond-svg { width: 100%; height: 100%; display: block; }
.pond-water { fill: var(--water-a); transition: fill 0.6s ease; }
.pond-ripple { fill: none; stroke: var(--water-b); stroke-width: 1.4; opacity: 0.55; animation: rippleMove 9s linear infinite; }
.pond-ripple-2 { opacity: 0.35; animation-duration: 13s; animation-direction: reverse; }
@keyframes rippleMove {
  from { transform: translateX(0); }
  to { transform: translateX(-80px); }
}
.lantern {
  position: absolute;
  top: 4%;
  width: 46px;
  height: 66px;
  border-radius: 45% 45% 40% 40% / 55% 55% 35% 35%;
  background: radial-gradient(circle at 40% 30%, #fff3d2, var(--accent) 75%);
  box-shadow: 0 0 22px 6px var(--glow);
  pointer-events: none;
  animation: lanternSway 5s ease-in-out infinite;
  transition: background 0.6s ease, box-shadow 0.6s ease;
}
.lantern::before, .lantern::after {
  content: "";
  position: absolute;
  left: 50%;
  width: 2px;
  background: rgba(90, 60, 50, 0.5);
}
.lantern::before { top: -18px; height: 18px; transform: translateX(-50%); }
.lantern::after { bottom: -10px; height: 10px; transform: translateX(-50%); }
.lantern-left { left: 4%; }
.lantern-right { right: 4%; animation-delay: 1.6s; }
@keyframes lanternSway {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(4deg); }
}
.lantern-glow {
  position: absolute; inset: 30% 20%;
  background: #fff8e6;
  border-radius: 50%;
  filter: blur(3px);
  opacity: 0.85;
  animation: lanternFlicker 2.4s ease-in-out infinite;
}
@keyframes lanternFlicker {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}
.branch {
  position: absolute;
  top: -4%;
  width: 34%;
  max-width: 320px;
  height: 30%;
  background: radial-gradient(circle, rgba(255,255,255,0.0) 0 0);
  pointer-events: none;
  opacity: 0.9;
}
.branch::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle 10px at 20% 30%, #ffd3e4 60%, transparent 62%),
    radial-gradient(circle 8px at 35% 15%, #ffc4dc 60%, transparent 62%),
    radial-gradient(circle 9px at 45% 35%, #ffdcec 60%, transparent 62%),
    radial-gradient(circle 7px at 60% 12%, #ffbcd8 60%, transparent 62%),
    radial-gradient(circle 11px at 15% 10%, #ffd3e4 60%, transparent 62%);
}
.branch-left { left: -6%; }
.branch-right { right: -6%; transform: scaleX(-1); }

.petals { position: fixed; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; }
.petal {
  position: absolute;
  top: -5vh;
  width: 10px;
  height: 8px;
  background: linear-gradient(135deg, #ffe1ec, #ff9dc0);
  border-radius: 70% 30% 65% 35%;
  opacity: 0.85;
  animation-name: petalFall;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  box-shadow: 0 0 4px rgba(255,255,255,0.4);
}
@keyframes petalFall {
  0% { transform: translate(0, -5vh) rotate(0deg); }
  50% { transform: translate(3vw, 55vh) rotate(190deg); }
  100% { transform: translate(-2vw, 112vh) rotate(360deg); }
}

/* ---------- HUD ---------- */
.hud {
  position: relative;
  z-index: 5;
  width: min(94vw, 640px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 0.6rem;
}
.title-block {
  background: rgba(255, 252, 248, 0.78);
  border-radius: 14px;
  padding: 0.4rem 0.9rem;
  box-shadow: 0 2px 8px rgba(60, 30, 45, 0.15), inset 0 0 0 1px rgba(255,255,255,0.7);
  backdrop-filter: blur(3px);
}
.title-block h1 {
  margin: 0;
  font-size: 1.5rem;
  letter-spacing: 0.03em;
  color: #5a2b45;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
}
.stage-name {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  opacity: 0.9;
  transition: color 0.6s ease;
}
.stats {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  flex-wrap: wrap;
}
.stat {
  background: rgba(255,255,255,0.6);
  border-radius: 12px;
  padding: 0.35rem 0.7rem;
  text-align: center;
  min-width: 64px;
  box-shadow: 0 2px 6px rgba(120, 60, 90, 0.12), inset 0 0 0 1px rgba(255,255,255,0.7);
  backdrop-filter: blur(3px);
}
.stat-label {
  display: block;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8a5a72;
}
.stat-value {
  display: block;
  font-size: 1.05rem;
  font-weight: 700;
  color: #5a2b45;
}
.multiplier-stat .stat-value {
  color: var(--accent);
  transition: color 0.6s ease;
}
.multiplier-stat.pulse .stat-value {
  animation: multPulse 0.5s ease;
}
@keyframes multPulse {
  0% { transform: scale(1); }
  40% { transform: scale(1.35); }
  100% { transform: scale(1); }
}
.new-game-btn {
  border: none;
  border-radius: 999px;
  padding: 0.55rem 1.1rem;
  font-weight: 700;
  font-size: 0.85rem;
  background: linear-gradient(135deg, #ff9dc0, var(--accent));
  color: #fff;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(180, 50, 100, 0.35);
  transition: transform 0.15s ease, box-shadow 0.6s ease, background 0.6s ease;
}
.new-game-btn:hover { transform: translateY(-1px) scale(1.03); }
.new-game-btn:active { transform: translateY(0) scale(0.97); }
.new-game-btn.urgent {
  animation: urgentPulse 1.1s ease-in-out infinite;
}
@keyframes urgentPulse {
  0%, 100% { box-shadow: 0 3px 10px rgba(180, 50, 100, 0.35); }
  50% { box-shadow: 0 3px 22px rgba(180, 50, 100, 0.75); }
}

/* ---------- featured banner ---------- */
.featured-banner {
  position: relative;
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: linear-gradient(90deg, rgba(255,252,248,0.92), rgba(255,252,248,0.8));
  border-radius: 999px;
  padding: 0.3rem 0.9rem 0.3rem 0.4rem;
  margin-bottom: 0.9rem;
  box-shadow: 0 2px 8px rgba(120,60,90,0.15), inset 0 0 0 1px rgba(255,255,255,0.6);
  font-size: 0.78rem;
  color: #6d3a56;
  backdrop-filter: blur(3px);
}
.featured-label { font-weight: 700; color: var(--accent); transition: color 0.6s ease; }
.featured-gem {
  width: 28px;
  height: 28px;
  display: inline-flex;
  filter: drop-shadow(0 0 6px var(--glow));
  animation: gemFloat 3.2s ease-in-out infinite;
}
.featured-gem svg { width: 100%; height: 100%; }

/* ---------- board ---------- */
.board-area {
  position: relative;
  z-index: 5;
}
.board-frame {
  position: relative;
  background: rgba(255, 250, 246, 0.85);
  border-radius: 22px;
  padding: 14px;
  box-shadow:
    0 22px 45px rgba(70, 30, 55, 0.35),
    0 4px 10px rgba(70, 30, 55, 0.2),
    inset 0 0 0 2px rgba(255,255,255,0.6);
  border: 6px solid transparent;
  background-image:
    linear-gradient(rgba(255,250,246,0.9), rgba(255,250,246,0.9)),
    linear-gradient(135deg, #caa06e, #8a5a3a);
  background-origin: border-box;
  background-clip: padding-box, border-box;
}
.board {
  position: relative;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: 4px;
  width: min(88vw, 520px);
  height: min(88vw, 520px);
  background: repeating-linear-gradient(45deg, rgba(160,110,90,0.06) 0 10px, rgba(160,110,90,0.02) 10px 20px);
  border-radius: 12px;
  padding: 6px;
}
.cell {
  position: relative;
  border-radius: 9px;
  background: rgba(255,255,255,0.55);
  box-shadow: inset 0 0 0 1px rgba(160,110,90,0.15);
  touch-action: none;
  cursor: grab;
  overflow: visible;
}
.cell:nth-child(odd) { background: rgba(255,255,255,0.4); }
.gem-wrap {
  position: absolute;
  inset: 5%;
  will-change: transform;
  z-index: 1;
}
.gem-icon {
  width: 100%;
  height: 100%;
  display: block;
  filter: drop-shadow(0 3px 3px rgba(70,30,55,0.35));
  animation: gemFloat 4s ease-in-out infinite;
  animation-delay: calc(var(--i, 0) * 0.09s);
}
@keyframes gemFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-3%) rotate(2deg); }
}
.gem-outline path, .gem-outline circle {
  fill: none;
  stroke: rgba(60, 28, 45, 0.55);
  stroke-width: 3.2;
  stroke-linejoin: round;
  paint-order: stroke;
}
.gem-edge path, .gem-edge circle {
  fill: none;
  stroke: rgba(255,255,255,0.65);
  stroke-width: 1.1;
  stroke-linejoin: round;
  transform: translate(-1px, -1px);
}
.gem-facet path {
  fill: none;
  stroke: rgba(255,255,255,0.55);
  stroke-width: 1.4;
}
.gem-wrap.hint .gem-icon {
  animation: hintPulse 1.1s ease-in-out infinite;
}
@keyframes hintPulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 3px 3px rgba(70,30,55,0.35)) brightness(1); }
  50% { transform: scale(1.08); filter: drop-shadow(0 3px 6px rgba(70,30,55,0.3)) brightness(1.18); }
}
.gem-wrap.clearing .gem-icon {
  animation: gemClear 0.26s ease forwards;
}
@keyframes gemClear {
  0% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1) drop-shadow(0 3px 3px rgba(70,30,55,0.35)); }
  40% { transform: scale(1.3) rotate(8deg); opacity: 1; filter: brightness(1.8) drop-shadow(0 0 10px #fff); }
  100% { transform: scale(0.2) rotate(20deg); opacity: 0; }
}
.gem-wrap.featured-gem::after {
  content: "\2726";
  position: absolute;
  top: -6%;
  right: -6%;
  font-size: 0.9rem;
  color: #ffce4a;
  text-shadow: 0 0 6px #ff9e2c, 0 0 2px #fff;
  animation: sparklePulse 1.4s ease-in-out infinite;
  z-index: 2;
}
.gem-wrap.featured-gem .gem-icon {
  filter: drop-shadow(0 0 7px var(--glow, #ffd27a)) drop-shadow(0 3px 3px rgba(70,30,55,0.35));
}
@keyframes sparklePulse {
  0%, 100% { transform: scale(0.9) rotate(0deg); opacity: 0.75; }
  50% { transform: scale(1.3) rotate(20deg); opacity: 1; }
}
.cell.shake { animation: shakeCell 0.32s ease; }
@keyframes shakeCell {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* ---------- popups ---------- */
.popup-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 8;
}
.score-popup {
  position: absolute;
  left: 50%;
  top: 38%;
  transform: translate(-50%, 0);
  text-align: center;
  font-weight: 800;
  color: #ffffff;
  text-shadow: 0 2px 10px rgba(120, 40, 80, 0.6), 0 0 2px rgba(0,0,0,0.4);
  animation: popupFloat 1.6s ease forwards;
  white-space: nowrap;
}
.score-popup .gain { font-size: 2.2rem; color: #fff4da; }
.score-popup .tag {
  display: inline-block;
  margin: 0.15rem 0.2rem 0;
  font-size: 0.85rem;
  padding: 0.1rem 0.5rem;
  border-radius: 999px;
  background: rgba(255,255,255,0.25);
}
.score-popup .tag.mult { color: #ffe27a; }
.score-popup .tag.bonus {
  color: #7dffd6;
  background: rgba(20, 90, 70, 0.4);
  box-shadow: 0 0 10px rgba(90,255,200,0.6);
}
@keyframes popupFloat {
  0% { opacity: 0; transform: translate(-50%, 20px) scale(0.7); }
  15% { opacity: 1; transform: translate(-50%, -6px) scale(1.08); }
  30% { transform: translate(-50%, 0) scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -55px) scale(0.95); }
}

/* ---------- stage banner ---------- */
.stage-banner {
  position: fixed;
  left: 50%;
  top: 30%;
  transform: translate(-50%, -50%) scale(0.8);
  z-index: 30;
  pointer-events: none;
  opacity: 0;
  text-align: center;
}
.stage-banner.show {
  animation: bannerShow 2.4s cubic-bezier(.2,.9,.3,1) forwards;
}
.stage-banner-inner {
  background: linear-gradient(135deg, rgba(90,30,60,0.88), rgba(140,60,90,0.88));
  color: #fff8ee;
  padding: 1.1rem 2.2rem;
  border-radius: 18px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.25);
}
.stage-banner-kicker {
  font-size: 0.85rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  opacity: 0.85;
}
.stage-banner-name {
  font-size: 1.9rem;
  font-weight: 800;
  margin-top: 0.2rem;
  text-shadow: 0 0 18px rgba(255,255,255,0.5);
}
@keyframes bannerShow {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
  12% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
  20% { transform: translate(-50%, -50%) scale(1); }
  85% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.02); }
}
.stage-flash {
  position: fixed;
  inset: 0;
  background: var(--accent, #fff);
  opacity: 0;
  pointer-events: none;
  z-index: 25;
}
.stage-flash.flash {
  animation: flashFade 0.7s ease-out forwards;
}
@keyframes flashFade {
  0% { opacity: 0; }
  15% { opacity: 0.55; }
  100% { opacity: 0; }
}

/* ---------- game over ---------- */
.gameover-overlay {
  position: absolute;
  inset: 6px;
  border-radius: 16px;
  background: rgba(35, 15, 30, 0.72);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  transition: opacity 0.3s ease;
}
.gameover-overlay.hidden { opacity: 0; pointer-events: none; }
.gameover-card {
  text-align: center;
  color: #fff2e8;
  padding: 1.4rem 1.8rem;
  background: rgba(90, 40, 65, 0.55);
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
.gameover-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.3rem; }
.gameover-sub { font-size: 0.85rem; opacity: 0.85; margin-bottom: 0.6rem; }
.gameover-score { font-size: 1rem; font-weight: 700; color: #ffd9ec; }

/* ---------- legend ---------- */
.legend {
  position: relative;
  z-index: 5;
  margin-top: 1.1rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.6rem 1.1rem;
  max-width: min(94vw, 620px);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.7rem;
  color: #6d3a56;
  background: rgba(255,255,255,0.5);
  padding: 0.25rem 0.55rem;
  border-radius: 999px;
}
.legend-item svg { width: 18px; height: 18px; }

@media (max-width: 480px) {
  .title-block h1 { font-size: 1.2rem; }
  .stat { min-width: 52px; padding: 0.3rem 0.5rem; }
  .score-popup .gain { font-size: 1.7rem; }
}
</style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="sky-glow" aria-hidden="true"></div>
    <div class="mist" aria-hidden="true"></div>
    <div class="mountains" aria-hidden="true"></div>
    <div class="pond" aria-hidden="true">
      <svg viewBox="0 0 800 140" preserveAspectRatio="none" class="pond-svg">
        <path class="pond-water" d="M0,40 Q100,10 200,40 T400,40 T600,40 T800,40 V140 H0 Z"></path>
        <path class="pond-ripple" d="M0,55 Q100,35 200,55 T400,55 T600,55 T800,55"></path>
        <path class="pond-ripple pond-ripple-2" d="M0,75 Q100,60 200,75 T400,75 T600,75 T800,75"></path>
      </svg>
    </div>
    <div class="lantern lantern-left" aria-hidden="true"><div class="lantern-glow"></div></div>
    <div class="lantern lantern-right" aria-hidden="true"><div class="lantern-glow"></div></div>
    <div class="branch branch-left" aria-hidden="true"></div>
    <div class="branch branch-right" aria-hidden="true"></div>
    <div class="petals" id="petals" aria-hidden="true"></div>

    <header class="hud">
      <div class="title-block">
        <h1>Sakura Cascade</h1>
        <div class="stage-name" id="stageName">Dawn Mist</div>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="best">0</span>
        </div>
        <div class="stat multiplier-stat" id="multiplierStat">
          <span class="stat-label">Streak</span>
          <span class="stat-value" id="multiplier">×1</span>
        </div>
        <button class="new-game-btn" id="newGameBtn" data-testid="new-game">New Game</button>
      </div>
    </header>

    <div class="featured-banner" id="featuredBanner">
      <span class="featured-label">Garden's Favour</span>
      <span class="featured-gem" id="featuredGem"></span>
      <span class="featured-text" id="featuredText">grants a blessing bonus this stage</span>
    </div>

    <main class="board-area">
      <div class="board-frame">
        <div class="board" id="board"></div>
        <div class="popup-layer" id="popupLayer"></div>
        <div class="gameover-overlay hidden" id="gameOverOverlay">
          <div class="gameover-card">
            <div class="gameover-title">The Garden Rests</div>
            <div class="gameover-sub">No moves remain among the blossoms.</div>
            <div class="gameover-score">Final score: <span id="finalScore">0</span></div>
          </div>
        </div>
      </div>
    </main>

    <div class="stage-flash" id="stageFlash" aria-hidden="true"></div>
    <div class="stage-banner" id="stageBanner">
      <div class="stage-banner-inner">
        <div class="stage-banner-kicker">Stage <span id="stageBannerNum">1</span></div>
        <div class="stage-banner-name" id="stageBannerName">Dawn Mist</div>
      </div>
    </div>

    <footer class="legend" id="legend"></footer>
  </div>

  <script type="module" src="./render.js"></script>
</body>
</html>
