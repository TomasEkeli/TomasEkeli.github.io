<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lagoon of Light</title>
<style>
  :root {
    --ink: #06635e;
    --ink-soft: #2a8f88;
    --coral: #ff5e78;
    --amber: #ffb703;
    --violet: #8d5bff;
    --glass: rgba(255, 255, 255, 0.72);
    --glass-line: rgba(255, 255, 255, 0.9);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Avenir Next", "Segoe UI", ui-rounded, system-ui, sans-serif;
    background: linear-gradient(#bff3ef, #57d8cd);
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
  }
  canvas.scene3d { position: fixed; inset: 0; display: block; touch-action: none; cursor: grab; }

  /* ---- invisible pointer hit-cells over the 3D gems ---- */
  #cells { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  #cells .hitcell {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    touch-action: none;
    cursor: grab;
    border-radius: 18%;
    background: transparent;
  }
  #cells .hitcell:active { cursor: grabbing; }

  /* ---- floating feedback layer ---- */
  #fx { position: fixed; inset: 0; pointer-events: none; z-index: 8; overflow: hidden; }
  .gainfloat {
    position: absolute; left: 50%; top: 44%;
    transform: translate(-50%, -50%);
    font-weight: 800; color: #ffffff;
    text-shadow: 0 2px 0 rgba(6, 99, 94, 0.45), 0 6px 22px rgba(6, 99, 94, 0.5);
    animation: floatUp 1.6s ease-out forwards;
    white-space: nowrap;
  }
  .gainfloat .waves { display: block; font-size: 0.42em; font-weight: 700; color: #fff6d8; text-align: center; }
  .bonusfloat {
    position: absolute; left: 50%; top: 54%;
    transform: translate(-50%, -50%);
    font-size: 24px; font-weight: 800; color: #f3e8ff;
    background: linear-gradient(135deg, var(--violet), #b98bff);
    padding: 6px 16px; border-radius: 999px;
    box-shadow: 0 6px 20px rgba(141, 91, 255, 0.55);
    animation: floatUp 1.9s ease-out forwards;
    white-space: nowrap;
  }
  .cascadefloat {
    position: absolute; left: 50%; top: 30%;
    transform: translate(-50%, -50%) rotate(-4deg);
    font-weight: 900; color: #fff;
    -webkit-text-stroke: 1px rgba(6, 99, 94, 0.25);
    text-shadow: 0 4px 18px rgba(255, 160, 60, 0.75);
    animation: cascadePop 0.9s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes floatUp {
    0% { opacity: 0; margin-top: 26px; }
    12% { opacity: 1; margin-top: 0; }
    75% { opacity: 1; }
    100% { opacity: 0; margin-top: -70px; }
  }
  @keyframes cascadePop {
    0% { opacity: 0; scale: 0.4; }
    18% { opacity: 1; scale: 1.15; }
    40% { scale: 1; }
    100% { opacity: 0; scale: 1.1; margin-top: -40px; }
  }

  /* ---- HUD ---- */
  header#topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 8px 14px;
    pointer-events: none;
  }
  #brand h1 {
    font-size: 22px; letter-spacing: 0.4px; color: #ffffff;
    text-shadow: 0 2px 0 rgba(6, 99, 94, 0.35), 0 4px 16px rgba(6, 99, 94, 0.35);
  }
  #stage-chip {
    display: inline-block; margin-top: 2px;
    font-size: 12.5px; font-weight: 700; color: var(--ink);
    background: var(--glass); border: 1px solid var(--glass-line);
    padding: 3px 10px; border-radius: 999px;
    box-shadow: 0 3px 12px rgba(6, 99, 94, 0.18);
  }
  #stage-chip .hotdot { color: var(--coral); }
  #stats { display: flex; align-items: center; gap: 8px; pointer-events: auto; flex-wrap: wrap; justify-content: flex-end; }
  .stat {
    background: var(--glass); border: 1px solid var(--glass-line);
    border-radius: 12px; padding: 4px 12px; text-align: center;
    box-shadow: 0 3px 12px rgba(6, 99, 94, 0.18);
    min-width: 72px;
  }
  .stat label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-soft); }
  .stat span { font-size: 17px; font-weight: 800; color: var(--ink); }
  #mult-stat span { color: var(--coral); }
  .stat.bump { animation: bump 0.45s ease; }
  @keyframes bump { 30% { scale: 1.14; } }
  button {
    font: inherit; font-weight: 800; color: #fff;
    background: linear-gradient(180deg, #ff7d92, var(--coral));
    border: none; border-radius: 12px; padding: 9px 16px;
    cursor: pointer; box-shadow: 0 4px 14px rgba(255, 94, 120, 0.45);
    transition: transform 0.1s ease;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(1px); }
  button#reset-view { background: linear-gradient(180deg, #55d7cc, #1fb9ac); box-shadow: 0 4px 14px rgba(31, 185, 172, 0.45); }

  aside {
    position: fixed; z-index: 10;
    background: var(--glass); border: 1px solid var(--glass-line);
    border-radius: 16px; padding: 10px 12px;
    box-shadow: 0 6px 22px rgba(6, 99, 94, 0.2);
    backdrop-filter: blur(6px);
  }
  aside h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); margin-bottom: 6px; }
  aside h2 .sub { text-transform: none; letter-spacing: 0; font-weight: 600; opacity: 0.75; }

  /* value ledger, left */
  #ledger { left: 12px; top: 50%; transform: translateY(-50%); width: 208px; }
  #ledger ul { list-style: none; }
  #ledger .row {
    display: grid; grid-template-columns: 22px 1fr auto; grid-template-rows: auto auto;
    column-gap: 8px; align-items: center;
    padding: 5px 6px; border-radius: 10px; margin-bottom: 2px;
  }
  #ledger .row svg { grid-row: 1 / span 2; width: 20px; height: 20px; filter: drop-shadow(0 1px 2px rgba(6,99,94,0.3)); }
  #ledger .row .name { font-size: 13px; font-weight: 800; }
  #ledger .row .val { font-size: 15px; font-weight: 900; text-align: right; }
  #ledger .row .scheme { grid-column: 2 / span 2; font-size: 10.5px; color: var(--ink-soft); font-weight: 600; }
  #ledger .row.hot {
    background: linear-gradient(90deg, rgba(255, 183, 3, 0.35), rgba(255, 94, 120, 0.25));
    outline: 2px solid var(--amber);
    animation: hotglow 1.4s ease-in-out infinite;
  }
  @keyframes hotglow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 183, 3, 0.0); }
    50% { box-shadow: 0 0 16px 2px rgba(255, 183, 3, 0.65); }
  }
  #ledger .row .tags { grid-column: 3; grid-row: 1; display: flex; gap: 4px; justify-content: flex-end; }
  .tag { font-size: 9px; font-weight: 900; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 999px; color: #fff; }
  .tag.hot-tag { background: linear-gradient(135deg, var(--amber), var(--coral)); }
  .tag.lucky-tag { background: linear-gradient(135deg, #29c6b7, #1c9c90); }
  #mult-note { margin-top: 6px; font-size: 10.5px; color: var(--ink-soft); font-weight: 600; line-height: 1.35; }
  #mult-note b { color: var(--coral); }

  /* next-drops queue, right */
  #queue { right: 12px; top: 50%; transform: translateY(-50%); width: 132px; text-align: center; }
  #queue-chips { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  #queue-chips .chip {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 2px 8px rgba(6, 99, 94, 0.22);
    border: 2px solid rgba(255, 255, 255, 0.9);
  }
  #queue-chips .chip svg { width: 22px; height: 22px; }
  #queue-chips .chip:first-child { width: 42px; height: 42px; border-color: var(--amber); }
  #queue-chips .chip:first-child svg { width: 28px; height: 28px; }
  #queue .arrow { font-size: 11px; font-weight: 800; color: var(--ink-soft); margin: 2px 0; }
  #favour-note { margin-top: 8px; font-size: 10.5px; font-weight: 700; color: var(--ink-soft); line-height: 1.35; }
  #favour-note .lucky { color: #128c80; }

  /* stage banner + flash */
  #banner {
    position: fixed; left: 50%; top: 38%; transform: translate(-50%, -50%);
    z-index: 20; pointer-events: none; text-align: center;
    font-size: clamp(30px, 6vw, 56px); font-weight: 900; color: #fff;
    text-shadow: 0 4px 0 rgba(6, 99, 94, 0.35), 0 10px 40px rgba(6, 99, 94, 0.5);
    opacity: 0; white-space: nowrap;
  }
  #banner .sub { display: block; font-size: 0.4em; font-weight: 800; color: #fff6d8; }
  #banner.show { animation: bannerIn 2.4s ease forwards; }
  @keyframes bannerIn {
    0% { opacity: 0; scale: 0.6; }
    12% { opacity: 1; scale: 1.08; }
    22% { scale: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; scale: 1.05; }
  }
  #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 19; }
  #flash.go { animation: flashout 0.7s ease-out forwards; }
  @keyframes flashout { 0% { opacity: 0.85; } 100% { opacity: 0; } }

  /* game over */
  #gameover {
    position: fixed; left: 50%; top: 52%; transform: translate(-50%, -50%);
    z-index: 15;
  }
  #gameover .panel {
    background: var(--glass); border: 1px solid var(--glass-line);
    backdrop-filter: blur(8px);
    border-radius: 20px; padding: 26px 38px; text-align: center;
    box-shadow: 0 14px 44px rgba(6, 99, 94, 0.35);
    animation: bump 0.5s ease;
  }
  #gameover h2 { font-size: 28px; color: var(--coral); margin-bottom: 6px; }
  #gameover p { font-weight: 700; margin-bottom: 14px; }

  #camhint {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    z-index: 10; pointer-events: none;
    font-size: 11.5px; font-weight: 700; color: #fff;
    text-shadow: 0 1px 3px rgba(6, 99, 94, 0.6);
    opacity: 0.85;
  }

  @media (max-width: 900px) {
    #ledger { width: 168px; }
    #ledger .row .scheme { display: none; }
    #queue { width: 96px; }
  }
</style>
</head>
<body>
  <div id="cells"></div>
  <div id="fx"></div>

  <header id="topbar">
    <div id="brand">
      <h1>Lagoon of Light</h1>
      <div id="stage-chip">Stage 1 &middot; Sunrise Shallows</div>
    </div>
    <div id="stats">
      <div class="stat"><label>Score</label><span id="score">0</span></div>
      <div class="stat"><label>Best</label><span id="best">0</span></div>
      <div class="stat" id="mult-stat"><label>Combo</label><span id="mult">&times;1</span></div>
      <div class="stat" id="last-stat"><label>Last move</label><span id="lastgain">&mdash;</span></div>
      <button id="new-game" data-testid="new-game" type="button">New game</button>
      <button id="reset-view" type="button" title="Return to the default view">&#10226; View</button>
    </div>
  </header>

  <aside id="ledger">
    <h2>Gem ledger <span class="sub">&middot; pts / gem</span></h2>
    <ul id="ledger-list"></ul>
    <div id="mult-note"></div>
  </aside>

  <aside id="queue">
    <h2>Next drops</h2>
    <div class="arrow">soonest first &darr;</div>
    <div id="queue-chips"></div>
    <div id="favour-note">no lucky colour yet</div>
  </aside>

  <div id="banner" hidden></div>
  <div id="flash"></div>

  <div id="gameover" hidden>
    <div class="panel">
      <h2>Out of moves!</h2>
      <p id="go-score"></p>
      <button id="go-new" type="button">Play again</button>
    </div>
  </div>

  <div id="camhint">drag a gem to swap &middot; drag the water to look around &middot; scroll to zoom</div>

  <script type="module" src="./render.js"></script>
</body>
</html>
