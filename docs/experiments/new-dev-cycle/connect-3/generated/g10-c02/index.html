<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Sunmeadow — match-3 in a sunlit meadow</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%23ffd23f'/%3E%3C/svg%3E">
<style>
  :root {
    --skytop: #8fd7ff;
    --skybot: #eafff2;
    --accent: #ff9f1c;
    --panel: rgba(255, 255, 255, 0.82);
    --ink: #274156;
    --chip: rgba(255, 255, 255, 0.9);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, var(--skytop), var(--skybot));
  }
  button {
    font: inherit;
    color: var(--ink);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: var(--chip);
    box-shadow: 0 2px 6px rgba(30, 60, 90, 0.18);
  }
  button:active { transform: translateY(1px); }

  #app { height: 100dvh; display: flex; flex-direction: column; }

  /* ---- top bar: title, score, New Game, HUD toggle (never over the board) */
  #topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 10px rgba(30, 60, 90, 0.12);
    z-index: 20;
  }
  #topbar h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: 0.06em;
    background: linear-gradient(120deg, #ff8a3c, #ffc93c, #38b000);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    white-space: nowrap;
  }
  #scorewrap { display: flex; align-items: baseline; gap: 10px; min-width: 0; flex: 1; }
  #score { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  #best { font-size: 12px; opacity: 0.75; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .topbtns { display: flex; gap: 8px; }
  .topbtns button { padding: 10px 14px; min-height: 44px; font-weight: 700; }
  #new-game { background: linear-gradient(120deg, #ffd23f, #ff9f1c); color: #5b3200; }

  #main { flex: 1; display: flex; min-height: 0; }

  #stagewrap { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

  /* ---- the 3D stage; every layer above the canvas that isn't a hit-cell is
         pointer-events:none so nothing ever intercepts a tap on a cell */
  #stage { position: relative; flex: 1; min-height: 0; overflow: hidden; touch-action: none; }
  #stage, #stage * { touch-action: none; }
  #gl { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #domScene { position: absolute; inset: 0; pointer-events: none; }
  #domScene .sun {
    position: absolute; top: 6%; right: 10%; width: 90px; height: 90px; border-radius: 50%;
    background: radial-gradient(circle, #fff8d6 0%, #ffe066 55%, rgba(255, 224, 102, 0) 72%);
  }
  #domScene .meadow {
    position: absolute; left: -10%; right: -10%; bottom: -12%; height: 34%;
    border-radius: 50% 50% 0 0 / 80% 80% 0 0;
    background: linear-gradient(180deg, #8ede8a, #5cbf60);
  }
  #domBoard {
    position: absolute; pointer-events: none;
    background: linear-gradient(160deg, #fdf3d8, #f2ddb0);
    border-radius: 14px; box-shadow: 0 14px 30px rgba(40, 80, 60, 0.25);
  }
  #domGems { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
  .dgem { position: absolute; left: 0; top: 0; will-change: transform; }
  .dgem.t0 { background: radial-gradient(circle at 35% 30%, #ffb3b5, #ff5a5f 60%, #c22a30); clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }
  .dgem.t1 { background: radial-gradient(circle at 35% 30%, #ffd9a1, #ff9f1c 60%, #c96f00); clip-path: polygon(25% 5%, 75% 5%, 98% 50%, 75% 95%, 25% 95%, 2% 50%); }
  .dgem.t2 { background: radial-gradient(circle at 35% 30%, #fff2ae, #ffd23f 60%, #cf9c00); border-radius: 16%; }
  .dgem.t3 { background: radial-gradient(circle at 35% 30%, #a9ecc4, #2ec46f 60%, #157a42); clip-path: polygon(50% 0, 100% 38%, 81% 100%, 19% 100%, 0 38%); }
  .dgem.t4 { background: radial-gradient(circle at 35% 30%, #b5dcff, #3aa7ff 60%, #1565b8); clip-path: polygon(50% 2%, 95% 95%, 5% 95%); }
  .dgem.t5 { background: radial-gradient(circle, rgba(0, 0, 0, 0) 30%, #f0a3f5 34%, #e86af0 55%, #9b2fa5 78%, rgba(0, 0, 0, 0) 80%); }

  /* the 64 hit-cells: the only pointer-receiving layer above the canvas */
  #cells { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  #cells .hitcell {
    position: absolute; left: 0; top: 0;
    pointer-events: auto; cursor: grab;
    border-radius: 20%;
    background: transparent;
  }

  /* decorative fx layer — strictly pointer-events:none */
  #fx { position: absolute; inset: 0; z-index: 8; pointer-events: none; overflow: hidden; }
  #fx * { pointer-events: none; }
  .pop {
    position: absolute; left: 50%; top: 40%;
    transform: translate(-50%, -50%);
    font-size: clamp(30px, 7vw, 56px); font-weight: 900;
    color: #ff8a00;
    -webkit-text-stroke: 1.5px #fff;
    text-shadow: 0 3px 12px rgba(120, 60, 0, 0.35);
    animation: popfloat 1.5s ease-out forwards;
    white-space: nowrap;
  }
  .pop.bonus {
    top: 54%;
    font-size: clamp(18px, 4vw, 30px);
    color: #7a3cff;
    animation-duration: 1.9s;
  }
  @keyframes popfloat {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(0.6); }
    12% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    24% { transform: translate(-50%, -52%) scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -120%) scale(1); }
  }
  .cascadepop {
    position: absolute; left: 50%; top: 24%;
    transform: translate(-50%, -50%);
    font-weight: 900; color: #ffffff;
    -webkit-text-stroke: 1px rgba(200, 90, 0, 0.6);
    text-shadow: 0 0 18px rgba(255, 170, 40, 0.9);
    animation: cascadezip 0.9s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes cascadezip {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    18% { opacity: 1; transform: translate(-50%, -50%) scale(1.25); }
    36% { transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -85%) scale(1.05); }
  }
  .stagebanner {
    position: absolute; left: 50%; top: 34%;
    transform: translate(-50%, -50%);
    padding: 14px 26px; border-radius: 16px;
    background: rgba(255, 255, 255, 0.92);
    font-size: clamp(20px, 5vw, 34px); font-weight: 900;
    color: var(--ink); text-align: center;
    box-shadow: 0 10px 40px rgba(30, 60, 90, 0.3);
    animation: bannerin 2s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes bannerin {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    12% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    22% { transform: translate(-50%, -50%) scale(1); }
    82% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
  }
  .flash { position: absolute; inset: 0; background: #fff; animation: flashout 0.45s ease-out forwards; }
  @keyframes flashout { from { opacity: 0.85; } to { opacity: 0; } }

  #gameover {
    position: absolute; inset: 0; z-index: 12;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(4px);
    text-align: center; padding: 20px;
  }
  #gameover[hidden] { display: none; }
  #gameover .big { font-size: clamp(26px, 7vw, 44px); font-weight: 900; }
  #gameover .sub { font-size: 15px; opacity: 0.8; }

  /* ---- view bar (camera controls, stage name) — outside the stage */
  #viewbar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    z-index: 20;
  }
  #stageName { flex: 1; font-size: 13px; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #viewbar button { min-width: 44px; min-height: 40px; padding: 6px 10px; font-weight: 700; }
  #viewbar .viewhint { font-size: 11px; opacity: 0.6; white-space: nowrap; }

  /* ---- HUD (collapsible; sits BESIDE/BELOW the board, never over it) */
  #hud {
    flex: 0 0 320px;
    overflow-y: auto;
    padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
    background: var(--panel);
    backdrop-filter: blur(6px);
    z-index: 20;
  }
  #hud.hidden { display: none; }
  .panel {
    background: rgba(255, 255, 255, 0.75);
    border-radius: 14px;
    padding: 10px 12px;
    box-shadow: 0 2px 8px rgba(30, 60, 90, 0.1);
  }
  .panel h2 { margin: 0 0 6px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.65; }
  #chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px;
    background: var(--chip); font-size: 13px; font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(30, 60, 90, 0.08);
  }
  .chip.hotchip { background: linear-gradient(120deg, #ffe08a, #ffb03c); color: #6b3600; animation: hotpulse 1.6s ease-in-out infinite; }
  @keyframes hotpulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 150, 20, 0.55); } 50% { box-shadow: 0 0 0 7px rgba(255, 150, 20, 0); } }
  .chip.luckychip { background: linear-gradient(120deg, #d5f7e2, #9be8c0); color: #10502e; }
  .chip.multchip { background: linear-gradient(120deg, #e6dcff, #c9b3ff); color: #3a1d7a; }
  .glyph { font-size: 15px; line-height: 1; }

  #ledger { display: flex; flex-direction: column; gap: 4px; }
  .lrow {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 8px; border-radius: 10px; font-size: 14px;
  }
  .lrow .glyph { width: 20px; text-align: center; font-size: 17px; }
  .lrow .lname { flex: 1; font-weight: 600; }
  .lrow .lval { font-weight: 800; font-variant-numeric: tabular-nums; }
  .lrow .ltag { font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 6px; }
  .lrow .ltag.hot { background: #ffb03c; color: #6b3600; }
  .lrow .ltag.lucky { background: #9be8c0; color: #10502e; }
  .lrow.hotrow { background: linear-gradient(90deg, rgba(255, 210, 63, 0.35), rgba(255, 159, 28, 0.18)); }
  .lrow.luckyrow { outline: 2px dashed rgba(46, 196, 111, 0.55); outline-offset: -2px; }

  #peek { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .peekchip {
    width: 26px; height: 26px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 15px; background: var(--chip);
    box-shadow: inset 0 0 0 1px rgba(30, 60, 90, 0.1);
  }
  .peeknote { font-size: 11px; opacity: 0.65; width: 100%; }

  #multnote { font-size: 11px; opacity: 0.65; margin-top: 4px; }

  /* ---- narrow / portrait: column layout, board on top, HUD below */
  @media (max-width: 840px), (orientation: portrait) {
    #main { flex-direction: column; }
    #topbar { flex-wrap: wrap; row-gap: 6px; padding: 6px 8px; }
    #topbar h1 { font-size: 17px; }
    #hud {
      flex: 0 1 auto;
      max-height: 40dvh;
      width: auto;
    }
    #stagewrap { flex: 1 1 auto; }
  }
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <h1>SUNMEADOW</h1>
    <div id="scorewrap">
      <div id="score">0</div>
      <div id="best">best 0</div>
    </div>
    <div class="topbtns">
      <button id="new-game" data-testid="new-game" type="button">New game</button>
      <button id="hud-toggle" data-testid="hud-toggle" type="button" aria-expanded="true" aria-controls="hud">Hide panel</button>
    </div>
  </header>

  <div id="main">
    <div id="stagewrap">
      <div id="stage">
        <canvas id="gl"></canvas>
        <div id="domScene" hidden>
          <div class="sun"></div>
          <div class="meadow"></div>
          <div id="domBoard"></div>
        </div>
        <div id="domGems" hidden></div>
        <div id="cells"></div>
        <div id="fx"></div>
        <div id="gameover" hidden>
          <div class="big">Out of moves!</div>
          <div class="sub">The meadow is settled — press <strong>New game</strong> up top to plant a fresh board.</div>
        </div>
      </div>
      <div id="viewbar">
        <span id="stageName">Stage 1 — Morning Meadow</span>
        <span class="viewhint">drag sky to orbit · pinch to zoom</span>
        <button id="zoom-out" type="button" aria-label="Zoom out">−</button>
        <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
        <button id="reset-view" type="button">⟲ view</button>
      </div>
    </div>

    <aside id="hud" data-testid="hud">
      <div class="panel">
        <h2>Now</h2>
        <div id="chips">
          <span class="chip hotchip" id="hotchip"><span class="glyph"></span><span></span></span>
          <span class="chip multchip" id="multchip">×1 multiplier</span>
          <span class="chip luckychip" id="luckychip">Lucky: —</span>
        </div>
        <div id="multnote">4-match ×2, 5-match ×4 … triples halve the streak.</div>
      </div>
      <div class="panel">
        <h2>Gem values — per gem, right now</h2>
        <div id="ledger"></div>
      </div>
      <div class="panel">
        <h2>Next drops</h2>
        <div id="peek"></div>
      </div>
    </aside>
  </div>
</div>
<script type="module" src="./render.js"></script>
</body>
</html>
