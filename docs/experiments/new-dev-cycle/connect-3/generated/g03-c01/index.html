<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gem Cascade</title>
<style>
  :root {
    --accent: #f39c12;
    --accent-dark: #d9820a;
    --bg-top: #1b1029;
    --bg-bottom: #2c1650;
    --board-bg: #140b22;
    --cell-gap: 6px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at top, var(--bg-bottom), var(--bg-top));
    font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: #f5efe6;
    overflow: hidden;
    touch-action: none;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 1.5rem;
  }

  h1 {
    margin: 0;
    font-size: 2.2rem;
    letter-spacing: 0.04em;
    font-weight: 800;
    background: linear-gradient(135deg, #fff3d6, var(--accent) 60%, var(--accent-dark));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 18px rgba(243, 156, 18, 0.35);
  }

  .hud {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 1.1rem;
    font-weight: 600;
    color: #f5efe6;
  }

  .hud .score-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    padding: 0.4rem 1rem;
    border-radius: 999px;
    box-shadow: 0 3px 10px rgba(243, 156, 18, 0.4);
    color: #241205;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .board-wrap {
    position: relative;
  }

  #board {
    position: relative;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: var(--cell-gap);
    width: min(88vw, 88vh, 620px);
    height: min(88vw, 88vh, 620px);
    padding: 12px;
    background: linear-gradient(160deg, #241436, var(--board-bg));
    border-radius: 22px;
    box-shadow:
      0 20px 50px rgba(0, 0, 0, 0.55),
      inset 0 0 0 2px rgba(255, 255, 255, 0.05);
  }

  .cell {
    position: relative;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    will-change: transform, opacity;
    transition: transform 0.12s ease-out;
  }

  .cell:active {
    cursor: grabbing;
  }

  .gem {
    position: absolute;
    inset: 3%;
    border-radius: 50%;
    box-shadow:
      inset 0 -6px 10px rgba(0, 0, 0, 0.25),
      inset 0 4px 8px rgba(255, 255, 255, 0.45),
      0 3px 6px rgba(0, 0, 0, 0.35);
    transition: transform 0.18s ease, opacity 0.18s ease;
  }

  .gem::after {
    content: "";
    position: absolute;
    top: 14%;
    left: 20%;
    width: 32%;
    height: 22%;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    filter: blur(1px);
  }

  .gem-0 { background: radial-gradient(circle at 35% 30%, #ff8a8a, #d3242f 70%, #8c0f18); }
  .gem-1 { background: radial-gradient(circle at 35% 30%, #8fe3ff, #1c8fd6 70%, #0b4a80); }
  .gem-2 { background: radial-gradient(circle at 35% 30%, #b6ff9e, #2fae3e 70%, #145c1c); }
  .gem-3 { background: radial-gradient(circle at 35% 30%, #ffe28a, #f2b419 70%, #9c6a06); }
  .gem-4 { background: radial-gradient(circle at 35% 30%, #e2b6ff, #9b3fd6 70%, #591c80); }
  .gem-5 { background: radial-gradient(circle at 35% 30%, #ffb98a, #f2701e 70%, #9c3c06); }

  .gem.matched {
    animation: pop 0.2s ease-in forwards;
  }

  @keyframes pop {
    0%   { transform: scale(1);   opacity: 1; filter: brightness(1); }
    40%  { transform: scale(1.35); opacity: 1; filter: brightness(1.8); }
    100% { transform: scale(0.1); opacity: 0; filter: brightness(2.2); }
  }

  .float-gain {
    position: absolute;
    left: 50%;
    top: 40%;
    transform: translate(-50%, 0);
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 2px 10px rgba(0,0,0,0.6), 0 0 18px rgba(243,156,18,0.6);
    pointer-events: none;
    animation: floatUp 1.4s ease-out forwards;
    z-index: 50;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translate(-50%, 20px) scale(0.8); }
    15%  { opacity: 1; transform: translate(-50%, 0) scale(1.1); }
    30%  { transform: translate(-50%, -6px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -70px) scale(1); }
  }

  footer {
    opacity: 0.6;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <div class="page">
    <h1>Gem Cascade</h1>
    <div class="hud">
      <span class="score-badge" id="score-badge">0 pts</span>
    </div>
    <div class="board-wrap">
      <div id="board" role="grid" aria-label="Match-3 board"></div>
    </div>
    <footer>slide a gem into a neighbour to swap</footer>
  </div>
  <script type="module" src="./render.js"></script>
</body>
</html>
