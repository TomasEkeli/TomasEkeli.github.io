<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Abyssal Match</title>
<style>
  :root {
    --cell: 56px;
    --ink: #eaf7f6;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    overflow-x: hidden;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(120, 230, 220, 0.18), transparent 55%),
      radial-gradient(ellipse at 85% 110%, rgba(20, 60, 90, 0.55), transparent 60%),
      linear-gradient(200deg, #0a2f3a 0%, #072634 35%, #04141f 70%, #020a10 100%);
    background-attachment: fixed;
    position: relative;
  }

  /* Underwater light shafts + drifting bubbles: a deep-sea backdrop of our own. */
  .shaft {
    position: fixed;
    top: -10%;
    width: 140px;
    height: 130%;
    background: linear-gradient(180deg, rgba(180, 245, 235, 0.10), rgba(180, 245, 235, 0) 70%);
    transform: rotate(10deg);
    filter: blur(6px);
    pointer-events: none;
    z-index: 0;
  }
  .shaft.s1 { left: 8%; animation: shimmer 9s ease-in-out infinite; }
  .shaft.s2 { left: 42%; width: 90px; animation: shimmer 12s ease-in-out infinite reverse; }
  .shaft.s3 { left: 74%; width: 110px; animation: shimmer 7.5s ease-in-out infinite; }

  @keyframes shimmer {
    0%, 100% { opacity: .35; transform: rotate(10deg) translateX(0); }
    50% { opacity: .75; transform: rotate(6deg) translateX(18px); }
  }

  .bubble {
    position: fixed;
    bottom: -5%;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.85), rgba(255,255,255,0.05) 60%, transparent 70%);
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: .6; }
    100% { transform: translateY(-115vh) translateX(20px); opacity: 0; }
  }

  header {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 14px;
  }

  h1 {
    margin: 0 0 6px;
    font-size: 1.9rem;
    letter-spacing: 0.06em;
    font-weight: 700;
    background: linear-gradient(90deg, #7fe9de, #ffd25a 60%, #ff8fb0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(120, 230, 220, 0.25);
  }

  .hud {
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: baseline;
    font-size: 0.95rem;
    color: #bfe9e4;
    letter-spacing: 0.03em;
  }

  #score-value {
    font-size: 1.4rem;
    font-weight: 700;
    color: #ffd25a;
    text-shadow: 0 0 12px rgba(255, 210, 90, 0.5);
  }

  .stage {
    position: relative;
    z-index: 2;
    padding: 18px;
    border-radius: 22px;
    background: linear-gradient(160deg, rgba(10, 50, 60, 0.55), rgba(4, 20, 30, 0.75));
    border: 1px solid rgba(140, 230, 220, 0.25);
    box-shadow:
      0 25px 60px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(0,0,0,0.2),
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 0 70px rgba(70, 200, 190, 0.12);
    backdrop-filter: blur(6px);
  }

  #board-wrap {
    position: relative;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, var(--cell));
    grid-template-rows: repeat(8, var(--cell));
    border-radius: 14px;
    overflow: hidden;
    box-shadow: inset 0 2px 18px rgba(0,0,0,0.55);
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.045);
  }
  .cell:nth-child(odd) { background: rgba(255, 255, 255, 0.035); }

  #gem-layer {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: auto;
    touch-action: none;
  }

  .gem {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--cell);
    height: var(--cell);
    will-change: transform;
    z-index: 1;
  }
  .gem.clearing .gem-body { animation: none; }

  .gem-body {
    position: absolute;
    inset: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
    animation: idle-pulse 3.2s ease-in-out infinite, idle-rot 6s ease-in-out infinite;
    transform-origin: center;
  }

  @keyframes idle-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.045); }
  }
  @keyframes idle-rot {
    0%, 100% { transform: rotate(-2.5deg); }
    50% { transform: rotate(2.5deg); }
  }

  .gem.clearing .gem-body {
    animation: pop-clear 0.22s ease-in forwards;
  }
  @keyframes pop-clear {
    0% { transform: scale(1); opacity: 1; filter: brightness(1) drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
    40% { transform: scale(1.35); opacity: 1; filter: brightness(1.9) drop-shadow(0 0 18px rgba(255,255,255,0.8)); }
    100% { transform: scale(0.2); opacity: 0; filter: brightness(2.4); }
  }

  /* Faceted jewel body: base gradient gives lit-from-top-left dimensionality. */
  .gem-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 22%, rgba(255,255,255,0.95), rgba(255,255,255,0.15) 30%, transparent 55%),
      linear-gradient(155deg, color-mix(in srgb, var(--base) 92%, white 8%) 0%, var(--base) 45%, var(--edge) 100%);
    box-shadow:
      inset -3px -4px 6px rgba(0,0,0,0.45),
      inset 2px 2px 4px rgba(255,255,255,0.55);
  }

  .gem-circle, .gem-circle::before { border-radius: 50%; }
  .gem-diamond::before { clip-path: polygon(50% 2%, 98% 50%, 50% 98%, 2% 50%); }
  .gem-triangle::before { clip-path: polygon(50% 4%, 96% 92%, 4% 92%); }
  .gem-hex::before { clip-path: polygon(50% 2%, 93% 26%, 93% 74%, 50% 98%, 7% 74%, 7% 26%); }
  .gem-star::before { clip-path: polygon(50% 0%, 63% 35%, 100% 38%, 71% 60%, 82% 96%, 50% 75%, 18% 96%, 29% 60%, 0% 38%, 37% 35%); }
  .gem-cross::before { clip-path: polygon(36% 0%, 64% 0%, 64% 32%, 100% 32%, 100% 64%, 64% 64%, 64% 100%, 36% 100%, 36% 64%, 0% 64%, 0% 32%, 36% 32%); }

  /* A small brighter facet chip for extra "cut jewel" read. */
  .facet {
    position: absolute;
    top: 14%;
    left: 18%;
    width: 34%;
    height: 26%;
    background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0.05));
    clip-path: polygon(0 0, 100% 20%, 40% 100%, 0% 70%);
    opacity: 0.7;
    pointer-events: none;
  }

  /* Slow-sweeping glint = "calm watery" pazzazz. */
  .glint {
    position: absolute;
    inset: -20%;
    background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.55) 50%, transparent 60%);
    background-size: 260% 260%;
    background-position: -120% -120%;
    animation: sweep 5.5s ease-in-out infinite;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  @keyframes sweep {
    0% { background-position: -120% -120%; opacity: 0; }
    35% { opacity: .9; }
    55% { background-position: 120% 120%; opacity: 0; }
    100% { background-position: 120% 120%; opacity: 0; }
  }

  #popup-host {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    z-index: 5;
    overflow: visible;
  }

  .gain-pop {
    position: absolute;
    top: 38%;
    font-size: 2.4rem;
    font-weight: 800;
    color: #ffe38a;
    text-shadow:
      0 0 10px rgba(255, 210, 90, 0.9),
      0 0 26px rgba(255, 160, 90, 0.6),
      0 2px 2px rgba(0,0,0,0.6);
    animation: float-pop 1.5s ease-out forwards;
  }
  @keyframes float-pop {
    0% { transform: translateY(10px) scale(0.6); opacity: 0; }
    15% { transform: translateY(-6px) scale(1.15); opacity: 1; }
    30% { transform: translateY(-14px) scale(1); opacity: 1; }
    100% { transform: translateY(-90px) scale(1); opacity: 0; }
  }

  footer {
    position: relative;
    z-index: 2;
    margin-top: 14px;
    font-size: 0.78rem;
    color: rgba(200, 235, 230, 0.55);
    letter-spacing: 0.04em;
  }

  @media (prefers-color-scheme: light) {
    body {
      background:
        radial-gradient(ellipse at 20% -10%, rgba(120, 230, 220, 0.25), transparent 55%),
        radial-gradient(ellipse at 85% 110%, rgba(20, 60, 90, 0.35), transparent 60%),
        linear-gradient(200deg, #123845 0%, #0c2c38 40%, #06161f 75%, #020a10 100%);
    }
  }
</style>
</head>
<body>
  <div class="shaft s1"></div>
  <div class="shaft s2"></div>
  <div class="shaft s3"></div>

  <header>
    <h1>Abyssal Match</h1>
    <div class="hud">
      <span>Score <span id="score-value">0</span></span>
    </div>
  </header>

  <div class="stage">
    <div id="board-wrap">
      <div id="board"></div>
      <div id="gem-layer"></div>
      <div id="popup-host"></div>
    </div>
  </div>

  <footer>slide a gem into a neighbour to swap</footer>

  <script>
    // A handful of drifting bubbles for the deep-sea backdrop.
    (function bubbles() {
      const n = 16;
      for (let i = 0; i < n; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = 6 + Math.random() * 16;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + 'vw';
        b.style.animationDuration = (10 + Math.random() * 14) + 's';
        b.style.animationDelay = (Math.random() * 14) + 's';
        document.body.appendChild(b);
      }
    })();
  </script>
  <script type="module" src="./render.js"></script>
</body>
</html>
