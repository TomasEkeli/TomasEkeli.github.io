<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verdant — a match-3 in the emerald glade</title>
  <style>
    :root {
      --cell: 64px;
      --moss-1: #0a1f14;
      --moss-2: #123324;
      --moss-3: #1c4a33;
      --stone: #2a3d31;
      --gold: #e8c46a;
      --gold-soft: #f4e2a8;
      --ink: #eaf6ec;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      background:
        radial-gradient(1200px 700px at 20% -10%, #1c5238 0%, transparent 60%),
        radial-gradient(1000px 800px at 90% 110%, #0e3a24 0%, transparent 55%),
        linear-gradient(160deg, #06160d 0%, #0c2618 45%, #08301c 100%);
    }

    /* Dappled light shafts drifting through the canopy. */
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 42%, rgba(196, 255, 196, 0.06) 47%, transparent 52%),
        linear-gradient(115deg, transparent 60%, rgba(196, 255, 196, 0.05) 66%, transparent 72%),
        radial-gradient(600px 300px at 30% 15%, rgba(180, 255, 190, 0.08), transparent 70%);
      animation: canopy 22s ease-in-out infinite alternate;
    }
    @keyframes canopy {
      from { transform: translate3d(-2%, -1%, 0) rotate(-1deg); }
      to   { transform: translate3d(2%, 2%, 0) rotate(1deg); }
    }

    #fireflies {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .firefly {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: radial-gradient(circle, #f6ffb0 0%, rgba(182,240,120,0.6) 55%, transparent 72%);
      box-shadow: 0 0 8px 2px rgba(214, 255, 140, 0.7);
      animation: firefly-float linear infinite;
      opacity: 0;
    }
    @keyframes firefly-float {
      0%   { transform: translate(0, 0); opacity: 0; }
      15%  { opacity: 0.9; }
      50%  { transform: translate(var(--drift-x), var(--drift-y)); opacity: 0.5; }
      85%  { opacity: 0.9; }
      100% { transform: translate(0, 0); opacity: 0; }
    }

    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    header.title {
      text-align: center;
      line-height: 1.1;
    }
    header.title h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 2px;
      font-weight: 800;
      background: linear-gradient(180deg, var(--gold-soft), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    }
    header.title p {
      margin: 4px 0 0;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #9dd6ac;
      opacity: 0.85;
    }

    .hud {
      display: flex;
      gap: 14px;
      align-items: stretch;
      width: min(92vw, calc(var(--cell) * 8));
    }
    .hud-card {
      flex: 1;
      background: linear-gradient(180deg, rgba(28, 74, 51, 0.9), rgba(14, 40, 26, 0.9));
      border: 1px solid rgba(232, 196, 106, 0.35);
      border-radius: 14px;
      padding: 10px 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .hud-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8fc9a0;
    }
    .hud-value {
      font-size: 26px;
      font-weight: 800;
      color: var(--gold-soft);
      font-variant-numeric: tabular-nums;
    }
    #last-gain-value { color: #bff0c4; }

    .new-game-card {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      padding: 0;
      background: none;
      border: none;
      box-shadow: none;
    }
    #new-game {
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      letter-spacing: 1px;
      color: #10240f;
      padding: 12px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.3);
      background: linear-gradient(180deg, #f4e2a8, #d9a83f);
      box-shadow: 0 6px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
      transition: transform 0.12s ease, filter 0.12s ease;
    }
    #new-game:hover { filter: brightness(1.07); transform: translateY(-1px); }
    #new-game:active { transform: translateY(1px); }

    /* -------- board: lifted mossy-stone frame -------- */
    .board-frame {
      position: relative;
      padding: 16px;
      border-radius: 22px;
      background:
        linear-gradient(145deg, #37503f, #1d3327),
        var(--stone);
      border: 2px solid rgba(232, 196, 106, 0.4);
      box-shadow:
        0 26px 60px rgba(0, 0, 0, 0.55),
        0 6px 0 #0b1c12,
        inset 0 2px 4px rgba(255,255,255,0.08),
        inset 0 -6px 14px rgba(0,0,0,0.5);
    }
    .board-frame::after {
      /* carved rune corners for character */
      content: "❧";
      position: absolute;
      top: 6px; left: 12px;
      font-size: 16px;
      color: rgba(232, 196, 106, 0.5);
    }

    #board {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.12) 0 12px, transparent 12px 24px),
        linear-gradient(160deg, #10281a, #0a1d12);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
    }

    #slots, #gems-layer, #gain-layer {
      position: absolute;
      inset: 0;
    }
    #gain-layer { pointer-events: none; z-index: 40; }

    .slot {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }
    .slot-alt {
      background: rgba(0,0,0,0.16);
    }

    /* -------- gems -------- */
    .gem-slot {
      position: absolute;
      top: 0; left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.19s cubic-bezier(0.34, 1.3, 0.64, 1);
      will-change: transform;
      touch-action: none;
      cursor: grab;
      z-index: 2;
    }
    .gem-slot:active { cursor: grabbing; }

    .gem {
      position: relative;
      width: 78%;
      height: 78%;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.55));
      animation: gem-idle 4.5s ease-in-out infinite;
      animation-delay: var(--idle-delay);
    }
    @keyframes gem-idle {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      50%      { transform: translateY(-2px) rotate(1.5deg) scale(1.02); }
    }

    /* The coloured, faceted jewel body. Each type gets its own clip shape. */
    .gem-facet {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, var(--g-lite) 0%, var(--g-main) 45%, var(--g-dark) 100%);
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,0.55),
        inset 0 -5px 8px rgba(0,0,0,0.45);
    }
    /* faceted inner cut lines */
    .gem-facet::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.28) 50%, transparent 60%),
        linear-gradient(-40deg, transparent 45%, rgba(0,0,0,0.22) 55%, transparent 65%);
    }
    /* moving glint */
    .gem-glint {
      position: absolute;
      top: 8%;
      left: 8%;
      width: 34%;
      height: 34%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(255,255,255,0) 65%);
      border-radius: 50%;
      opacity: 0.9;
      animation: glint 6s ease-in-out infinite;
      animation-delay: var(--glint-delay);
    }
    @keyframes glint {
      0%, 70%, 100% { opacity: 0.55; transform: translate(0,0) scale(1); }
      80%           { opacity: 1; transform: translate(6%, 6%) scale(1.2); }
    }

    /* Distinct SHAPE per type via clip-path (colour-blind safe) applied to the
       facet, the cut overlay and the whole gem shadow. */
    .gem-facet, .gem-glint { }
    .gem-type-0 .gem-facet, .gem-type-0 .gem-facet::before {
      clip-path: polygon(50% 0, 100% 35%, 82% 100%, 18% 100%, 0 35%); /* emerald pentagon */
    }
    .gem-type-1 .gem-facet, .gem-type-1 .gem-facet::before {
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); /* ruby diamond */
    }
    .gem-type-2 .gem-facet, .gem-type-2 .gem-facet::before {
      clip-path: polygon(50% 0, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0 60%, 10% 20%); /* sapphire heptagon */
    }
    .gem-type-3 .gem-facet, .gem-type-3 .gem-facet::before {
      clip-path: polygon(20% 0, 80% 0, 100% 50%, 80% 100%, 20% 100%, 0 50%); /* topaz hexagon */
    }
    .gem-type-4 .gem-facet, .gem-type-4 .gem-facet::before {
      clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); /* amethyst star */
    }
    .gem-type-5 .gem-facet, .gem-type-5 .gem-facet::before {
      clip-path: circle(48% at 50% 50%); /* citrine round brilliant */
    }

    .gem-type-0 { --g-lite:#a8f5b8; --g-main:#22b455; --g-dark:#0c5b2a; }
    .gem-type-1 { --g-lite:#ffb0ab; --g-main:#e23b3b; --g-dark:#7d1414; }
    .gem-type-2 { --g-lite:#a8d4ff; --g-main:#2f79e0; --g-dark:#123a78; }
    .gem-type-3 { --g-lite:#ffe9a6; --g-main:#f5b52a; --g-dark:#9a6c05; }
    .gem-type-4 { --g-lite:#e3b8ff; --g-main:#9b4ce0; --g-dark:#4d1d80; }
    .gem-type-5 { --g-lite:#fff4c2; --g-main:#f0e04a; --g-dark:#a89610; }

    .gem.clearing {
      animation: gem-clear 0.22s ease-out forwards;
    }
    @keyframes gem-clear {
      0%   { transform: scale(1); filter: drop-shadow(0 4px 4px rgba(0,0,0,0.55)) brightness(1); }
      40%  { transform: scale(1.28) rotate(10deg); filter: drop-shadow(0 0 18px #fff) brightness(2); }
      100% { transform: scale(0) rotate(40deg); filter: drop-shadow(0 0 24px #fff) brightness(3); opacity: 0; }
    }

    .gem.hinting {
      animation: gem-hint 0.9s ease-in-out infinite;
    }
    @keyframes gem-hint {
      0%, 100% { transform: rotate(0) scale(1); }
      25%      { transform: rotate(-7deg) scale(1.05); }
      75%      { transform: rotate(7deg) scale(1.05); }
    }

    /* -------- floating +N -------- */
    .floating-gain {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 52px;
      font-weight: 900;
      color: var(--gold-soft);
      text-shadow:
        0 0 12px rgba(232, 196, 106, 0.9),
        0 3px 8px rgba(0,0,0,0.7);
      pointer-events: none;
      animation: gain-pop 1.5s cubic-bezier(0.2, 0.8, 0.3, 1) forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap;
    }
    .floating-gain-bonus { color: #b6ffcb; text-shadow: 0 0 16px rgba(120,255,160,0.9), 0 3px 8px rgba(0,0,0,0.7); }
    .floating-gain-sub {
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    @keyframes gain-pop {
      0%   { opacity: 0; transform: translate(-50%, -20%) scale(0.4); }
      20%  { opacity: 1; transform: translate(-50%, -55%) scale(1.15); }
      35%  { transform: translate(-50%, -60%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -160%) scale(1.05); }
    }

    /* -------- hint note + game over -------- */
    #hint-note {
      height: 16px;
      font-size: 12px;
      letter-spacing: 1px;
      color: #bff0c4;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #hint-note.visible { opacity: 0.85; }

    #game-over-overlay {
      position: absolute;
      inset: 16px;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(6, 22, 13, 0.82);
      backdrop-filter: blur(3px);
      z-index: 50;
      text-align: center;
    }
    #game-over-overlay.visible { display: flex; }
    #game-over-overlay h2 {
      margin: 0;
      font-size: 40px;
      color: var(--gold-soft);
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }
    #game-over-overlay p { margin: 0; color: #cfeed6; max-width: 260px; }
    #game-over-overlay .go-btn {
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      color: #10240f;
      padding: 12px 26px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.3);
      background: linear-gradient(180deg, #f4e2a8, #d9a83f);
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="fireflies"></div>

  <main class="stage">
    <header class="title">
      <h1>VERDANT</h1>
      <p>match-3 in the emerald glade</p>
    </header>

    <div class="hud">
      <div class="hud-card">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="score-value">0</div>
      </div>
      <div class="hud-card">
        <div class="hud-label">Last Move</div>
        <div class="hud-value" id="last-gain-value">0</div>
      </div>
      <div class="new-game-card">
        <button id="new-game" data-testid="new-game" type="button">New Game</button>
      </div>
    </div>

    <div class="board-frame">
      <div id="board">
        <div id="slots"></div>
        <div id="gems-layer"></div>
        <div id="gain-layer"></div>
        <div id="game-over-overlay">
          <h2>Out of Moves</h2>
          <p>The glade has settled. Start a fresh game to keep matching.</p>
          <button class="go-btn" type="button"
                  onclick="document.getElementById('new-game').click()">Play Again</button>
        </div>
      </div>
    </div>

    <div id="hint-note">✦ a move awaits — or find your own for a bonus</div>
  </main>

  <script type="module" src="./render.js"></script>
</body>
</html>
