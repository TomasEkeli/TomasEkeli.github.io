<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Rain — a rain-streaked match-3</title>
<style>
  :root {
    --sky-top: #0a1224;
    --sky-mid: #101c34;
    --sky-bottom: #060a16;
    --neon-a: #38e0ff;
    --neon-b: #ff4fc3;
    --neon-c: #ffb347;
    --rain-opacity: 0.28;
    --rain-speed: 0.55s;
    --accent: #38e0ff;
  }

  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: #eaf3ff;
    overflow-x: hidden;
  }

  body {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #05070f;
  }

  /* ---------- Backdrop: rainy neon city night ---------- */

  #backdrop {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(56,224,255,0.10), transparent 55%),
      radial-gradient(ellipse at 85% 10%, rgba(255,79,195,0.10), transparent 50%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bottom) 100%);
    transition: background 1.4s ease;
  }

  #bokeh { position: fixed; inset: 0; z-index: 1; overflow: hidden; }
  .bokeh-dot {
    position: absolute;
    border-radius: 50%;
    filter: blur(6px);
    opacity: 0.55;
    animation: drift 14s ease-in-out infinite, flicker 5s ease-in-out infinite;
  }

  @keyframes drift {
    0%   { transform: translateY(0px) translateX(0px) scale(1); }
    50%  { transform: translateY(-18px) translateX(10px) scale(1.08); }
    100% { transform: translateY(0px) translateX(0px) scale(1); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.5; }
    45% { opacity: 0.65; }
    50% { opacity: 0.22; }
    55% { opacity: 0.62; }
  }

  #skyline {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 34vh;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    filter: drop-shadow(0 -6px 24px rgba(0,0,0,0.5));
  }
  .building {
    position: relative;
    background: linear-gradient(180deg, #060a16 0%, #0c1120 100%);
    opacity: 0.92;
    flex: none;
  }
  .window {
    position: absolute;
    width: 3px;
    height: 5px;
    border-radius: 1px;
    animation: winflicker 6s ease-in-out infinite;
  }
  @keyframes winflicker {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 0.35; }
    60% { opacity: 0.9; }
  }

  .rain-layer {
    position: fixed;
    inset: -10% -10%;
    z-index: 3;
    pointer-events: none;
    background-image: repeating-linear-gradient(
      100deg,
      rgba(180, 220, 255, 0.0) 0px,
      rgba(180, 220, 255, 0.55) 1px,
      rgba(180, 220, 255, 0.0) 2px,
      rgba(180, 220, 255, 0.0) 22px
    );
    background-size: 3px 140px;
    opacity: var(--rain-opacity);
    animation: rainfall var(--rain-speed) linear infinite;
    mix-blend-mode: screen;
  }
  .rain-layer.far { opacity: calc(var(--rain-opacity) * 0.55); background-size: 2px 100px; animation-duration: calc(var(--rain-speed) * 1.6); }

  @keyframes rainfall {
    0% { background-position: 0 -140px; }
    100% { background-position: -40px 140px; }
  }

  #glass-vignette {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 40%, transparent 45%, rgba(2,4,10,0.55) 100%);
  }

  #stage-flash {
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    background: var(--accent);
    opacity: 0;
  }
  #stage-flash.hit { animation: flash-pop 0.9s ease-out; }
  @keyframes flash-pop {
    0% { opacity: 0.55; }
    100% { opacity: 0; }
  }

  #stage-banner {
    position: fixed;
    top: 8%;
    left: 50%;
    transform: translate(-50%, -260px);
    opacity: 0;
    visibility: hidden;
    z-index: 41;
    padding: 14px 34px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(10,14,28,0.92), rgba(20,26,46,0.92));
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 20px 50px rgba(0,0,0,0.55), 0 0 40px var(--accent);
    text-align: center;
    transition: transform 0.6s cubic-bezier(.2,1.4,.4,1), opacity 0.4s ease, visibility 0s linear 0.6s;
    pointer-events: none;
  }
  #stage-banner.show {
    transform: translate(-50%, 0%);
    opacity: 1;
    visibility: visible;
    transition: transform 0.6s cubic-bezier(.2,1.4,.4,1), opacity 0.3s ease, visibility 0s linear 0s;
  }
  #stage-banner .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 4px;
  }
  #stage-banner .title {
    font-size: 26px;
    font-weight: 800;
    margin: 0;
    letter-spacing: 0.02em;
    text-shadow: 0 0 18px var(--accent);
  }

  /* ---------- Game frame ---------- */

  #app {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 22px 18px 30px;
    width: min(94vw, 620px);
  }

  header.hud-top {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  h1 {
    margin: 0;
    font-size: clamp(24px, 4.4vw, 34px);
    font-weight: 800;
    letter-spacing: 0.06em;
    background: linear-gradient(90deg, var(--neon-a), var(--neon-b));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(56,224,255,0.25);
  }
  .tagline {
    margin: 0;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #9fb3d0;
  }

  .hud {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .hud-tile {
    background: rgba(10,16,30,0.6);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 8px 14px;
    min-width: 84px;
    text-align: center;
    backdrop-filter: blur(6px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .hud-tile .label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #86a0c4;
    margin-bottom: 2px;
  }
  .hud-tile .value {
    font-size: 19px;
    font-weight: 700;
    color: #eaf3ff;
  }
  #hud-multiplier .value { color: var(--neon-c); text-shadow: 0 0 12px rgba(255,179,71,0.5); }
  #hud-score .value { color: var(--neon-a); text-shadow: 0 0 12px rgba(56,224,255,0.45); }
  #hud-best .value { color: var(--neon-b); text-shadow: 0 0 12px rgba(255,79,195,0.4); }

  #hud-featured {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #hud-featured .feat-icon {
    width: 26px; height: 26px;
    filter: drop-shadow(0 0 6px var(--accent));
    animation: feat-spin 5s ease-in-out infinite;
  }
  @keyframes feat-spin {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(8deg) scale(1.12); }
  }

  #new-game-btn {
    appearance: none;
    border: 1px solid rgba(255,255,255,0.25);
    background: linear-gradient(135deg, rgba(56,224,255,0.18), rgba(255,79,195,0.18));
    color: #eaf3ff;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  #new-game-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
  #new-game-btn:active { transform: translateY(0); }
  #new-game-btn.emphasize {
    font-size: 18px;
    padding: 16px 34px;
    animation: pulse-cta 1.4s ease-in-out infinite;
    box-shadow: 0 0 30px var(--accent);
  }
  @keyframes pulse-cta {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* ---------- Board ---------- */

  #board-panel {
    position: relative;
    width: min(88vw, 92vw, 92vh, 540px);
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    padding: 10px;
    background: linear-gradient(160deg, rgba(14,20,38,0.72), rgba(6,10,20,0.78));
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow:
      0 30px 70px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 0 60px rgba(56,224,255,0.10);
    backdrop-filter: blur(10px) saturate(120%);
  }

  #board {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 8px), rgba(3,6,14,0.55);
    box-shadow: inset 0 2px 18px rgba(0,0,0,0.6);
  }

  #cell-grid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
  }
  .cell {
    position: relative;
    touch-action: none;
    background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.03), transparent 70%);
  }
  .cell::after {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 8px;
    background: rgba(255,255,255,0.015);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
  }
  .cell.hint-cell::after {
    animation: hint-pulse 1.1s ease-in-out infinite;
  }
  @keyframes hint-pulse {
    0%, 100% { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03); }
    50% { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35), 0 0 14px rgba(255,255,255,0.25); }
  }

  #gems-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .gem-slot {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
  }
  .gem {
    position: relative;
    width: 82%;
    height: 82%;
    animation: idle-float 3.6s ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    transform-origin: 50% 50%;
  }
  @keyframes idle-float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-3%) rotate(2.2deg); }
  }
  .gem.clearing {
    animation: none;
    transition: transform 0.18s ease, opacity 0.18s ease;
  }
  .gem.matched {
    animation: match-throb 0.32s ease-in-out infinite;
  }
  @keyframes match-throb {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.16); filter: brightness(1.7); }
  }

  .gem-body, .gem-facet, .gem-hi, .gem-sh, .gem-glint {
    position: absolute;
    inset: 0;
  }
  .gem-body { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.55)); }
  .gem-facet { mix-blend-mode: overlay; opacity: 0.55; }
  .gem-hi { mix-blend-mode: screen; opacity: 0.85; }
  .gem-sh { mix-blend-mode: multiply; opacity: 0.55; }
  .gem-glint {
    mix-blend-mode: screen;
    opacity: 0;
    animation: glint-sweep 3.4s ease-in-out infinite;
    animation-delay: var(--gdelay, 0s);
  }
  @keyframes glint-sweep {
    0%, 78% { opacity: 0; transform: translateX(-60%) translateY(-60%) rotate(20deg); }
    82% { opacity: 0.9; }
    92% { opacity: 0; transform: translateX(60%) translateY(60%) rotate(20deg); }
    100% { opacity: 0; }
  }

  .gem-slot.featured .gem {
    animation: idle-float 3.6s ease-in-out infinite, feature-glow 1.3s ease-in-out infinite;
  }
  @keyframes feature-glow {
    0%, 100% { filter: brightness(1) drop-shadow(0 0 6px var(--accent)); }
    50% { filter: brightness(1.35) drop-shadow(0 0 20px var(--accent)); }
  }
  .gem-slot.featured::before {
    content: "★";
    position: absolute;
    top: -6px;
    right: -2px;
    font-size: 13px;
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent);
    animation: badge-bob 1.6s ease-in-out infinite;
    z-index: 5;
  }
  @keyframes badge-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  /* shapes */
  .shape-diamond .gem-body { clip-path: polygon(50% 4%, 88% 50%, 50% 96%, 12% 50%); }
  .shape-diamond .gem-facet { clip-path: polygon(50% 4%, 88% 50%, 50% 96%, 12% 50%); }
  .shape-diamond .gem-hi { clip-path: polygon(50% 4%, 88% 50%, 50% 96%, 12% 50%); }
  .shape-diamond .gem-sh { clip-path: polygon(50% 4%, 88% 50%, 50% 96%, 12% 50%); }
  .shape-diamond .gem-glint { clip-path: polygon(50% 4%, 88% 50%, 50% 96%, 12% 50%); }

  .shape-hex .gem-body, .shape-hex .gem-facet, .shape-hex .gem-hi, .shape-hex .gem-sh, .shape-hex .gem-glint {
    clip-path: polygon(25% 6%, 75% 6%, 98% 50%, 75% 94%, 25% 94%, 2% 50%);
  }

  .shape-pentagon .gem-body, .shape-pentagon .gem-facet, .shape-pentagon .gem-hi, .shape-pentagon .gem-sh, .shape-pentagon .gem-glint {
    clip-path: polygon(50% 2%, 96% 38%, 79% 96%, 21% 96%, 4% 38%);
  }

  .shape-octagon .gem-body, .shape-octagon .gem-facet, .shape-octagon .gem-hi, .shape-octagon .gem-sh, .shape-octagon .gem-glint {
    clip-path: polygon(32% 4%, 68% 4%, 96% 32%, 96% 68%, 68% 96%, 32% 96%, 4% 68%, 4% 32%);
  }

  .shape-star .gem-body, .shape-star .gem-facet, .shape-star .gem-hi, .shape-star .gem-sh, .shape-star .gem-glint {
    clip-path: polygon(50% 0%, 63% 36%, 100% 36%, 70% 58%, 82% 96%, 50% 73%, 18% 96%, 30% 58%, 0% 36%, 37% 36%);
  }

  .shape-circle .gem-body, .shape-circle .gem-facet, .shape-circle .gem-hi, .shape-circle .gem-sh, .shape-circle .gem-glint {
    clip-path: circle(48% at 50% 50%);
  }

  /* colours */
  .type-0 .gem-body { background: radial-gradient(circle at 35% 25%, #ff8fb0, #ff2d63 55%, #98072f 100%); }
  .type-0 .gem-hi { background: radial-gradient(circle at 32% 22%, rgba(255,255,255,0.95), transparent 45%); }
  .type-0 .gem-sh { background: radial-gradient(circle at 70% 78%, rgba(50,0,15,0.9), transparent 55%); }
  .type-0 .gem-glint { background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.9) 50%, transparent 60%); }

  .type-1 .gem-body { background: radial-gradient(circle at 35% 25%, #b6f4ff, #1fb6ff 55%, #063e6b 100%); }
  .type-1 .gem-hi { background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.95), transparent 45%); }
  .type-1 .gem-sh { background: radial-gradient(circle at 72% 78%, rgba(0,20,40,0.9), transparent 55%); }
  .type-1 .gem-glint { background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.9) 50%, transparent 60%); }

  .type-2 .gem-body { background: radial-gradient(circle at 35% 25%, #ffe4a3, #ffab2e 55%, #7a4a00 100%); }
  .type-2 .gem-hi { background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.95), transparent 45%); }
  .type-2 .gem-sh { background: radial-gradient(circle at 72% 78%, rgba(45,25,0,0.9), transparent 55%); }
  .type-2 .gem-glint { background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.9) 50%, transparent 60%); }

  .type-3 .gem-body { background: radial-gradient(circle at 35% 25%, #b6ffd9, #17d97a 55%, #054d29 100%); }
  .type-3 .gem-hi { background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.95), transparent 45%); }
  .type-3 .gem-sh { background: radial-gradient(circle at 72% 78%, rgba(0,30,15,0.9), transparent 55%); }
  .type-3 .gem-glint { background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.9) 50%, transparent 60%); }

  .type-4 .gem-body { background: radial-gradient(circle at 35% 25%, #f0b9ff, #c93bff 55%, #4a0a70 100%); }
  .type-4 .gem-hi { background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.95), transparent 45%); }
  .type-4 .gem-sh { background: radial-gradient(circle at 72% 78%, rgba(35,0,45,0.9), transparent 55%); }
  .type-4 .gem-glint { background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.9) 50%, transparent 60%); }

  .type-5 .gem-body { background: conic-gradient(from 0deg, #fff, #cdeeff, #ffd9f7, #fff9cc, #cdfff0, #fff); }
  .type-5 .gem-hi { background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.98), transparent 40%); }
  .type-5 .gem-sh { background: radial-gradient(circle at 72% 78%, rgba(60,70,90,0.55), transparent 55%); }
  .type-5 .gem-glint { background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,1) 50%, transparent 60%); }

  /* ---------- Floating score popup ---------- */

  #popup-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 30;
  }
  .score-pop {
    position: absolute;
    left: 50%;
    top: 42%;
    transform: translate(-50%, -50%);
    text-align: center;
    animation: pop-float 1.7s ease-out forwards;
  }
  .score-pop .gain {
    font-size: 40px;
    font-weight: 900;
    color: var(--neon-a);
    text-shadow: 0 0 18px var(--neon-a), 0 0 34px rgba(56,224,255,0.5);
  }
  .score-pop .mult {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: var(--neon-c);
    text-shadow: 0 0 10px var(--neon-c);
  }
  .score-pop .bonus {
    display: inline-block;
    margin-top: 4px;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(255,79,195,0.18);
    border: 1px solid var(--neon-b);
    color: var(--neon-b);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-shadow: 0 0 8px var(--neon-b);
  }
  @keyframes pop-float {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(0.7); }
    15% { opacity: 1; transform: translate(-50%, -55%) scale(1.08); }
    30% { transform: translate(-50%, -58%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -95%) scale(1); }
  }

  /* ---------- Game over overlay ---------- */

  #game-over {
    position: absolute;
    inset: 0;
    z-index: 25;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(3,5,12,0.72);
    backdrop-filter: blur(4px);
    border-radius: 12px;
    text-align: center;
  }
  #game-over.show { display: flex; }
  #game-over h2 {
    margin: 0;
    font-size: 30px;
    letter-spacing: 0.08em;
    color: #ff6b8f;
    text-shadow: 0 0 24px rgba(255,79,195,0.6);
  }
  #game-over p { margin: 0; color: #cfe0f5; font-size: 14px; }

  footer.foot-note {
    font-size: 11px;
    color: #6f84a6;
    letter-spacing: 0.05em;
  }

  @media (max-width: 420px) {
    .hud-tile { min-width: 70px; padding: 6px 10px; }
    .hud-tile .value { font-size: 15px; }
  }
</style>
</head>
<body data-stage="0">

  <div id="backdrop"></div>
  <div id="bokeh"></div>
  <div id="skyline"></div>
  <div class="rain-layer far"></div>
  <div class="rain-layer"></div>
  <div id="glass-vignette"></div>
  <div id="stage-flash"></div>
  <div id="stage-banner">
    <p class="eyebrow">Stage <span id="stage-banner-num">0</span></p>
    <p class="title" id="stage-banner-name">Drizzle</p>
  </div>

  <div id="app">
    <header class="hud-top">
      <h1>NEON RAIN</h1>
      <p class="tagline">a rain-streaked match-3</p>
    </header>

    <div class="hud">
      <div class="hud-tile" id="hud-score">
        <div class="label">Score</div>
        <div class="value" id="score-value">0</div>
      </div>
      <div class="hud-tile" id="hud-best">
        <div class="label">Best</div>
        <div class="value" id="best-value">0</div>
      </div>
      <div class="hud-tile" id="hud-multiplier">
        <div class="label">Multiplier</div>
        <div class="value" id="mult-value">×1</div>
      </div>
      <div class="hud-tile" id="hud-stage">
        <div class="label">Stage</div>
        <div class="value" id="stage-value">0 · Drizzle</div>
      </div>
      <div class="hud-tile" id="hud-featured">
        <div class="label">Featured</div>
        <div class="value" id="feat-value">—</div>
      </div>
      <button id="new-game-btn" data-testid="new-game" type="button">New Game</button>
    </div>

    <div id="board-panel">
      <div id="board">
        <div id="cell-grid"></div>
        <div id="gems-layer"></div>
        <div id="popup-layer"></div>
        <div id="game-over">
          <h2>GAME OVER</h2>
          <p>No more moves remain in the rain.</p>
        </div>
      </div>
    </div>

    <footer class="foot-note">Drag a gem toward a neighbour to swap it. Idle 10s for a hint.</footer>
  </div>

  <script type="module" src="./render.js"></script>
</body>
</html>
