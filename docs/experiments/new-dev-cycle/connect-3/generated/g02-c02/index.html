<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Match-3</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #1b1b1f;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 {
      margin: 0 0 0.25rem;
    }
    #hud {
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(var(--cols, 8), 44px);
      grid-auto-rows: 44px;
      gap: 4px;
      background: #0c0c0e;
      padding: 6px;
      border-radius: 8px;
    }
    .cell {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.25);
      transition: transform 0.08s ease;
    }
    .cell:hover {
      filter: brightness(1.1);
    }
    .cell.selected {
      box-shadow: 0 0 0 3px #fff, inset 0 0 0 2px rgba(0, 0, 0, 0.25);
      transform: scale(0.92);
    }
    #message {
      min-height: 1.2em;
      margin-top: 0.75rem;
      color: #f39c12;
    }
  </style>
</head>
<body>
  <h1>Match-3</h1>
  <div id="hud">Score: <span id="score">0</span></div>
  <div id="board"></div>
  <div id="message"></div>
  <script type="module" src="./render.js"></script>
</body>
</html>
