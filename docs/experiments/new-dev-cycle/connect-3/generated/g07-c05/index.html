<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brassworks Match</title>
<style>
  :root {
    --brass-hi: #f4d998;
    --brass: #c99a3d;
    --brass-dk: #7a5b22;
    --copper: #c96a3d;
    --ember: #ff7a3d;
    --ink: #1a1006;
    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Georgia', 'Iowan Old Style', 'Palatino Linotype', serif;
    background: #0b0704;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ---------- Backdrop: layered brass foundry with depth ---------- */

  #backdrop {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .bg-layer {
    position: absolute;
    inset: 0;
    transition: opacity 1.4s ease;
    opacity: 0;
  }
  .bg-layer.active { opacity: 1; }

  .bg-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 78%, rgba(0,0,0,0.85) 100%);
    z-index: 3;
    pointer-events: none;
  }

  .rivet-grain {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1.4px);
    background-size: 26px 26px;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  .gear-deco {
    position: absolute;
    opacity: 0.16;
    filter: drop-shadow(0 0 18px rgba(0,0,0,0.6));
    animation: spin-slow 40s linear infinite;
    pointer-events: none;
  }
  .gear-deco.reverse { animation-direction: reverse; }
  .gear-deco.a { width: 46vmin; height: 46vmin; top: -14vmin; left: -12vmin; animation-duration: 70s; }
  .gear-deco.b { width: 32vmin; height: 32vmin; bottom: -10vmin; right: -8vmin; animation-duration: 50s; }
  .gear-deco.c { width: 20vmin; height: 20vmin; bottom: 6vmin; left: -6vmin; animation-duration: 34s; }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .ember-particle {
    position: absolute;
    bottom: -10px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd9a0 0%, #ff8a3d 55%, transparent 80%);
    opacity: 0;
    animation: rise-ember linear infinite;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes rise-ember {
    0% { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
    8% { opacity: 0.9; }
    100% { transform: translateY(-108vh) translateX(var(--drift, 20px)) scale(1.1); opacity: 0; }
  }

  .steam-puff {
    position: absolute;
    bottom: 10%;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.0) 70%);
    filter: blur(2px);
    animation: drift-steam linear infinite;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes drift-steam {
    0% { transform: translate(0,0) scale(0.7); opacity: 0; }
    15% { opacity: 0.55; }
    100% { transform: translate(60px, -70vh) scale(2.4); opacity: 0; }
  }

  /* ---------- App shell ---------- */

  #app {
    position: relative;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 18px 22px 26px;
    width: min(94vw, 620px);
  }

  header.hud {
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px;
    color: var(--brass-hi);
  }

  .title-block h1 {
    margin: 0;
    font-size: clamp(1.4rem, 4vw, 2rem);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--brass-hi);
    text-shadow: 0 0 14px rgba(255, 180, 90, 0.45), 0 2px 0 #3a2308;
  }
  .title-block .subtitle {
    margin: 2px 0 0;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #d8b273;
    opacity: 0.8;
  }

  .stat-cluster {
    display: flex;
    gap: 10px;
  }

  .stat-box {
    background: linear-gradient(180deg, #3a2610, #1c1006);
    border: 1px solid #6b4a20;
    border-radius: 8px;
    padding: 6px 12px;
    min-width: 84px;
    text-align: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 3px 6px rgba(0,0,0,0.5);
  }
  .stat-box .label {
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #c99a55;
    opacity: 0.85;
  }
  .stat-box .value {
    font-size: 1.15rem;
    font-weight: bold;
    color: var(--brass-hi);
    font-variant-numeric: tabular-nums;
  }
  .stat-box.multiplier .value { color: var(--ember); }

  #new-game-btn {
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 8px;
    color: #2a1608;
    background: linear-gradient(180deg, var(--brass-hi), var(--brass) 55%, var(--brass-dk));
    border: 1px solid #4a3210;
    box-shadow: 0 3px 0 #4a3210, 0 6px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  #new-game-btn:hover { filter: brightness(1.08); }
  #new-game-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #4a3210, 0 3px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  #new-game-btn.attention {
    animation: btn-pulse 1.15s ease-in-out infinite;
  }
  @keyframes btn-pulse {
    0%, 100% { box-shadow: 0 3px 0 #4a3210, 0 6px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.5); }
    50% { box-shadow: 0 3px 0 #4a3210, 0 6px 22px rgba(255,170,80,0.85), inset 0 1px 0 rgba(255,255,255,0.7); }
  }

  /* ---------- Board frame (lifted, riveted plate) ---------- */

  #board-frame {
    position: relative;
    padding: 16px;
    border-radius: 18px;
    background: linear-gradient(155deg, #4a3216, #2a1a0a 55%, #1c1008);
    box-shadow:
      0 20px 40px rgba(0,0,0,0.65),
      0 2px 0 rgba(255,220,160,0.12) inset,
      0 -6px 18px rgba(0,0,0,0.5) inset;
    border: 1px solid #5f421c;
  }

  .rivet {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #f6e2ad, #8a611f 60%, #40290c 100%);
    box-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  .rivet.tl { top: 8px; left: 8px; }
  .rivet.tr { top: 8px; right: 8px; }
  .rivet.bl { bottom: 8px; left: 8px; }
  .rivet.br { bottom: 8px; right: 8px; }

  #board-well {
    position: relative;
    border-radius: 10px;
    padding: 10px;
    background: radial-gradient(ellipse at 50% 20%, #241708, #100a04 80%);
    box-shadow: inset 0 10px 26px rgba(0,0,0,0.75), inset 0 0 0 2px rgba(0,0,0,0.4);
  }

  #board {
    position: relative;
    width: min(84vw, 480px);
    aspect-ratio: 1 / 1;
    touch-action: none;
  }

  #slots-layer {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    z-index: 2;
  }

  .cell {
    position: relative;
    border-radius: 8px;
    background: linear-gradient(160deg, rgba(255,255,255,0.03), rgba(0,0,0,0.28));
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.55), inset 0 -1px 0 rgba(255,255,255,0.04);
    margin: 2px;
    cursor: grab;
    -webkit-user-select: none;
    user-select: none;
  }
  .cell.hinted::after {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: 6px;
    border: 2px solid rgba(255, 224, 150, 0.85);
    animation: hint-pulse 1.1s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hint-pulse {
    0%, 100% { opacity: 0.25; transform: scale(0.94); }
    50% { opacity: 0.95; transform: scale(1.02); }
  }

  #gems-layer {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  .gem {
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
    pointer-events: none;
  }

  .gem .gem-inner {
    width: 86%;
    height: 86%;
    position: relative;
    animation: idle-breathe 3.2s ease-in-out infinite;
    animation-delay: var(--idle-delay, 0s);
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55));
  }
  @keyframes idle-breathe {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.045) rotate(1.2deg); }
  }

  .gem svg { width: 100%; height: 100%; overflow: visible; }

  .gem.featured .gem-inner {
    animation: idle-breathe 3.2s ease-in-out infinite, featured-glow 1.6s ease-in-out infinite;
  }
  @keyframes featured-glow {
    0%, 100% { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 4px rgba(255,200,90,0.3)); }
    50% { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 16px rgba(255,200,90,0.95)); }
  }

  .gem.clearing .gem-inner {
    animation: gem-clear 0.32s ease-out forwards;
  }
  @keyframes gem-clear {
    0% { transform: scale(1); opacity: 1; filter: brightness(1) drop-shadow(0 0 0 rgba(255,220,150,0)); }
    35% { transform: scale(1.35); opacity: 1; filter: brightness(2.4) drop-shadow(0 0 18px rgba(255,220,150,0.9)); }
    100% { transform: scale(0.2) rotate(30deg); opacity: 0; filter: brightness(2.6); }
  }

  .gem.invalid-shake .gem-inner {
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ---------- Floating feedback ---------- */

  #feedback-layer {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    overflow: visible;
  }

  .pop {
    position: absolute;
    left: 50%;
    top: 42%;
    transform: translate(-50%, -50%);
    font-weight: bold;
    text-align: center;
    white-space: nowrap;
    animation: pop-float 1.6s cubic-bezier(0.15, 0.6, 0.35, 1) forwards;
  }
  .pop .gain {
    display: block;
    font-size: clamp(2rem, 8vw, 3.2rem);
    color: var(--brass-hi);
    text-shadow: 0 0 18px rgba(255,190,90,0.85), 0 2px 4px rgba(0,0,0,0.8);
  }
  .pop .mult {
    display: block;
    font-size: 1.1rem;
    color: var(--ember);
    text-shadow: 0 2px 3px rgba(0,0,0,0.8);
  }
  .pop .bonus {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.95rem;
    padding: 2px 10px;
    border-radius: 999px;
    background: linear-gradient(180deg, #7fe3c0, #2f9e79);
    color: #04241a;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  @keyframes pop-float {
    0% { opacity: 0; transform: translate(-50%, -30%) scale(0.6); }
    12% { opacity: 1; transform: translate(-50%, -55%) scale(1.08); }
    22% { transform: translate(-50%, -58%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -110%) scale(1); }
  }

  /* ---------- Stage transition banner ---------- */

  #stage-banner {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  #stage-banner.show {
    animation: banner-flash 2.1s ease forwards;
  }
  @keyframes banner-flash {
    0% { opacity: 0; background: rgba(255, 220, 160, 0); }
    6% { opacity: 1; background: rgba(255, 220, 160, 0.5); }
    16% { background: rgba(10, 6, 2, 0.35); }
    82% { opacity: 1; background: rgba(10, 6, 2, 0.3); }
    100% { opacity: 0; background: rgba(10, 6, 2, 0); }
  }
  .banner-card {
    text-align: center;
    transform: scale(0.7) translateY(10px);
    opacity: 0;
    animation: banner-card-in 2.1s ease forwards;
  }
  @keyframes banner-card-in {
    0% { transform: scale(0.6) translateY(20px); opacity: 0; }
    14% { transform: scale(1.06) translateY(0); opacity: 1; }
    22% { transform: scale(1) translateY(0); opacity: 1; }
    80% { transform: scale(1) translateY(0); opacity: 1; }
    100% { transform: scale(1.02) translateY(-14px); opacity: 0; }
  }
  .banner-card .eyebrow {
    font-size: 0.9rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ember);
    text-shadow: 0 0 14px rgba(255,120,60,0.9);
  }
  .banner-card .stage-name {
    margin-top: 6px;
    font-size: clamp(2rem, 7vw, 3.4rem);
    color: var(--brass-hi);
    text-shadow: 0 0 28px rgba(255,190,90,0.85), 0 3px 6px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
  }

  /* ---------- Featured colour banner (persistent, subtler) ---------- */

  .feature-strip {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #f0d9a8;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.92;
  }
  .feature-strip .swatch {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 6px rgba(255,190,90,0.7));
  }
  .feature-strip .swatch svg { width: 100%; height: 100%; }
  .feature-strip strong { color: var(--ember); }

  /* ---------- Game over overlay ---------- */

  #game-over {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    background: rgba(10, 6, 3, 0.82);
    border-radius: 10px;
    backdrop-filter: blur(2px);
  }
  #game-over.visible { display: flex; }
  #game-over h2 {
    margin: 0;
    color: var(--brass-hi);
    font-size: 1.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,150,70,0.7);
  }
  #game-over p {
    margin: 0;
    color: #d8b273;
    font-size: 0.9rem;
  }

  footer.hint-text {
    color: #a5805039;
    font-size: 0.68rem;
  }

  @media (prefers-color-scheme: light) {
    /* This theme intentionally commits to a single warm-dark foundry look
       in both OS themes — a mid-day brass workshop, not a bright page. */
  }
</style>
</head>
<body>

<div id="backdrop">
  <div class="bg-layer active" id="bg-0"></div>
  <div class="bg-layer" id="bg-1"></div>
  <svg class="gear-deco a" viewBox="0 0 100 100"><use href="#gear-shape"></use></svg>
  <svg class="gear-deco b reverse" viewBox="0 0 100 100"><use href="#gear-shape"></use></svg>
  <svg class="gear-deco c" viewBox="0 0 100 100"><use href="#gear-shape"></use></svg>
  <div class="rivet-grain"></div>
  <div id="particles"></div>
  <div class="bg-vignette"></div>
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <g id="gear-shape">
      <path fill="#c99a3d" d="M50 8 L57 8 L59 18 L69 21 L77 14 L83 20 L76 28 L80 38 L91 40 L91 47 L80 50 L91 53 L91 60 L80 62 L76 72 L83 80 L77 86 L69 79 L59 82 L57 92 L50 92 L48 82 L38 79 L30 86 L24 80 L31 72 L27 62 L16 60 L16 53 L27 50 L16 47 L16 40 L27 38 L31 28 L24 20 L30 14 L38 21 L48 18 Z"/>
      <circle cx="50" cy="50" r="16" fill="#241708"/>
    </g>
  </defs>
</svg>

<div id="app">
  <header class="hud">
    <div class="title-block">
      <h1>Brassworks Match</h1>
      <p class="subtitle" id="stage-subtitle">Boiler Room</p>
    </div>
    <div class="stat-cluster">
      <div class="stat-box">
        <div class="label">Score</div>
        <div class="value" id="score-value">0</div>
      </div>
      <div class="stat-box">
        <div class="label">Best</div>
        <div class="value" id="best-value">0</div>
      </div>
      <div class="stat-box multiplier">
        <div class="label">Pressure</div>
        <div class="value" id="mult-value">x1</div>
      </div>
    </div>
  </header>

  <div class="feature-strip">
    Featured this stage:
    <span class="swatch" id="feature-swatch"></span>
    <strong id="feature-label">—</strong>
  </div>

  <div id="board-frame">
    <div class="rivet tl"></div>
    <div class="rivet tr"></div>
    <div class="rivet bl"></div>
    <div class="rivet br"></div>
    <div id="board-well">
      <div id="board">
        <div id="slots-layer"></div>
        <div id="gems-layer"></div>
        <div id="feedback-layer"></div>
        <div id="game-over">
          <h2>Boiler Cold — Game Over</h2>
          <p>No moves remain in the works.</p>
        </div>
      </div>
    </div>
    <div style="display:flex; justify-content:center; margin-top: 12px;" id="restart-row">
      <button id="new-game-btn" data-testid="new-game">New Game</button>
    </div>
  </div>

  <footer class="hint-text">Drag a gem into a neighbour to swap it.</footer>
</div>

<div id="stage-banner">
  <div class="banner-card">
    <div class="eyebrow" id="banner-eyebrow">Stage 1</div>
    <div class="stage-name" id="banner-name">Gearworks</div>
  </div>
</div>

<script type="module" src="./render.js"></script>
</body>
</html>
