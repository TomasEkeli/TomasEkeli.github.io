<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Abyssal Depths — a match-3</title>
<style>
  :root {
    --deep-0: #010a12;
    --deep-1: #04202c;
    --deep-2: #073446;
    --accent: #35e6d0;
    --accent-soft: #8ff5e6;
    --panel: rgba(6, 34, 45, 0.55);
    --panel-border: rgba(88, 226, 214, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: #d9f7f2;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(53, 230, 208, 0.10), transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(45, 120, 200, 0.14), transparent 60%),
      linear-gradient(200deg, var(--deep-0) 0%, var(--deep-1) 45%, var(--deep-2) 100%);
    overflow: hidden;
    position: relative;
  }

  /* --- bioluminescent drifting particles --- */
  .abyss-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(2.5px 2.5px at 10% 90%, rgba(143, 245, 230, 0.85), transparent 60%),
      radial-gradient(2px 2px at 30% 80%, rgba(53, 230, 208, 0.7), transparent 60%),
      radial-gradient(3px 3px at 55% 95%, rgba(120, 220, 255, 0.8), transparent 60%),
      radial-gradient(2px 2px at 75% 88%, rgba(53, 230, 208, 0.6), transparent 60%),
      radial-gradient(2.5px 2.5px at 90% 92%, rgba(180, 250, 240, 0.75), transparent 60%),
      radial-gradient(2px 2px at 45% 98%, rgba(53, 230, 208, 0.55), transparent 60%);
    background-repeat: repeat-y;
    background-size: 100% 140vh;
    animation: drift 22s linear infinite;
    opacity: 0.8;
  }

  @keyframes drift {
    from { background-position: 0 0; }
    to   { background-position: 0 -140vh; }
  }

  .stage {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 18px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    width: min(92vw, 560px);
  }

  h1 {
    margin: 0;
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent-soft);
    text-shadow: 0 0 12px rgba(53, 230, 208, 0.65), 0 0 2px rgba(255,255,255,0.4);
  }

  h1 .sub {
    display: block;
    font-size: 0.55rem;
    letter-spacing: 0.35em;
    font-weight: 400;
    color: rgba(217, 247, 242, 0.55);
    text-transform: uppercase;
    text-shadow: none;
  }

  .hud {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .score-panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 6px 14px;
    text-align: right;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 18px rgba(53, 230, 208, 0.12) inset;
  }

  .score-panel .label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(217, 247, 242, 0.55);
  }

  .score-panel .value {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 10px rgba(53, 230, 208, 0.7);
    font-variant-numeric: tabular-nums;
  }

  #new-game {
    background: linear-gradient(160deg, #10756a, #0a3f45);
    color: #eafffb;
    border: 1px solid rgba(143, 245, 230, 0.5);
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4), 0 0 0 rgba(53, 230, 208, 0);
    transition: transform 0.15s ease, box-shadow 0.3s ease, background 0.3s ease;
  }

  #new-game:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45), 0 0 14px rgba(53, 230, 208, 0.4);
  }

  #new-game:active {
    transform: translateY(0);
  }

  #new-game.urgent {
    animation: urgent-glow 1.1s ease-in-out infinite;
  }

  @keyframes urgent-glow {
    0%, 100% { box-shadow: 0 4px 14px rgba(0,0,0,0.4), 0 0 6px rgba(53, 230, 208, 0.35); }
    50%      { box-shadow: 0 4px 18px rgba(0,0,0,0.4), 0 0 26px rgba(53, 230, 208, 0.9); }
  }

  .board-wrap {
    position: relative;
    padding: 14px;
    border-radius: 20px;
    background: linear-gradient(160deg, rgba(9, 46, 58, 0.75), rgba(2, 18, 26, 0.85));
    border: 1px solid rgba(88, 226, 214, 0.28);
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(0,0,0,0.3),
      0 0 40px rgba(20, 160, 150, 0.15) inset,
      0 0 30px rgba(53, 230, 208, 0.08);
    backdrop-filter: blur(10px);
  }

  #board {
    position: relative;
    width: min(90vw, 520px);
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 4px),
      radial-gradient(ellipse at 50% 20%, rgba(53, 230, 208, 0.10), transparent 65%),
      linear-gradient(180deg, #021016, #010a10 60%, #000608);
    box-shadow: inset 0 2px 18px rgba(0, 0, 0, 0.7), inset 0 0 40px rgba(0,0,0,0.5);
    overflow: hidden;
    touch-action: none;
  }

  /* subtle grid cell lattice for orientation */
  #board::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(to right, rgba(143, 245, 230, 0.05) 0, rgba(143,245,230,0.05) 1px, transparent 1px, transparent calc(100% / 8)),
      repeating-linear-gradient(to bottom, rgba(143, 245, 230, 0.05) 0, rgba(143,245,230,0.05) 1px, transparent 1px, transparent calc(100% / 8));
    pointer-events: none;
  }

  /* ------------------------------------------------------------- gems */

  .gem {
    position: absolute;
    top: 0;
    left: 0;
    padding: 2.5%;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .gem:active { cursor: grabbing; }

  .gem-shape {
    position: relative;
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.55));
  }

  .gem-shape.idle-life {
    animation: idle-pulse 3.4s ease-in-out infinite, idle-sway 5.6s ease-in-out infinite;
  }

  @keyframes idle-pulse {
    0%, 100% { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 3px var(--glow, transparent)) brightness(1); }
    50%      { filter: drop-shadow(0 3px 5px rgba(0,0,0,0.55)) drop-shadow(0 0 9px var(--glow, transparent)) brightness(1.12); }
  }

  @keyframes idle-sway {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50%      { transform: rotate(3deg) scale(1.03); }
  }

  .gem-shape.hinting {
    animation: hint-pulse 1.1s ease-in-out infinite !important;
  }

  @keyframes hint-pulse {
    0%, 100% { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 4px var(--glow, transparent)) brightness(1); transform: scale(1); }
    50%      { filter: drop-shadow(0 3px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 16px #fff) brightness(1.3); transform: scale(1.08); }
  }

  .gem-shape.clearing {
    animation: clear-burst 0.22s ease-out forwards !important;
  }

  @keyframes clear-burst {
    0%   { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 4px var(--glow, transparent)) brightness(1); }
    60%  { transform: scale(1.35); opacity: 0.9; filter: drop-shadow(0 0 22px var(--glow, transparent)) brightness(1.8); }
    100% { transform: scale(0.2); opacity: 0; filter: drop-shadow(0 0 30px var(--glow, transparent)) brightness(2.2); }
  }

  .gem-shape.rejected {
    animation: shake 0.24s ease-in-out !important;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-4px) rotate(-3deg); }
    75%      { transform: translateX(4px) rotate(3deg); }
  }

  .gem-shape::before,
  .gem-shape::after {
    content: '';
    position: absolute;
    pointer-events: none;
  }

  .gem-shape::before {
    /* highlight */
    width: 46%;
    height: 34%;
    top: 10%;
    left: 16%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.95), rgba(255,255,255,0) 72%);
    filter: blur(0.4px);
  }

  .gem-shape::after {
    /* shadow */
    width: 60%;
    height: 48%;
    bottom: 6%;
    right: 8%;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.4), rgba(0,0,0,0) 72%);
  }

  /* shapes: colour-blind-safe silhouettes, each maximally distinct even at
     small sizes (avoid two rounded blobs that read the same at a glance) */
  .shape-circle   { clip-path: circle(49% at 50% 50%); }
  .shape-diamond  { clip-path: polygon(50% 1%, 99% 50%, 50% 99%, 1% 50%); }
  .shape-hex      { clip-path: polygon(25% 3%, 75% 3%, 99% 50%, 75% 97%, 25% 97%, 1% 50%); }
  .shape-triangle { clip-path: polygon(50% 2%, 98% 90%, 2% 90%); }
  .shape-star     { clip-path: polygon(50% 0%, 63% 35%, 100% 37%, 70% 59%, 82% 96%, 50% 74%, 18% 96%, 30% 59%, 0% 37%, 37% 35%); }
  .shape-cross    {
    clip-path: polygon(
      38% 2%, 62% 2%, 62% 32%, 92% 32%, 92% 62%, 62% 62%,
      62% 98%, 38% 98%, 38% 62%, 8% 62%, 8% 32%, 38% 32%
    );
  }

  /* colours: distinct hue per type (paired with the shape above) */
  .c0 { --glow: #8ff5e6; background: linear-gradient(140deg, #f4fffd 0%, #8ff5e6 45%, #0e7a70 100%); }
  .c1 { --glow: #4fa3ff; background: linear-gradient(140deg, #cfe9ff 0%, #4fa3ff 45%, #0b3f73 100%); }
  .c2 { --glow: #35e08a; background: linear-gradient(140deg, #d6ffe9 0%, #35e08a 45%, #05633f 100%); }
  .c3 { --glow: #ffb43d; background: linear-gradient(140deg, #fff2d2 0%, #ffb43d 45%, #8a4b06 100%); }
  .c4 { --glow: #ff6f91; background: linear-gradient(140deg, #ffe0e8 0%, #ff6f91 45%, #8a1240 100%); }
  .c5 { --glow: #a26bff; background: linear-gradient(140deg, #ecdcff 0%, #a26bff 45%, #3a0d73 100%); }

  /* ------------------------------------------------------------- score float */

  #float-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
  }

  .float-score {
    position: absolute;
    top: 38%;
    transform: translate(-50%, 0);
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 800;
    color: #fff;
    text-shadow:
      0 0 8px var(--accent),
      0 0 24px rgba(53, 230, 208, 0.8),
      0 2px 3px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: float-up 1.5s cubic-bezier(.16,.9,.32,1) forwards;
    white-space: nowrap;
  }

  .float-bonus {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #ffe28a;
    text-shadow: 0 0 10px rgba(255, 210, 100, 0.8);
    text-transform: uppercase;
  }

  @keyframes float-up {
    0%   { opacity: 0; transform: translate(-50%, 10px) scale(0.7); }
    15%  { opacity: 1; transform: translate(-50%, -6px) scale(1.08); }
    30%  { transform: translate(-50%, -14px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -90px) scale(1); }
  }

  /* ------------------------------------------------------------- game over */

  #game-over {
    position: absolute;
    inset: 14px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(1, 8, 12, 0.78);
    backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    z-index: 10;
  }

  #game-over.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #game-over h2 {
    margin: 0;
    font-size: 1.8rem;
    letter-spacing: 0.12em;
    color: #eafffb;
    text-shadow: 0 0 18px rgba(53, 230, 208, 0.85);
  }

  #game-over p {
    margin: 0;
    color: rgba(217, 247, 242, 0.7);
    font-size: 0.9rem;
  }

  footer {
    color: rgba(217, 247, 242, 0.35);
    font-size: 0.72rem;
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px) {
    header { width: 94vw; }
  }
</style>
</head>
<body>
  <div class="abyss-particles" aria-hidden="true"></div>

  <div class="stage">
    <header>
      <h1>Abyssal Depths<span class="sub">a match-3 in the deep</span></h1>
      <div class="hud">
        <div class="score-panel">
          <div class="label">Score</div>
          <div class="value" id="score-value">0</div>
        </div>
        <button id="new-game" data-testid="new-game" type="button">New Game</button>
      </div>
    </header>

    <div class="board-wrap">
      <div id="board" aria-label="match-3 board"></div>
      <div id="float-layer"></div>
      <div id="game-over" role="status" aria-hidden="true">
        <h2>The Depths Have Stilled</h2>
        <p>No moves remain — dive again?</p>
      </div>
    </div>

    <footer>slide a gem into a neighbour to match three or more</footer>
  </div>

  <script type="module" src="./render.js"></script>
</body>
</html>
