<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurora Match — Arctic Nights</title>
<style>
  :root {
    --panel-bg: linear-gradient(160deg, rgba(18,40,54,.92), rgba(8,20,32,.92));
    --panel-border: rgba(150, 220, 235, .35);
    --accent: #7de8ff;
    --accent-warm: #ffcf8c;
    --text: #eaf6fb;
    --text-dim: #9fc2cf;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 18px 10px;
  }

  /* ---------- backdrop ---------- */
  #backdrop {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
    background: linear-gradient(180deg, #020714 0%, #08172b 35%, #0d2b3f 65%, #123646 100%);
    transition: background 1.4s ease;
  }
  #backdrop.stage-1 { background: linear-gradient(180deg, #0a1620 0%, #16303a 40%, #234750 75%, #2c5560 100%); }
  #backdrop.stage-2 { background: linear-gradient(180deg, #0d1c2b 0%, #1b3b52 40%, #2b5872 75%, #4c7f96 100%); }
  #backdrop.stage-3 { background: linear-gradient(180deg, #0a121c 0%, #152534 40%, #1d3245 75%, #28414f 100%); }
  #backdrop.stage-4 { background: linear-gradient(180deg, #020611 0%, #061a2e 35%, #0a2a3c 70%, #123b46 100%); }
  #backdrop.stage-5 { background: linear-gradient(180deg, #01030a 0%, #051225 30%, #0a2035 65%, #0e2f3a 100%); }

  .groundglow {
    position: absolute; left: 0; right: 0; bottom: 0; height: 32%;
    background: radial-gradient(ellipse at 50% 100%, rgba(120,200,220,.22), rgba(0,0,0,0) 70%);
    pointer-events: none;
  }

  .stars { position: absolute; inset: 0; opacity: .8; transition: opacity 1s ease; }
  #backdrop.stage-1 .stars, #backdrop.stage-2 .stars { opacity: .35; }
  #backdrop.stage-3 .stars { opacity: .2; }
  .star {
    position: absolute; width: 2px; height: 2px; background: #eaf8ff; border-radius: 50%;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100% { opacity: .15; } 50% { opacity: 1; } }

  .foglayer { position: absolute; inset: -10% -10%; opacity: 0; transition: opacity 1.2s ease; pointer-events: none; }
  #backdrop.stage-1 .foglayer { opacity: .8; }
  .fogband {
    position: absolute; left: -20%; width: 140%; height: 22%;
    background: linear-gradient(90deg, transparent, rgba(200,230,235,.18), transparent);
    filter: blur(6px);
    animation: fogdrift 26s linear infinite;
  }
  .fogband:nth-child(1) { top: 12%; animation-duration: 32s; }
  .fogband:nth-child(2) { top: 34%; animation-duration: 24s; animation-direction: reverse; }
  .fogband:nth-child(3) { top: 58%; animation-duration: 40s; }
  @keyframes fogdrift { from { transform: translateX(-10%); } to { transform: translateX(10%); } }

  .snowlayer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .snowflake {
    position: absolute; top: -5%; background: #fff; border-radius: 50%;
    opacity: .85; animation: snowfall linear infinite;
  }
  #backdrop.stage-0 .snowflake { opacity: .5; }
  #backdrop.stage-3 .snowflake { opacity: 1; }
  @keyframes snowfall {
    from { transform: translate(0, -10vh) translateX(0); }
    to { transform: translate(0, 110vh) translateX(var(--drift, 20px)); }
  }

  .aurora { position: absolute; inset: 0; mix-blend-mode: screen; opacity: .35; transition: opacity 1.4s ease; pointer-events: none; }
  #backdrop.stage-1 .aurora, #backdrop.stage-2 .aurora { opacity: .18; }
  #backdrop.stage-4 .aurora { opacity: .75; }
  #backdrop.stage-5 .aurora { opacity: .95; }
  .ribbon {
    position: absolute; left: -20%; width: 140%; height: 45%; filter: blur(18px);
    animation: auroradrift 16s ease-in-out infinite, huepulse 9s ease-in-out infinite;
  }
  .ribbon.r1 { top: 2%; background: linear-gradient(100deg, transparent, rgba(80,255,190,.55), rgba(90,200,255,.35), transparent); animation-delay: 0s, 0s; }
  .ribbon.r2 { top: 12%; background: linear-gradient(100deg, transparent, rgba(150,255,220,.4), rgba(255,180,230,.25), transparent); animation-delay: -5s, -3s; }
  .ribbon.r3 { top: 20%; background: linear-gradient(100deg, transparent, rgba(120,180,255,.4), rgba(120,255,210,.3), transparent); animation-delay: -9s, -6s; }
  @keyframes auroradrift { 0%,100% { transform: translateX(-4%) skewY(-2deg); } 50% { transform: translateX(4%) skewY(2deg); } }
  @keyframes huepulse { 0%,100% { filter: blur(18px) hue-rotate(0deg); } 50% { filter: blur(20px) hue-rotate(25deg); } }

  .stormlines { position: absolute; inset: -20%; opacity: 0; transition: opacity .8s ease; pointer-events: none;
    background: repeating-linear-gradient(115deg, rgba(255,255,255,.12) 0px, rgba(255,255,255,.12) 2px, transparent 2px, transparent 26px);
    animation: stormmove 1.4s linear infinite;
  }
  #backdrop.stage-3 .stormlines { opacity: .5; }
  #backdrop.stage-5 .stormlines { opacity: .25; }
  @keyframes stormmove { from { transform: translate(0,0); } to { transform: translate(-60px, 60px); } }

  /* ---------- layout ---------- */
  #app { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 640px; }

  header { text-align: center; }
  h1 {
    margin: 0; font-size: clamp(1.6rem, 4vw, 2.3rem); letter-spacing: .06em;
    background: linear-gradient(90deg, #9be8ff, #d3fff0, #ffd7ec);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 24px rgba(120, 220, 255, .25);
  }
  .tagline { margin: 2px 0 0; color: var(--text-dim); font-size: .85rem; letter-spacing: .12em; text-transform: uppercase; }

  .hud {
    display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; justify-content: center;
    background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 14px;
    padding: 10px 16px; box-shadow: 0 8px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
    width: 100%;
  }
  .hud-stat { display: flex; flex-direction: column; align-items: center; min-width: 64px; }
  .hud-stat .label { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); }
  .hud-stat span:last-child { font-size: 1.05rem; font-weight: 600; }
  #multVal { color: var(--accent-warm); }
  #stageVal { font-size: .82rem !important; font-weight: 500 !important; max-width: 120px; text-align: center; }

  #newGameBtn {
    margin-left: auto; cursor: pointer; border: 1px solid rgba(255,255,255,.3);
    background: linear-gradient(160deg, #2b6f83, #164152);
    color: #eafcff; padding: 9px 16px; border-radius: 10px; font-size: .85rem; font-weight: 600;
    letter-spacing: .04em; box-shadow: 0 4px 10px rgba(0,0,0,.35);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  #newGameBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(0,0,0,.4); }
  #newGameBtn:active { transform: translateY(0); }

  #legend {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%;
    background: rgba(10,25,35,.5); border: 1px solid rgba(150,220,235,.18); border-radius: 12px;
    padding: 8px 10px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: .72rem; color: var(--text-dim); padding: 2px 6px; border-radius: 8px; }
  .legend-item.featured { background: rgba(255, 207, 140, .12); color: var(--accent-warm); }
  .legend-swatch { width: 16px; height: 16px; flex: none; }
  .legend-item .lv { font-weight: 700; color: var(--text); }

  #boardWrap {
    position: relative;
    padding: 14px;
    border-radius: 20px;
    background: linear-gradient(160deg, rgba(20,45,58,.85), rgba(6,16,26,.9));
    border: 1px solid rgba(160, 225, 240, .3);
    box-shadow: 0 20px 45px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.03) inset, inset 0 1px 0 rgba(255,255,255,.08);
  }

  #board {
    position: relative;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(88vw, 520px);
    height: min(88vw, 520px);
    border-radius: 12px;
    overflow: visible;
    background: radial-gradient(ellipse at 50% 20%, rgba(60,110,140,.35), rgba(4,12,20,.55) 75%);
    box-shadow: inset 0 0 30px rgba(0,0,0,.6), inset 0 0 0 1px rgba(150,220,235,.15);
  }

  .cell {
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .cell.hint::before {
    content: '';
    position: absolute; inset: 6%;
    border-radius: 30%;
    box-shadow: 0 0 0 2px rgba(255, 232, 160, .8);
    animation: hintpulse 1.3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintpulse { 0%,100% { opacity: .25; transform: scale(.94); } 50% { opacity: .85; transform: scale(1.04); } }

  .gem {
    position: absolute;
    inset: 6%;
    background: var(--gem-color, #7de8ff);
    clip-path: var(--gem-clip);
    box-shadow: 0 2px 10px 1px var(--gem-glow, rgba(120,220,255,.5)), 0 0 0 1px rgba(255,255,255,.08);
    animation: gemGlow 3.6s ease-in-out infinite, glintSweep 5.5s ease-in-out infinite;
    will-change: transform;
    z-index: 2;
    cursor: grab;
  }
  .gem.featured { box-shadow: 0 0 0 2px rgba(255, 207, 140, .9), 0 0 14px 3px rgba(255, 207, 140, .55); }
  .gem.clearing { animation: clearFlash .22s ease-out forwards; z-index: 5; }

  @keyframes gemGlow { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.16); } }
  @keyframes glintSweep {
    0%, 78%, 100% { background-position: -140% -140%; }
    88% { background-position: 140% 140%; }
  }
  @keyframes clearFlash {
    0% { transform: scale(1); filter: brightness(1.4); opacity: 1; }
    55% { transform: scale(1.28); filter: brightness(2.2); opacity: 1; }
    100% { transform: scale(1.5); filter: brightness(2.6); opacity: 0; }
  }

  .facet { position: absolute; inset: 0; clip-path: inherit; pointer-events: none; }
  .facet.hi { background: linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,255,255,0) 55%); mix-blend-mode: screen; }
  .facet.sh { background: linear-gradient(320deg, rgba(0,0,0,.55), rgba(0,0,0,0) 55%); mix-blend-mode: multiply; }
  .facet.glint {
    background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,.95) 50%, transparent 65%);
    background-size: 260% 260%;
    opacity: .6;
  }

  .gem.shape-diamond  { --gem-clip: polygon(50% 2%, 98% 50%, 50% 98%, 2% 50%); }
  .gem.shape-circle   { --gem-clip: circle(47% at 50% 50%); }
  .gem.shape-hexagon  { --gem-clip: polygon(25% 4%, 75% 4%, 98% 50%, 75% 96%, 25% 96%, 2% 50%); }
  .gem.shape-triangle { --gem-clip: polygon(50% 4%, 96% 92%, 4% 92%); }
  .gem.shape-star     { --gem-clip: polygon(50% 0%, 63% 36%, 100% 36%, 70% 58%, 82% 96%, 50% 74%, 18% 96%, 30% 58%, 0% 36%, 37% 36%); }
  .gem.shape-pentagon  { --gem-clip: polygon(50% 2%, 98% 38%, 80% 98%, 20% 98%, 2% 38%); }

  /* ---------- floating gain ---------- */
  .floatgain {
    position: absolute; left: 50%; top: 8%; transform: translate(-50%, 0) scale(.6);
    opacity: 0; pointer-events: none; z-index: 20; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .floatgain.show { animation: floatUp 1.6s ease-out forwards; }
  .fg-amount { font-size: 2.1rem; font-weight: 800; color: #baf3ff; text-shadow: 0 0 14px rgba(120,220,255,.8), 0 2px 4px rgba(0,0,0,.6); }
  .fg-mult { font-size: 1rem; font-weight: 700; color: var(--accent-warm); text-shadow: 0 2px 4px rgba(0,0,0,.6); }
  .fg-bonus {
    margin-top: 2px; font-size: .8rem; font-weight: 700; color: #ffd1f0;
    background: rgba(255, 100, 200, .18); border: 1px solid rgba(255,180,225,.6);
    padding: 2px 8px; border-radius: 999px; text-shadow: 0 1px 2px rgba(0,0,0,.5);
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, 10px) scale(.55); }
    16% { opacity: 1; transform: translate(-50%, -6px) scale(1.15); }
    32% { transform: translate(-50%, -14px) scale(1); }
    82% { opacity: 1; transform: translate(-50%, -70px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -98px) scale(1); }
  }

  /* ---------- game over ---------- */
  #gameOverOverlay {
    position: absolute; inset: 14px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(2, 8, 14, .78); backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none; transition: opacity .3s ease; z-index: 30;
  }
  #gameOverOverlay.visible { opacity: 1; pointer-events: auto; }
  .go-panel { text-align: center; color: #eafcff; }
  .go-panel h2 { margin: 0 0 6px; font-size: 1.8rem; letter-spacing: .08em; color: #ffe0b3; }
  .go-panel p { margin: 4px 0; color: var(--text-dim); }
  .go-score { font-size: 1.1rem !important; color: #baf3ff !important; font-weight: 700; }
  .go-hint { font-size: .8rem !important; margin-top: 10px !important; }

  footer { color: var(--text-dim); font-size: .7rem; opacity: .6; margin-top: 2px; }
</style>
</head>
<body>
  <div id="backdrop">
    <div class="groundglow"></div>
    <div class="stars"></div>
    <div class="foglayer">
      <div class="fogband"></div>
      <div class="fogband"></div>
      <div class="fogband"></div>
    </div>
    <div class="snowlayer"></div>
    <div class="aurora">
      <div class="ribbon r1"></div>
      <div class="ribbon r2"></div>
      <div class="ribbon r3"></div>
    </div>
    <div class="stormlines"></div>
  </div>

  <div id="app">
    <header>
      <h1>Aurora Match</h1>
      <p class="tagline">an arctic night, eight rows deep</p>
    </header>

    <div class="hud">
      <div class="hud-stat"><span class="label">Score</span><span id="scoreVal">0</span></div>
      <div class="hud-stat"><span class="label">Best</span><span id="bestVal">0</span></div>
      <div class="hud-stat"><span class="label">Multiplier</span><span id="multVal">×1</span></div>
      <div class="hud-stat"><span class="label">Stage</span><span id="stageVal">Clear Polar Night</span></div>
      <button id="newGameBtn" type="button" data-testid="new-game">New Game</button>
    </div>

    <div id="legend"></div>

    <div id="boardWrap">
      <div id="board" role="grid" aria-label="match-3 board"></div>
      <div id="gameOverOverlay">
        <div class="go-panel">
          <h2>Game Over</h2>
          <p>No moves remain on the ice.</p>
          <p class="go-score"></p>
          <p class="go-hint">Use New Game above to play again.</p>
        </div>
      </div>
    </div>

    <footer>slide a gem into a neighbour to match three or more</footer>
  </div>

  <script type="module" src="./render.js"></script>
</body>
</html>
